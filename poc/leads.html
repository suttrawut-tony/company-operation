<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Lead Management</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .sq-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 24px; }
    .sq-stat { background: var(--bg-white); border:1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 18px; text-align: center; transition: all 0.15s; box-shadow: var(--shadow-xs); }
    .sq-stat:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,110,247,0.1); }
    .sq-stat .val { font-size: 28px; font-weight: 800; line-height: 1.2; }
    .sq-stat .lbl { font-size: 11px; color: var(--text-secondary); margin-top: 4px; font-weight: 500; letter-spacing: 0.3px; }
    .sq-table { width:100%; border-collapse:collapse; font-size:13px; }
    .sq-table th { background:var(--bg-light); padding:12px 16px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border-bottom:2px solid var(--border); }
    .sq-table td { padding:14px 16px; border-bottom:1px solid var(--border-light); vertical-align:middle; }
    .sq-table tbody tr { cursor:pointer; transition: background 0.1s; }
    .sq-table tbody tr:hover td { background:var(--bg-hover); }
    .sq-table tbody tr:last-child td { border-bottom: none; }
    .sq-badge { font-size:10px; padding:3px 10px; border-radius:var(--radius-full); font-weight:600; display:inline-block; letter-spacing:0.2px; }
    .sq-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:600; align-items:center; justify-content:center; }
    .sq-modal-overlay.show { display:flex; }
    .sq-modal { background:var(--bg-white); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:900px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .sq-modal-header { padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
    .sq-modal-header h3 { font-size:16px; font-weight:700; }
    .sq-modal-body { padding:20px; }
    .sq-modal-footer { padding:12px 20px; border-top:1px solid var(--border-light); display:flex; gap:8px; justify-content:flex-end; }
    .sq-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .sq-fg { margin-bottom:10px; }
    .sq-fg label { display:block; font-size:11px; font-weight:600; color:var(--text-secondary); margin-bottom:3px; }
    .sq-fg input, .sq-fg select, .sq-fg textarea { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:12px; box-sizing:border-box; background:var(--bg-white); }
    .sq-fg input:focus, .sq-fg select:focus, .sq-fg textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
    .sq-fg textarea { min-height:60px; resize:vertical; }
    .filter-bar { display:flex; gap:10px; margin-bottom:20px; align-items:center; flex-wrap:wrap; padding:14px 16px; background:var(--bg-white); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-xs); }
    .filter-bar select, .filter-bar input { padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius); font-size:12px; background:var(--bg-white); font-family:var(--font); }
    .filter-bar select:focus, .filter-bar input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
    .filter-bar input[type="search"] { min-width:220px; }
    .close-btn { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-muted); line-height:1; }
    .close-btn:hover { color:var(--text-primary); }
    .btn-sm { font-size:12px; padding:6px 14px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; font-weight:600; background:var(--bg-white); color:var(--text-primary); }
    .btn-sm:hover { background:var(--bg-hover); }
    .btn-primary { background:var(--primary); color:white; border-color:var(--primary); }
    .btn-primary:hover { filter:brightness(0.9); }
    .btn-danger { background:var(--danger); color:white; border-color:var(--danger); }
    .btn-success { background:var(--success,#0f9d58); color:white; border-color:var(--success,#0f9d58); }
    .action-btns { display:flex; gap:6px; align-items:center; }
    .action-btns button { font-size:11px; padding:5px 12px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; font-weight:600; background:var(--bg-white); white-space:nowrap; transition: all 0.15s; }
    .action-btns button:hover { background:var(--bg-hover); transform:translateY(-1px); }
    .action-btns .btn-primary:hover { filter:brightness(0.9); transform:translateY(-1px); }
    .action-btns .btn-danger { font-size:11px; padding:5px 10px; opacity:0.7; }
    .action-btns .btn-danger:hover { opacity:1; }
    @media (max-width:768px) { .sq-stats { grid-template-columns: repeat(2,1fr); } .sq-info-grid { grid-template-columns:1fr; } .filter-bar { flex-direction:column; } }
  </style>
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <div class="page-header">
      <div><h1 id="pgIcon" data-i18n="lead_page_title">Lead Management</h1></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="exportLeads()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> <span data-i18n="lead_btn_export">Export Excel</span></button>
        <button class="btn btn-primary" onclick="openCreateModal()" data-i18n="lead_btn_new">+ New Lead</button>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <select id="filterStatus" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="qualified">Qualified</option>
        <option value="quoted">Quoted</option>
        <option value="won">Won</option>
        <option value="lost">Lost</option>
      </select>
      <select id="filterSource" onchange="applyFilters()">
        <option value="">All Sources</option>
        <option value="phone">Phone</option>
        <option value="line">LINE</option>
        <option value="website">Website</option>
        <option value="walk_in">Walk-in</option>
        <option value="referral">Referral</option>
      </select>
      <input type="search" id="filterSearch" placeholder="Search leads..." oninput="applyFilters()">
    </div>

    <div class="sq-stats" id="stats"></div>
    <div class="card" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);overflow:hidden;">
      <div class="card-header" style="padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;">
        <h2 style="font-size:15px;font-weight:700;margin:0;" data-i18n="lead_list_heading">Lead List</h2>
        <span style="font-size:12px;color:var(--text-muted);" id="tableCount"></span>
      </div>
      <div id="tableWrap" style="overflow-x:auto;"></div>
    </div>
  </main>
  </div>

  <!-- Create/Edit Modal -->
  <div class="sq-modal-overlay" id="leadModal" onclick="if(event.target===this)closeModal()">
    <div class="sq-modal">
      <div class="sq-modal-header">
        <h3 id="modalTitle"></h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="sq-modal-body" id="modalBody"></div>
      <div class="sq-modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/excel-export.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    let allLeads = [];
    let filteredLeads = [];
    let editLead = null;
    let users = [];

    async function loadData() {
      try {
        allLeads = await API.get('/leads');
        if (!Array.isArray(allLeads)) allLeads = [];
      } catch(e) { allLeads = []; }
      try {
        const res = await API.get('/master/users');
        users = Array.isArray(res) ? res : (res.users || []);
      } catch(e) { users = []; }
      applyFilters();
    }

    function applyFilters() {
      const status = document.getElementById('filterStatus').value;
      const source = document.getElementById('filterSource').value;
      const search = document.getElementById('filterSearch').value.toLowerCase();
      filteredLeads = allLeads.filter(l => {
        if (status && l.status !== status) return false;
        if (source && l.source !== source) return false;
        if (search && !(l.lead_number||'').toLowerCase().includes(search)
            && !(l.customer_name||'').toLowerCase().includes(search)
            && !(l.customer_phone||'').toLowerCase().includes(search)) return false;
        return true;
      });
      renderStats();
      renderTable();
    }

    function renderStats() {
      const t = filteredLeads.length;
      const nw = filteredLeads.filter(x=>x.status==='new').length;
      const ct = filteredLeads.filter(x=>x.status==='contacted').length;
      const ql = filteredLeads.filter(x=>x.status==='qualified').length;
      const wn = filteredLeads.filter(x=>x.status==='won').length;
      document.getElementById('stats').innerHTML = `
        <div class="sq-stat"><div class="val">${t}</div><div class="lbl" data-i18n="lead_stat_total">Total Leads</div></div>
        <div class="sq-stat"><div class="val" style="color:var(--primary)">${nw}</div><div class="lbl" data-i18n="lead_stat_new">New</div></div>
        <div class="sq-stat"><div class="val" style="color:#f59e0b">${ct}</div><div class="lbl" data-i18n="lead_stat_contacted">Contacted</div></div>
        <div class="sq-stat"><div class="val" style="color:#8b5cf6">${ql}</div><div class="lbl" data-i18n="lead_stat_qualified">Qualified</div></div>
        <div class="sq-stat"><div class="val" style="color:var(--success,#0f9d58)">${wn}</div><div class="lbl" data-i18n="lead_stat_won">Won</div></div>`;
      if(typeof I18N!=='undefined')I18N.applyTranslations();
    }

    function statusStyle(s) {
      return ({
        new:'background:#dbeafe;color:#1d4ed8',
        contacted:'background:#fef3c7;color:#92400e',
        qualified:'background:#e0e7ff;color:#3730a3',
        quoted:'background:#f3e8ff;color:#7c3aed',
        won:'background:#d4edda;color:#155724',
        lost:'background:#f8d7da;color:#721c24'
      }[s]||'background:#e2e3e5;color:#383d41');
    }

    function sourceLabel(s) {
      return ({phone:'Phone',line:'LINE',website:'Website',walk_in:'Walk-in',referral:'Referral'}[s]||s||'-');
    }

    function renderTable() {
      if (!filteredLeads.length) {
        document.getElementById('tableWrap').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;opacity:0.4"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg><div style="font-size:14px;font-weight:500;" data-i18n="lead_empty_title">No leads found</div><div style="font-size:12px;margin-top:4px;" data-i18n="lead_empty_subtitle">Try adjusting your filters or create a new lead</div></div>';if(typeof I18N!=='undefined')I18N.applyTranslations();
        return;
      }
      let h='<table class="sq-table"><thead><tr><th style="width:120px">Lead No.</th><th style="min-width:160px">Customer</th><th style="width:110px">Phone</th><th style="width:90px">Source</th><th style="width:100px">Interest</th><th style="width:90px;text-align:right">Est. kWp</th><th style="width:90px;text-align:center">Status</th><th style="width:120px">Assigned</th><th style="width:200px;text-align:center">Actions</th></tr></thead><tbody>';
      filteredLeads.forEach(l=>{
        h+=`<tr>
          <td><span style="font-weight:700;color:var(--primary);font-size:12px;">${l.lead_number||'-'}</span></td>
          <td><div style="font-weight:500;color:var(--text-primary);line-height:1.4;">${l.customer_name||'-'}</div>${l.customer_email?`<div style="font-size:11px;color:var(--text-muted);">${l.customer_email}</div>`:''}</td>
          <td style="font-size:12px;">${l.customer_phone||'-'}</td>
          <td><span class="sq-badge" style="background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd">${sourceLabel(l.source)}</span></td>
          <td style="font-size:12px;">${l.interest_type||'-'}</td>
          <td style="text-align:right;font-weight:600;font-variant-numeric:tabular-nums;">${l.estimated_kwp?fmtNum(l.estimated_kwp):'-'}</td>
          <td style="text-align:center"><span class="sq-badge" style="${statusStyle(l.status)}">${l.status||'-'}</span></td>
          <td style="font-size:12px;color:var(--text-secondary);">${l.assigned_to_name||'-'}</td>
          <td onclick="event.stopPropagation()" style="text-align:center">
            <div class="action-btns" style="justify-content:center">
              <button onclick="openEditModal('${l.id}')" title="Edit">Edit</button>
              ${l.status==='qualified'?`<button class="btn-success" style="color:white" onclick="convertLead('${l.id}')">Convert</button>`:''}
              ${l.status!=='lost'?`<button class="btn-danger" onclick="deleteLead('${l.id}')" title="Delete">&times;</button>`:''}
            </div>
          </td></tr>`;
      });
      h+='</tbody></table>';
      document.getElementById('tableWrap').innerHTML=h;
      const countEl = document.getElementById('tableCount');
      if (countEl) countEl.textContent = filteredLeads.length + ' of ' + allLeads.length + ' leads';
      if(typeof I18N!=='undefined')I18N.applyTranslations();
    }

    // ════════════════════════════════
    //  MODAL: CREATE / EDIT
    // ════════════════════════════════
    function openCreateModal() {
      editLead = { status:'new', source:'phone' };
      renderModal(true);
      document.getElementById('leadModal').classList.add('show');
    }

    async function openEditModal(id) {
      try {
        editLead = await API.get('/leads/'+id);
        renderModal(false);
        document.getElementById('leadModal').classList.add('show');
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    function renderModal(isNew) {
      const l = editLead;
      document.getElementById('modalTitle').textContent = isNew ? 'Create New Lead' : 'Edit Lead — '+(l.lead_number||'');

      let userOpts = '<option value="">-- Not assigned --</option>';
      users.forEach(u => { userOpts += `<option value="${u.id}" ${u.id===l.assigned_to?'selected':''}>${u.first_name||''} ${u.last_name||''}</option>`; });

      let h = '<div class="sq-info-grid"><div>';
      h += fg('Customer Name *', 'text', 'ldName', l.customer_name||'');
      h += fg('Phone', 'text', 'ldPhone', l.customer_phone||'');
      h += fg('Email', 'email', 'ldEmail', l.customer_email||'');
      h += `<div class="sq-fg"><label>Source</label><select id="ldSource">
        <option value="phone" ${l.source==='phone'?'selected':''}>Phone</option>
        <option value="line" ${l.source==='line'?'selected':''}>LINE</option>
        <option value="website" ${l.source==='website'?'selected':''}>Website</option>
        <option value="walk_in" ${l.source==='walk_in'?'selected':''}>Walk-in</option>
        <option value="referral" ${l.source==='referral'?'selected':''}>Referral</option>
      </select></div>`;
      h += fg('Interest Type', 'text', 'ldInterest', l.interest_type||'');
      h += fg('Estimated kWp', 'number', 'ldKwp', l.estimated_kwp||'');
      h += '</div><div>';
      h += fg('Monthly Bill', 'number', 'ldBill', l.monthly_bill||'');
      h += fg('Roof Type', 'text', 'ldRoof', l.roof_type||'');
      h += `<div class="sq-fg"><label>Address</label><textarea id="ldAddress">${l.customer_address||''}</textarea></div>`;
      h += `<div class="sq-fg"><label>Location</label><textarea id="ldLocation">${l.location||''}</textarea></div>`;
      h += `<div class="sq-fg"><label>Assigned To</label><select id="ldAssigned">${userOpts}</select></div>`;
      h += `<div class="sq-fg"><label>Notes</label><textarea id="ldNotes">${l.notes||''}</textarea></div>`;
      h += '</div></div>';

      document.getElementById('modalBody').innerHTML = h;

      let f = '';
      f += `<button class="btn-sm btn-primary" onclick="saveLead(${isNew})">${isNew?'Create':'Save'}</button>`;
      f += '<button class="btn-sm" onclick="closeModal()">Cancel</button>';
      document.getElementById('modalFooter').innerHTML = f;
    }

    function fg(label, type, id, val, extra='') {
      return `<div class="sq-fg"><label>${label}</label><input type="${type}" id="${id}" value="${val||''}" ${extra}></div>`;
    }

    async function saveLead(isNew) {
      const name = document.getElementById('ldName').value;
      if (!name) { typeof showToast==='function' && showToast('Customer name is required','warning'); return; }
      const data = {
        customer_name: name,
        customer_phone: document.getElementById('ldPhone').value||null,
        customer_email: document.getElementById('ldEmail').value||null,
        customer_address: document.getElementById('ldAddress').value||null,
        source: document.getElementById('ldSource').value||'phone',
        interest_type: document.getElementById('ldInterest').value||null,
        estimated_kwp: parseFloat(document.getElementById('ldKwp').value)||null,
        monthly_bill: parseFloat(document.getElementById('ldBill').value)||null,
        roof_type: document.getElementById('ldRoof').value||null,
        location: document.getElementById('ldLocation').value||null,
        assigned_to: document.getElementById('ldAssigned').value||null,
        notes: document.getElementById('ldNotes').value||null,
      };
      try {
        if (isNew) {
          await API.post('/leads', data);
          typeof showToast==='function' && showToast('Lead created successfully','success');
        } else {
          await API.put('/leads/'+editLead.id, data);
          typeof showToast==='function' && showToast('Lead updated successfully','success');
        }
        closeModal(); loadData();
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    async function convertLead(id) {
      if (!confirm('Convert this lead to a quotation draft?')) return;
      try {
        const quotation = await API.post('/leads/'+id+'/convert');
        typeof showToast==='function' && showToast('Lead converted to quotation','success');
        if (quotation && quotation.id) {
          window.location = 'sq-detail.html?id=' + quotation.id;
        } else {
          loadData();
        }
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    async function deleteLead(id) {
      if (!confirm('Mark this lead as lost?')) return;
      try {
        await API.del('/leads/'+id);
        typeof showToast==='function' && showToast('Lead marked as lost','success');
        loadData();
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    function closeModal() { document.getElementById('leadModal').classList.remove('show'); }

    function exportLeads() {
      if (!filteredLeads.length) { typeof showToast==='function' && showToast('No data to export','warning'); return; }
      const headers = ['Lead No.','Customer','Phone','Email','Source','Interest','Est. kWp','Monthly Bill','Roof Type','Status','Assigned','Notes'];
      const rows = filteredLeads.map(l => [
        l.lead_number||'', l.customer_name||'', l.customer_phone||'', l.customer_email||'',
        sourceLabel(l.source), l.interest_type||'', parseFloat(l.estimated_kwp||0),
        parseFloat(l.monthly_bill||0), l.roof_type||'', l.status||'',
        l.assigned_to_name||'', l.notes||''
      ]);
      exportToExcel(headers, rows, 'Leads', 'leads.xlsx');
    }

    // Init
    if (API.requireAuth()) {
      loadData();
      if (typeof I!=='undefined') document.getElementById('pgIcon').innerHTML = I.leads+' Lead Management';
      else document.getElementById('pgIcon').textContent = 'Lead Management';
    }
  </script>
</body>
</html>
