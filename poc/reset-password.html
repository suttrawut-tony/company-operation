<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Reset Password</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    body { background: var(--bg-body); display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card {
      background: var(--bg-white); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
      padding: 40px; width: 420px; max-width: 95vw;
    }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
    .submit {
      width: 100%; padding: 11px; border: none; border-radius: var(--radius);
      background: var(--primary); color: white; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .submit:hover { background: var(--primary-hover); }
    .submit:disabled { opacity: 0.6; cursor: wait; }
    .pw-rules { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    #msg-error { background:#fef2f2; color:#ef4444; padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px; display:none; }
    #msg-info  { background:#ecfdf5; color:#047857; padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px; display:none; }
    .footer { text-align:center; margin-top: 18px; font-size: 13px; }
    .footer a { color: var(--primary); font-weight: 500; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card fade-in">
    <h2>Reset password</h2>
    <div class="subtitle">ตั้งรหัสผ่านใหม่สำหรับบัญชีของคุณ</div>

    <form onsubmit="event.preventDefault(); handleReset();">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" class="form-input" id="new-pw" autocomplete="new-password" required>
        <div class="pw-rules">อย่างน้อย 8 ตัวอักษร, มีตัวอักษร และ ตัวเลข</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input type="password" class="form-input" id="confirm-pw" autocomplete="new-password" required>
      </div>
      <button type="submit" class="submit" id="submit-btn">Set new password</button>
    </form>

    <div id="msg-error"></div>
    <div id="msg-info"></div>

    <div class="footer"><a href="login.html">← Back to sign in</a></div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('msg-error').textContent = 'Missing or invalid reset link.';
      document.getElementById('msg-error').style.display = 'block';
      document.getElementById('submit-btn').disabled = true;
    }

    async function handleReset() {
      const pw1 = document.getElementById('new-pw').value;
      const pw2 = document.getElementById('confirm-pw').value;
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('msg-error');
      const info = document.getElementById('msg-info');
      err.style.display = 'none'; info.style.display = 'none';

      if (pw1 !== pw2) {
        err.textContent = 'Passwords do not match';
        err.style.display = 'block'; return;
      }
      if (pw1.length < 8 || !/[A-Za-z]/.test(pw1) || !/[0-9]/.test(pw1)) {
        err.textContent = 'Password must be at least 8 characters and include both a letter and a number';
        err.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        await API.resetPassword(token, pw1);
        info.textContent = 'Password updated. Redirecting to sign-in...';
        info.style.display = 'block';
        setTimeout(() => { window.location.href = 'login.html?reset=ok'; }, 1200);
      } catch (e) {
        err.textContent = e.message || 'Could not reset password';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set new password';
      }
    }
  </script>
</body>
</html>
