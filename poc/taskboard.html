<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Taskboard</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .tb-header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .tb-filters { display: flex; gap: 8px; }

    .kanban { min-height: 560px; }
    .kanban-column { min-width: 260px; display: flex; flex-direction: column; }
    .kanban-column-header .col-dot { width: 8px; height: 8px; border-radius: 50%; }

    .task-card {
      background: var(--bg-white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px; cursor: grab;
      box-shadow: var(--shadow-xs); transition: all 0.15s;
    }
    .task-card:hover { box-shadow: var(--shadow-sm); border-color: var(--primary); }
    .task-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px;
    }
    .task-id { font-size: 11px; color: var(--primary); font-weight: 600; }
    .task-priority {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .task-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .task-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .task-tag {
      font-size: 10px; padding: 1px 8px; border-radius: var(--radius-full);
      font-weight: 500;
    }
    .task-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 8px; border-top: 1px solid var(--border-light);
    }
    .task-footer .assignee { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
    .task-footer .due { font-size: 10px; color: var(--text-muted); }
    .task-footer .due.overdue { color: var(--danger); font-weight: 600; }
    .task-subtask { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    /* Drag & Drop */
    .kanban-body { min-height: 200px; flex: 1; padding-bottom: 40px; }
    .task-card { transition: all 0.25s ease; }
    .task-card.dragging { opacity: 0.4; transform: rotate(2deg); }
    .task-card.dropping { animation: dropIn 0.3s ease; }
    .kanban-body.drag-over { background: var(--primary-light); border-radius: var(--radius); outline: 2px dashed var(--primary); outline-offset: -2px; }
    .kanban-body.drag-over * { pointer-events: none; }
    @keyframes dropIn { from { opacity: 0; transform: scale(0.9) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    /* Task actions */
    .task-actions {
      display: flex; gap: 2px; margin-top: 6px;
    }
    .task-actions button {
      border: none; background: var(--bg-hover); cursor: pointer;
      padding: 3px 8px; border-radius: var(--radius); font-size: 10px;
      color: var(--text-secondary); font-family: var(--font); transition: all 0.15s;
    }
    .task-actions button:hover { background: var(--primary-light); color: var(--primary); }
    .task-actions button.btn-del:hover { background: var(--danger-bg); color: var(--danger); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--bg-white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg); width: 480px; max-width: 95vw;
      animation: slideUp 0.2s;
    }
    .modal-header {
      padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close {
      border: none; background: none; font-size: 20px; cursor: pointer;
      color: var(--text-muted); padding: 4px 8px; border-radius: var(--radius);
    }
    .modal-close:hover { background: var(--bg-hover); }
    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border-light);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* View Toggle */
    .view-toggle { display:flex; gap:0; }
    .view-toggle button { font-size:12px; padding:6px 14px; border:1px solid var(--border); background:var(--bg-white); cursor:pointer; font-weight:500; color:var(--text-secondary); }
    .view-toggle button:first-child { border-radius:var(--radius) 0 0 var(--radius); }
    .view-toggle button:last-child { border-radius:0 var(--radius) var(--radius) 0; }
    .view-toggle button:not(:first-child) { border-left:none; }
    .view-toggle button.active { background:var(--primary); color:white; border-color:var(--primary); }

    /* Calendar Nav */
    .cal-nav { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .cal-nav .cal-month { font-size:18px; font-weight:400; min-width:180px; }
    .cal-nav button { background:none; border:none; cursor:pointer; color:var(--text-secondary); padding:4px 8px; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; }
    .cal-nav button:hover { background:var(--bg-hover); }
    .cal-nav .cal-today { border:1px solid var(--border); border-radius:var(--radius); padding:4px 12px; font-size:12px; font-weight:500; }

    /* Task Calendar Grid */
    .tcal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0; border:1px solid var(--border-light); border-radius:var(--radius-lg); overflow:hidden; }
    .tcal-dow { background:var(--bg-light); padding:8px; text-align:center; font-size:11px; font-weight:600; color:var(--text-secondary); border-bottom:1px solid var(--border-light); border-right:1px solid var(--border-light); }
    .tcal-dow:last-child { border-right:none; }
    .tcal-cell { min-height:100px; padding:4px; background:var(--bg-white); border-bottom:1px solid var(--border-light); border-right:1px solid var(--border-light); cursor:pointer; overflow:hidden; }
    .tcal-cell:nth-child(7n) { border-right:none; }
    .tcal-cell:hover { background:var(--bg-hover); }
    .tcal-cell.other { opacity:0.4; }
    .tcal-cell .tcal-day { font-size:12px; font-weight:600; margin-bottom:2px; padding:2px 4px; display:inline-block; }
    .tcal-cell .tcal-day.today { background:var(--primary); color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:11px; }
    .tcal-ev { font-size:10px; padding:2px 6px; border-radius:4px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; font-weight:500; display:block; }
    .tcal-ev:hover { filter:brightness(0.9); }
    .tcal-ev.done { opacity:0.5; text-decoration:line-through; }
    .tcal-ev.bar { color:#fff; border-left:none; }
    .tcal-ev.bar.span-start { border-radius:4px 0 0 4px; margin-right:-4px; }
    .tcal-ev.bar.span-mid { border-radius:0; margin-left:-4px; margin-right:-4px; }
    .tcal-ev.bar.span-end { border-radius:0 4px 4px 0; margin-left:-4px; }
    .tcal-ev.dot { background:none; display:flex; align-items:center; gap:4px; }
    .tcal-ev.dot .d { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .tcal-more { font-size:10px; color:var(--primary); padding:2px 6px; cursor:pointer; font-weight:600; }

    /* Task List View */
    .tlist table { width:100%; border-collapse:collapse; font-size:13px; }
    .tlist th { background:var(--bg-light); padding:10px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
    .tlist th:hover { color:var(--text-primary); }
    .tlist td { padding:10px 12px; border-bottom:1px solid var(--border-light); }
    .tlist tr:hover td { background:var(--bg-hover); cursor:pointer; }
    .tlist .pri-badge { font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; }
    .tlist .status-badge { font-size:10px; padding:2px 8px; border-radius:var(--radius-full); font-weight:600; }
    .tlist .due-badge { font-size:10px; padding:1px 6px; border-radius:10px; font-weight:600; }

    /* Task date display on card */
    .task-dates { font-size:10px; color:var(--text-muted); margin-bottom:6px; display:flex; align-items:center; gap:4px; }
    .task-dates svg { width:12px; height:12px; }
    .due-warn { font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; }
  </style>
</head>
<body>

  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>

  <div id="tabbar"></div>
  <main class="page fade-in">
    <div class="page-header">
      <div>
        <h1><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="6" height="14" x="2" y="6" rx="2"/><rect width="6" height="10" x="9" y="2" rx="2"/><rect width="6" height="14" x="16" y="8" rx="2"/></svg> Taskboard</h1>
        <div class="subtitle" id="boardSubtitle"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-secondary" onclick="exportTasks()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Export Excel</button>
        <button class="btn btn-primary" onclick="openAddTask()">+ Add Task</button>
      </div>
    </div>

    <div class="tb-header-row">
      <div class="tb-filters">
        <select class="form-select" id="projectSelect" style="width:260px;font-size:12px;padding:6px 10px;" onchange="onProjectChange()">
          <option value="">-- Select Project --</option>
        </select>
        <select class="form-select" id="filterPriority" style="width:120px;font-size:12px;padding:6px 10px;" onchange="renderBoard()">
          <option value="">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="form-select" id="filterAssignee" style="width:140px;font-size:12px;padding:6px 10px;" onchange="renderBoard()">
          <option value="">All Assignee</option>
        </select>
        <select class="form-select" id="filterTimeline" style="width:130px;font-size:12px;padding:6px 10px;" onchange="renderBoard()">
          <option value="">All Timeline</option>
          <option value="overdue">Overdue</option>
          <option value="today">Due Today</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
          <option value="none">No Due Date</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="view-toggle">
          <button class="active" data-tv="kanban" onclick="setTaskView('kanban')">Kanban</button>
          <button data-tv="calendar" onclick="setTaskView('calendar')">Calendar</button>
          <button data-tv="list" onclick="setTaskView('list')">List</button>
        </div>
        <span id="taskStats" style="font-size:12px;color:var(--text-secondary);"></span>
      </div>
    </div>

    <!-- Calendar Navigation (hidden unless calendar view) -->
    <div class="cal-nav" id="calNav" style="display:none">
      <button onclick="calPrev()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
      <button onclick="calNext()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
      <span class="cal-month" id="calMonthLabel"></span>
      <button class="cal-today" onclick="calToday()">วันนี้</button>
    </div>

    <!-- Board Container (kanban / calendar / list) -->
    <div id="boardContainer">
      <div class="kanban" id="kanbanBoard">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Select a project above to load the taskboard</div>
    </div>

    </div><!-- end boardContainer -->

    <!-- Task Modal -->
    <div class="modal-overlay" id="task-modal" onclick="if(event.target===this)closeTaskModal()">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="task-modal-title">เพิ่ม Task ใหม่</h3>
          <button class="modal-close" onclick="closeTaskModal()">&times;</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="task-edit-id">
          <div class="form-group">
            <label class="form-label">ชื่อ Task</label>
            <input type="text" class="form-input" id="task-title" placeholder="e.g. GPS module calibration">
          </div>
          <div class="form-group">
            <label class="form-label">รายละเอียด</label>
            <textarea class="form-input" id="task-desc" rows="2" placeholder="อธิบายรายละเอียด (optional)"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Priority</label>
              <select class="form-input" id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-input" id="task-status">
                <option value="todo">To-do</option>
                <option value="in_progress">In Progress</option>
                <option value="review">Review</option>
                <option value="done">Done</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">ผู้รับผิดชอบ</label>
            <select class="form-input" id="task-assignee">
              <option value="">ไม่ระบุ</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">วันเริ่มต้น</label><input type="date" class="form-input" id="task-start"></div>
            <div class="form-group"><label class="form-label">วันสิ้นสุด</label><input type="date" class="form-input" id="task-due"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">เวลาเริ่ม</label><input type="time" class="form-input" id="task-start-time"></div>
            <div class="form-group"><label class="form-label">เวลาสิ้นสุด</label><input type="time" class="form-input" id="task-end-time"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">ชั่วโมงประมาณ</label><input type="number" class="form-input" id="task-est-hours" step="0.5" min="0" placeholder="เช่น 4"></div>
            <div class="form-group"><label class="form-label">ชั่วโมงจริง</label><input type="number" class="form-input" id="task-actual-hours" step="0.5" min="0" placeholder="กรอกตอนเสร็จ"></div>
          </div>
          <div class="form-group"><label class="form-label">สถานที่</label><input type="text" class="form-input" id="task-location" placeholder="ชื่อสถานที่"></div>
          <div class="form-group" id="task-jo-group" style="display:none"><label class="form-label">Job Order</label><div id="task-jo-info" style="font-size:12px;padding:8px 12px;background:var(--bg-light);border-radius:var(--radius);border:1px solid var(--border-light)"></div></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary btn-sm" onclick="closeTaskModal()">ยกเลิก</button>
          <button class="btn btn-primary btn-sm" id="task-save-btn" onclick="saveTask()">บันทึก</button>
        </div>
      </div>
    </div>
  </main>
  </div><!-- end main-wrapper -->
  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/highlight.js"></script>
  <script src="assets/js/excel-export.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    let allTasks = [];
    let currentTaskView = 'kanban';
    let calendarDate = new Date();
    const TH_DAYS_S = ['อา','จ','อ','พ','พฤ','ศ','ส'];
    const TH_MONTHS_S = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const TH_MONTHS_L = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    function fmtD(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function toLD(s) { if(!s)return''; if(typeof s==='string'&&s.length===10&&s[4]==='-')return s; const d=new Date(s); return isNaN(d)?String(s).slice(0,10):fmtD(d); }
    function fmtThai(s) { if(!s)return''; const d=new Date(s); return isNaN(d)?'':d.getDate()+' '+TH_MONTHS_S[d.getMonth()]+' '+(d.getFullYear()+543-2500); }
    function daysInMo(y,m) { return new Date(y,m+1,0).getDate(); }
    function isSameDay(a,b) { return fmtD(a)===fmtD(b); }

    const PRI_COLORS = { high:'#ea4335', medium:'#f59e0b', low:'#34a853' };
    const PRI_BG = { high:'rgba(234,67,53,0.12)', medium:'rgba(245,158,11,0.12)', low:'rgba(52,168,83,0.12)' };

    const columns = [
      { key: 'todo',        label: 'To-do',       dot: 'var(--text-muted)' },
      { key: 'in_progress', label: 'In Progress',  dot: 'var(--primary)' },
      { key: 'review',      label: 'Review',       dot: 'var(--warning)' },
      { key: 'done',        label: 'Done',         dot: 'var(--success)' }
    ];

    const priorityColor = {
      high: 'var(--danger)',
      medium: 'var(--warning)',
      low: 'var(--text-muted)'
    };

    let projectMembers = [];
    let currentProjectId = null;

    function taskCard(t) {
      const isDone = t.status === 'done';
      const pColor = priorityColor[t.priority] || 'var(--text-muted)';
      const assigneeName = t.first_name_th || t.first_name || '';
      const assigneeInitial = assigneeName ? assigneeName[0] : '?';
      const isOverdue = t.due_date && !isDone && new Date(t.due_date) < new Date();
      const isDueToday = t.due_date && !isDone && new Date(t.due_date).toDateString() === new Date().toDateString();
      const borderColor = t.priority === 'high' ? 'var(--danger)' : t.priority === 'medium' ? 'var(--warning)' : 'var(--border)';
      const cardOpacity = isDone ? 'opacity:0.6;' : '';
      const titleStyle = isDone ? 'text-decoration:line-through;color:var(--text-muted);' : '';

      // Priority badge
      const priBadge = t.priority === 'high' ? '<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:var(--danger-bg);color:var(--danger);font-weight:600;">HIGH</span>'
        : t.priority === 'medium' ? '<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:var(--warning-bg);color:var(--warning);font-weight:600;">MED</span>'
        : '<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:var(--bg-hover);color:var(--text-muted);font-weight:600;">LOW</span>';

      // Due date badge
      let dueBadge = '';
      if (t.due_date) {
        if (isDone) dueBadge = '<span style="font-size:10px;color:var(--success);">' + fmtDateShort(t.due_date) + '</span>';
        else if (isOverdue) dueBadge = '<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:var(--danger-bg);color:var(--danger);font-weight:600;">Overdue ' + fmtDateShort(t.due_date) + '</span>';
        else if (isDueToday) dueBadge = '<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:var(--warning-bg);color:var(--warning);font-weight:600;">Today</span>';
        else dueBadge = '<span style="font-size:10px;color:var(--text-muted);">' + fmtDateShort(t.due_date) + '</span>';
      }

      // Date range display
      let dateRange = '';
      const sd = toLD(t.start_date), dd = toLD(t.due_date);
      if (sd && dd && sd !== dd) dateRange = fmtThai(sd) + ' → ' + fmtThai(dd);
      else if (dd) dateRange = 'กำหนด: ' + fmtThai(dd);
      else if (sd) dateRange = 'เริ่ม: ' + fmtThai(sd);

      // Due warning badge
      let dueWarn = '';
      if (t.due_date && !isDone) {
        const dueD = new Date(t.due_date), now = new Date();
        const diff = Math.ceil((dueD - now) / 86400000);
        if (diff < 0) dueWarn = `<span class="due-warn" style="background:var(--danger-bg);color:var(--danger)">เกินกำหนด ${Math.abs(diff)} วัน</span>`;
        else if (diff === 0) dueWarn = '<span class="due-warn" style="background:var(--warning-bg);color:var(--warning)">ครบกำหนดวันนี้</span>';
        else if (diff <= 3) dueWarn = `<span class="due-warn" style="background:#fff3cd;color:#856404">อีก ${diff} วัน</span>`;
      }

      const descPreview = t.description ? '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + t.description.substring(0,60) + '</div>' : '';

      return `
        <div class="task-card" draggable="true" data-task-id="${t.id}" data-task-status="${t.status}"
             ondragstart="onTaskDragStart(event)" ondragend="onTaskDragEnd(event)"
             style="border-left:3px solid ${borderColor};${cardOpacity}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            ${priBadge}
            ${dueWarn || dueBadge}
          </div>

    function getFilteredTasks() {
      const priorityFilter = document.getElementById('filterPriority').value;
      const assigneeFilter = document.getElementById('filterAssignee').value;
      const timelineFilter = document.getElementById('filterTimeline').value;
      let filtered = allTasks;
      if (priorityFilter) filtered = filtered.filter(t => t.priority === priorityFilter);
      if (assigneeFilter) filtered = filtered.filter(t => t.assigned_to === assigneeFilter);
      if (timelineFilter) {
        const now = new Date(); const today = now.toDateString();
        const weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() + (7 - weekEnd.getDay()));
        const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        filtered = filtered.filter(t => {
          if (!t.due_date && timelineFilter === 'none') return true;
          if (!t.due_date) return false;
          const d = new Date(t.due_date);
          if (timelineFilter === 'overdue') return d < now && t.status !== 'done';
          if (timelineFilter === 'today') return d.toDateString() === today;
          if (timelineFilter === 'week') return d <= weekEnd && d >= now;
          if (timelineFilter === 'month') return d <= monthEnd && d >= now;
          return true;
        });
      }
      return filtered;
    }

    function setTaskView(v) {
      currentTaskView = v;
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.tv === v));
      document.getElementById('calNav').style.display = v === 'calendar' ? 'flex' : 'none';
      renderBoard();
    }

    function renderBoard() {
      if (currentTaskView === 'calendar') { renderCalendarView(); return; }
      if (currentTaskView === 'list') { renderListView(); return; }
      renderKanbanView();
    }

    function renderKanbanView() {
      const board = document.getElementById('kanbanBoard');
      board.style.display = '';
      const priorityFilter = document.getElementById('filterPriority').value;
      const assigneeFilter = document.getElementById('filterAssignee').value;
      const timelineFilter = document.getElementById('filterTimeline').value;

      let filtered = allTasks;
      if (priorityFilter) filtered = filtered.filter(t => t.priority === priorityFilter);
      if (assigneeFilter) filtered = filtered.filter(t => t.assigned_to === assigneeFilter);
      if (timelineFilter) {
        const now = new Date(); const today = now.toDateString();
        const weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() + (7 - weekEnd.getDay()));
        const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        filtered = filtered.filter(t => {
          if (!t.due_date && timelineFilter === 'none') return true;
          if (!t.due_date) return false;
          const d = new Date(t.due_date);
          if (timelineFilter === 'overdue') return d < now && t.status !== 'done';
          if (timelineFilter === 'today') return d.toDateString() === today;
          if (timelineFilter === 'week') return d <= weekEnd && d >= now;
          if (timelineFilter === 'month') return d <= monthEnd && d >= now;
          return true;
        });
      }

      const totalCount = filtered.length;
      const doneCount = filtered.filter(t => t.status === 'done').length;
      const overdueCount = filtered.filter(t => t.due_date && new Date(t.due_date) < new Date() && t.status !== 'done').length;
      document.getElementById('taskStats').innerHTML = totalCount + ' tasks | ' + doneCount + ' done' + (overdueCount > 0 ? ' | <span style="color:var(--danger);font-weight:600;">'+overdueCount+' overdue</span>' : '');

      board.innerHTML = columns.map(col => {
        const colTasks = filtered.filter(t => t.status === col.key);
        return `
          <div class="kanban-column">
            <div class="kanban-column-header">
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="col-dot" style="background:${col.dot};"></div> ${col.label}
              </div>
              <span class="count">${colTasks.length}</span>
            </div>
            <div class="kanban-body" data-col-status="${col.key}"
                 ondragover="onColDragOver(event)" ondragleave="onColDragLeave(event)" ondrop="onColDrop(event)">
              ${colTasks.length > 0 ? colTasks.map(taskCard).join('') : '<div style="min-height:60px;"></div>'}
            </div>
          </div>`;
      }).join('');

    // ═══ Drag & Drop ═══
    let draggedTaskId = null;

    function onTaskDragStart(e) {
      const card = e.target.closest('.task-card');
      draggedTaskId = card.dataset.taskId;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedTaskId);
    }
    function onTaskDragEnd(e) {
      const card = e.target.closest('.task-card');
      if (card) card.classList.remove('dragging');
      draggedTaskId = null;
      // Remove all drag-over highlights
      document.querySelectorAll('.kanban-body.drag-over').forEach(el => el.classList.remove('drag-over'));
    }
    function onColDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      // Highlight the column body, not child elements
      const body = e.currentTarget;
      body.classList.add('drag-over');
    }
    function onColDragLeave(e) {
      // Only remove highlight if we actually left the column (not entering a child)
      const body = e.currentTarget;
      const related = e.relatedTarget;
      if (!body.contains(related)) {
        body.classList.remove('drag-over');
      }
    }
    async function onColDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const newStatus = e.currentTarget.dataset.colStatus;
      if (!draggedTaskId || !currentProjectId) return;

      const task = allTasks.find(t => t.id === draggedTaskId);
      if (!task || task.status === newStatus) return;

      // Optimistic: move card instantly
      const oldStatus = task.status;
      task.status = newStatus;
      renderBoard();

      // Animate the dropped card
      const droppedCard = document.querySelector(`[data-task-id="${draggedTaskId}"]`);
      if (droppedCard) droppedCard.classList.add('dropping');
      setTimeout(() => { if (droppedCard) droppedCard.classList.remove('dropping'); }, 300);

      // Update column counts
      updateColumnCounts();

      // Save to server in background
      try {
        await API.put('/projects/' + currentProjectId + '/tasks/' + draggedTaskId, { status: newStatus });
      } catch (err) {
        // Rollback on failure
        task.status = oldStatus;
        renderBoard();
        showToast('Error: ' + err.message, 'error');
      }
    }

    function updateColumnCounts() {
      const priorityFilter = document.getElementById('filterPriority').value;
      let filtered = allTasks;
      if (priorityFilter) filtered = filtered.filter(t => t.priority === priorityFilter);
      const totalCount = filtered.length;
      const doneCount = filtered.filter(t => t.status === 'done').length;
      document.getElementById('taskStats').textContent = totalCount + ' tasks \u2022 ' + doneCount + ' completed';
    }

    async function saveTask() {
      const title = document.getElementById('task-title').value.trim();
      if (!title) { showToast('กรุณากรอกชื่อ Task', 'error'); return; }

      const editId = document.getElementById('task-edit-id').value;
      const btn = document.getElementById('task-save-btn');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';

      const startDate = document.getElementById('task-start').value || null;
      const dueDate = document.getElementById('task-due').value || null;
      if (startDate && dueDate && startDate > dueDate) {
        showToast('วันเริ่มต้นต้องไม่เกินวันสิ้นสุด', 'error'); return;
      }
      const body = {
        title,
        description: document.getElementById('task-desc').value.trim(),
        priority: document.getElementById('task-priority').value,
        status: document.getElementById('task-status').value,
        assigned_to: document.getElementById('task-assignee').value || null,
        start_date: startDate,
        due_date: dueDate,
        start_time: document.getElementById('task-start-time').value || null,
        end_time: document.getElementById('task-end-time').value || null,
        estimated_hours: document.getElementById('task-est-hours').value || null,
        actual_hours: document.getElementById('task-actual-hours').value || null,
        location: document.getElementById('task-location').value || null,
      };

      try {
        if (editId) {
          await API.put('/projects/' + currentProjectId + '/tasks/' + editId, body);
        } else {
          await API.post('/projects/' + currentProjectId + '/tasks', body);
        }
        closeTaskModal();
        onProjectChange(); // reload
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'บันทึก';
      }
    }

      try {
        await API.del('/projects/' + currentProjectId + '/tasks/' + taskId);
        onProjectChange();
      } catch (err) { showToast('Error: ' + err.message, 'error'); }
    }

    // ═══ Calendar View ═══
    function calPrev() { calendarDate.setMonth(calendarDate.getMonth()-1); renderBoard(); }
    function calNext() { calendarDate.setMonth(calendarDate.getMonth()+1); renderBoard(); }
    function calToday() { calendarDate = new Date(); renderBoard(); }

    function renderCalendarView() {
      const board = document.getElementById('kanbanBoard');
      const filtered = getFilteredTasks();
      const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
      const firstDay = new Date(y,m,1).getDay();
      const dim = daysInMo(y,m);
      const today = new Date();

      // Stats
      const overdueCount = filtered.filter(t => t.due_date && new Date(t.due_date) < today && t.status !== 'done').length;
      document.getElementById('taskStats').innerHTML = TH_MONTHS_L[m]+' '+(y+543)+': '+filtered.length+' tasks'+(overdueCount?' | <span style="color:var(--danger);font-weight:600;">'+overdueCount+' overdue</span>':'');
      document.getElementById('calMonthLabel').textContent = TH_MONTHS_L[m]+' '+(y+543);

      let html = '<div class="tcal-grid">';
      TH_DAYS_S.forEach(d => { html += `<div class="tcal-dow">${d}</div>`; });

      const totalCells = Math.ceil((firstDay+dim)/7)*7;
      for (let i=0; i<totalCells; i++) {
        const dayNum = i-firstDay+1;
        const dt = new Date(y,m,dayNum);
        const inMonth = dayNum>=1 && dayNum<=dim;
        const ds = fmtD(dt);
        const isToday = isSameDay(dt, today);

        html += `<div class="tcal-cell${inMonth?'':' other'}" onclick="openAddTaskWithDate('${ds}')">`;
        html += `<div class="tcal-day${isToday?' today':''}">${dt.getDate()}</div>`;

        // Tasks for this day
        const dayTasks = filtered.filter(t => {
          const s = toLD(t.start_date || t.due_date);
          const e = toLD(t.due_date || t.start_date);
          return s && ds >= s && ds <= e;
        });

        let shown = 0;
        dayTasks.slice(0,3).forEach(t => {
          const c = PRI_COLORS[t.priority] || PRI_COLORS.low;
          const bg = PRI_BG[t.priority] || PRI_BG.low;
          const doneCls = t.status === 'done' ? ' done' : '';
          const sd = toLD(t.start_date || t.due_date), ed = toLD(t.due_date || t.start_date);
          const isMulti = sd !== ed;

          if (isMulti) {
            let spanCls = '';
            if (ds === sd) spanCls = ' span-start';
            else if (ds === ed) spanCls = ' span-end';
            else spanCls = ' span-mid';
            html += `<div class="tcal-ev bar${doneCls}${spanCls}" style="background:${c}" onclick="event.stopPropagation();openEditTask('${t.id}')" title="${t.title||''}">${t.title||''}</div>`;
          } else {
            html += `<div class="tcal-ev dot${doneCls}" onclick="event.stopPropagation();openEditTask('${t.id}')" title="${t.title||''}"><span class="d" style="background:${c}"></span>${t.title||''}</div>`;
          }
          shown++;
        });
        if (dayTasks.length > 3) {
          html += `<div class="tcal-more">+${dayTasks.length-3} more</div>`;
        }
        html += '</div>';
      }
      html += '</div>';
      board.innerHTML = html;
    }

    // ═══ List View ═══
    let listSortCol = 'due_date';
    let listSortAsc = true;

    function renderListView() {
      const board = document.getElementById('kanbanBoard');
      const filtered = getFilteredTasks();

      const overdueCount = filtered.filter(t => t.due_date && new Date(t.due_date) < new Date() && t.status !== 'done').length;
      document.getElementById('taskStats').innerHTML = filtered.length+' tasks | '+filtered.filter(t=>t.status==='done').length+' done'+(overdueCount?' | <span style="color:var(--danger);font-weight:600;">'+overdueCount+' overdue</span>':'');

      const sorted = [...filtered].sort((a,b) => {
        let va = a[listSortCol]||'', vb = b[listSortCol]||'';
        if (listSortCol.includes('date')) { va = va ? new Date(va).getTime() : 0; vb = vb ? new Date(vb).getTime() : 0; }
        else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
        return listSortAsc ? (va>vb?1:-1) : (va<vb?1:-1);
      });

      const arrow = c => listSortCol===c?(listSortAsc?' ▲':' ▼'):'';
      const priStyle = p => `background:${PRI_BG[p]||PRI_BG.low};color:${PRI_COLORS[p]||PRI_COLORS.low}`;
      const statStyle = s => {
        const m = { todo:'background:#e2e3e5;color:#383d41', in_progress:'background:#dbeafe;color:#1d4ed8', review:'background:#fff3cd;color:#856404', done:'background:#d1fae5;color:#065f46' };
        return m[s]||m.todo;
      };

      let html = '<div class="tlist"><table><thead><tr>';
      html += `<th onclick="sortTasks('title')">ชื่อ${arrow('title')}</th>`;
      html += `<th onclick="sortTasks('priority')">Priority${arrow('priority')}</th>`;
      html += `<th onclick="sortTasks('status')">Status${arrow('status')}</th>`;
      html += `<th onclick="sortTasks('first_name')">ผู้รับผิดชอบ${arrow('first_name')}</th>`;
      html += `<th onclick="sortTasks('start_date')">เริ่ม${arrow('start_date')}</th>`;
      html += `<th onclick="sortTasks('due_date')">กำหนด${arrow('due_date')}</th>`;
      html += '<th>สถานะเวลา</th>';
      html += '</tr></thead><tbody>';

      if (!sorted.length) {
        html += '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">ไม่มี tasks</td></tr>';
      }

      sorted.forEach(t => {
        const isDone = t.status === 'done';
        const isOverdue = t.due_date && !isDone && new Date(t.due_date) < new Date();
        const isDueToday = t.due_date && !isDone && new Date(t.due_date).toDateString() === new Date().toDateString();
        let timeBadge = '';
        if (isDone) timeBadge = '<span class="due-badge" style="background:#d1fae5;color:#065f46">เสร็จแล้ว</span>';
        else if (isOverdue) timeBadge = '<span class="due-badge" style="background:var(--danger-bg);color:var(--danger)">เกินกำหนด</span>';
        else if (isDueToday) timeBadge = '<span class="due-badge" style="background:var(--warning-bg);color:var(--warning)">วันนี้</span>';
        else if (t.due_date) timeBadge = '<span class="due-badge" style="background:#e2e3e5;color:#383d41">ตามกำหนด</span>';
        else timeBadge = '<span style="color:var(--text-muted);font-size:11px">-</span>';

        const name = t.first_name_th || t.first_name || '-';
        html += `<tr onclick="openEditTask('${t.id}')" style="${isDone?'opacity:0.6':''}">
          <td style="font-weight:600;${isDone?'text-decoration:line-through':''}"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${PRI_COLORS[t.priority]||PRI_COLORS.low};margin-right:6px"></span>${t.title||'-'}</td>
          <td><span class="pri-badge" style="${priStyle(t.priority)}">${(t.priority||'low').toUpperCase()}</span></td>
          <td><span class="status-badge" style="${statStyle(t.status)}">${t.status||'-'}</span></td>
          <td>${name}</td>
          <td style="font-size:12px">${t.start_date ? fmtThai(t.start_date) : '-'}</td>
          <td style="font-size:12px">${t.due_date ? fmtThai(t.due_date) : '-'}</td>
          <td>${timeBadge}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      board.innerHTML = html;
    }

    function sortTasks(col) {
      if (listSortCol === col) listSortAsc = !listSortAsc;
      else { listSortCol = col; listSortAsc = true; }
      renderBoard();
    }

    // ═══ Export Excel ═══
    function exportTasks() {
      const tasks = getFilteredTasks();
      if (!tasks.length) { showToast('ไม่มี tasks ให้ export', 'warning'); return; }

      const statusLabel = { todo: 'To-do', in_progress: 'In Progress', review: 'Review', done: 'Done' };
      const projSel = document.getElementById('projectSelect');
      const projName = projSel.selectedIndex > 0 ? projSel.options[projSel.selectedIndex].text : 'Taskboard';

      const rows = tasks.map(t => ({
        'Task Title': t.title || '',
        'Description': t.description || '',
        'Project': projName,
        'Status': statusLabel[t.status] || t.status || '',
        'Priority': (t.priority || '').charAt(0).toUpperCase() + (t.priority || '').slice(1),
        'Assignee': (t.first_name_th || t.first_name || '') + (t.last_name ? ' ' + t.last_name : ''),
        'Start Date': t.start_date ? toLD(t.start_date) : '',
        'Due Date': t.due_date ? toLD(t.due_date) : ''
      }));

      exportExcel(rows, projName.replace(/[^a-zA-Z0-9ก-๙]/g, '_') + '_tasks', { sheetName: 'Tasks' });
    }

    // Close modal on ESC
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTaskModal(); });

    if (!API.requireAuth()) throw new Error('Not authenticated');
    loadTaskboard().then(() => {
      const params = new URLSearchParams(window.location.search);
      const projParam = params.get('project');
      const taskParam = params.get('task');
      if (projParam) {
        document.getElementById('projectSelect').value = projParam;
        onProjectChange().then(() => {
          if (taskParam) setTimeout(() => openEditTask(taskParam), 500);
        });
      }
    });
    API.onRealtime(msg => {
      if (msg.type.startsWith('task_') && currentProjectId) onProjectChange();
    });
  </script>
</body>
</html>
