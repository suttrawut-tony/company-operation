<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Tender Detail</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .sq-badge { font-size:10px; padding:2px 8px; border-radius:var(--radius-full); font-weight:600; }
    .sq-amount { font-weight:700; font-family:monospace; }
    .sq-table { width:100%; border-collapse:collapse; font-size:13px; }
    .sq-table th { background:var(--bg-light); padding:10px 14px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); }
    .sq-table td { padding:10px 14px; border-bottom:1px solid var(--border-light); vertical-align:middle; }
    .sq-table tr:hover td { background:var(--bg-hover); }
    .sq-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:600; align-items:center; justify-content:center; }
    .sq-modal-overlay.show { display:flex; }
    .sq-modal { background:var(--bg-white); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:700px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .sq-modal-header { padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
    .sq-modal-header h3 { font-size:16px; font-weight:700; }
    .sq-modal-body { padding:20px; }
    .sq-modal-footer { padding:12px 20px; border-top:1px solid var(--border-light); display:flex; gap:8px; justify-content:flex-end; }
    .sq-fg { margin-bottom:10px; }
    .sq-fg label { display:block; font-size:11px; font-weight:600; color:var(--text-secondary); margin-bottom:3px; }
    .sq-fg input, .sq-fg select, .sq-fg textarea { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); font-size:12px; box-sizing:border-box; background:var(--bg-white); }
    .sq-fg input:focus, .sq-fg select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
    .sq-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .close-btn { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-muted); line-height:1; }
    .close-btn:hover { color:var(--text-primary); }
    .btn-sm { font-size:12px; padding:6px 14px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; font-weight:600; background:var(--bg-white); color:var(--text-primary); }
    .btn-sm:hover { background:var(--bg-hover); }
    .btn-primary { background:var(--primary); color:white; border-color:var(--primary); }
    .btn-primary:hover { filter:brightness(0.9); }
    .btn-danger { background:var(--danger); color:white; border-color:var(--danger); }
    .btn-success { background:var(--success,#0f9d58); color:white; border-color:var(--success,#0f9d58); }
    .btn-warning { background:#f59e0b; color:white; border-color:#f59e0b; }
    .del-btn { border:none; background:none; color:var(--danger); cursor:pointer; font-size:16px; }
    .detail-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
    .detail-header h1 { font-size:20px; font-weight:800; margin:0; }
    .detail-header .sub { font-size:13px; color:var(--text-secondary); }
    .back-link { font-size:13px; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:4px; margin-bottom:12px; }
    .back-link:hover { text-decoration:underline; }
    .info-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
    .info-card { background:var(--bg-white); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; }
    .info-card .lbl { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; margin-bottom:2px; }
    .info-card .val { font-size:14px; font-weight:700; }
    .tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; }
    .tab-btn { padding:10px 20px; font-size:13px; font-weight:600; background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; cursor:pointer; color:var(--text-muted); }
    .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
    .tab-btn:hover { color:var(--text-primary); }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .score-matrix { width:100%; border-collapse:collapse; font-size:13px; }
    .score-matrix th, .score-matrix td { padding:10px 14px; border:1px solid var(--border-light); text-align:center; }
    .score-matrix th { background:var(--bg-light); font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted); }
    .score-matrix input[type="number"] { width:60px; padding:4px 6px; border:1px solid var(--border); border-radius:var(--radius); text-align:center; font-size:12px; }
    @media (max-width:768px) { .info-cards { grid-template-columns:1fr 1fr; } .sq-info-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <a href="tenders.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back to Tenders</a>

    <div class="detail-header" id="detailHeader">
      <div>
        <h1 id="tenderTitle">Loading...</h1>
        <div class="sub" id="tenderSub"></div>
      </div>
      <div id="statusBadge"></div>
      <div style="margin-left:auto;display:flex;gap:8px;" id="actionButtons"></div>
    </div>

    <div class="info-cards" id="infoCards"></div>

    <!-- Remarks -->
    <div style="margin-bottom:20px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px;">Remarks / หมายเหตุ</label>
        <button class="btn-sm" id="saveRemarksBtn" onclick="saveRemarks()" style="font-size:11px;padding:3px 10px;display:none;">Save</button>
      </div>
      <textarea id="tenderRemarks" rows="2" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);resize:vertical;box-sizing:border-box;background:var(--bg-white);" placeholder="เพิ่มหมายเหตุ..." oninput="document.getElementById('saveRemarksBtn').style.display=''"></textarea>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('items')">Items</button>
      <button class="tab-btn" onclick="switchTab('vendors')">Vendors</button>
      <button class="tab-btn" onclick="switchTab('evaluation')">Evaluation</button>
    </div>

    <!-- Items Tab -->
    <div class="tab-content active" id="tab-items">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="font-size:14px;font-weight:700;margin:0;">Tender Items</h3>
        <button class="btn-sm btn-primary" id="addItemBtn" onclick="openItemModal(true)">+ Add Item</button>
      </div>
      <div id="itemsTable"></div>
    </div>

    <!-- Vendors Tab -->
    <div class="tab-content" id="tab-vendors">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="font-size:14px;font-weight:700;margin:0;">Invited Vendors</h3>
        <button class="btn-sm btn-primary" onclick="openVendorModal()">+ Invite Vendor</button>
      </div>
      <div id="vendorsTable"></div>
    </div>

    <!-- Evaluation Tab -->
    <div class="tab-content" id="tab-evaluation">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="font-size:14px;font-weight:700;margin:0;">Scoring Matrix</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn-sm btn-primary" onclick="saveScores()" id="saveScoresBtn">Save Scores</button>
          <button class="btn-sm btn-success" onclick="awardTender()" id="awardBtn" style="display:none;">Award Tender</button>
        </div>
      </div>
      <div id="evalMatrix"></div>
    </div>
  </main>
  </div>

  <!-- Item Modal -->
  <div class="sq-modal-overlay" id="itemModal" onclick="if(event.target===this)closeItemModal()">
    <div class="sq-modal" style="width:600px;">
      <div class="sq-modal-header">
        <h3 id="itemModalTitle">Add Item</h3>
        <button class="close-btn" onclick="closeItemModal()">&times;</button>
      </div>
      <div class="sq-modal-body" id="itemModalBody"></div>
      <div class="sq-modal-footer" id="itemModalFooter"></div>
    </div>
  </div>

  <!-- Vendor Modal -->
  <div class="sq-modal-overlay" id="vendorModal" onclick="if(event.target===this)closeVendorModal()">
    <div class="sq-modal" style="width:500px;">
      <div class="sq-modal-header">
        <h3>Invite Vendor</h3>
        <button class="close-btn" onclick="closeVendorModal()">&times;</button>
      </div>
      <div class="sq-modal-body" id="vendorModalBody"></div>
      <div class="sq-modal-footer" id="vendorModalFooter"></div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/item-picker.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    const tenderId = new URLSearchParams(location.search).get('id');
    let tender = null;
    let tenderItems = [];
    let tenderVendors = [];
    let editItemIdx = -1;

    function statusStyle(s) {
      return ({
        draft:'background:#e2e3e5;color:#383d41',
        published:'background:#dbeafe;color:#1d4ed8',
        closed:'background:#fef3c7;color:#92400e',
        evaluating:'background:#e0e7ff;color:#3730a3',
        awarded:'background:#d4edda;color:#155724',
        cancelled:'background:#f8d7da;color:#721c24'
      }[s]||'background:#e2e3e5;color:#383d41');
    }

    function typeLabel(t) {
      return ({direct_purchase:'Direct Purchase',price_comparison:'Price Comparison',bidding:'Bidding'}[t]||t||'-');
    }

    // Auto-fill item fields when selecting from dropdown
    function onTenderItemSelect(sel) {
      const opt = sel.selectedOptions[0];
      if (!opt || !opt.value) return;
      const name = opt.getAttribute('data-name') || opt.textContent.split(' — ')[1] || '';
      const uom = opt.getAttribute('data-uom') || 'EA';
      const price = opt.getAttribute('data-price') || '0';
      document.getElementById('imName').value = name;
      document.getElementById('imUom').value = uom;
      document.getElementById('imPrice').value = price;
    }

    async function loadData() {
      if (!tenderId) { window.location='tenders.html'; return; }
      // Load item master for dropdown
      try { await loadMasterItems(); } catch(e) {}
      try {
        tender = await API.get('/tenders/'+tenderId);
        tenderItems = tender.items || [];
        tenderVendors = tender.vendors || [];
      } catch(e) {
        typeof showToast==='function' && showToast(e.message,'error');
        return;
      }
      renderHeader();
      renderItems();
      renderVendors();
      renderEvaluation();
    }

    function renderHeader() {
      document.getElementById('tenderTitle').textContent = (tender.tender_number||'Tender') + ' — ' + (tender.title||'');
      document.getElementById('tenderSub').textContent = typeLabel(tender.tender_type);
      document.getElementById('statusBadge').innerHTML = `<span class="sq-badge" style="${statusStyle(tender.status)}">${tender.status||'-'}</span>`;

      const isDraft = tender.status === 'draft';
      const isTerminal = tender.status === 'cancelled' || tender.status === 'awarded';
      const canEditItems = !isTerminal; // items editable in draft, published, closed, evaluating
      let btns = '';
      if (isDraft) btns += `<button class="btn-sm" onclick="openEditHeaderModal()">Edit Info</button>`;
      if (isDraft) btns += `<button class="btn-sm btn-primary" onclick="changeStatus('published')">Publish</button>`;
      if (tender.status==='published') btns += `<button class="btn-sm btn-warning" onclick="changeStatus('closed')">Close Tender</button>`;
      if (tender.status==='closed' || tender.status==='evaluating') btns += `<button class="btn-sm btn-success" onclick="awardTender()">Award</button>`;
      document.getElementById('actionButtons').innerHTML = btns;

      // Show/hide Add Item button based on status
      const addItemBtn = document.getElementById('addItemBtn');
      if (addItemBtn) addItemBtn.style.display = canEditItems ? '' : 'none';

      document.getElementById('infoCards').innerHTML = `
        <div class="info-card"><div class="lbl">Budget</div><div class="val sq-amount">${fmtNum(tender.budget_amount||0)}</div></div>
        <div class="info-card"><div class="lbl">Open Date</div><div class="val">${tender.opening_date?new Date(tender.opening_date).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}):'-'}</div></div>
        <div class="info-card"><div class="lbl">Close Date</div><div class="val">${tender.close_date?new Date(tender.close_date).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}):'-'}</div></div>
        <div class="info-card"><div class="lbl">Items</div><div class="val">${tenderItems.length}</div></div>
        <div class="info-card"><div class="lbl">Vendors</div><div class="val">${tenderVendors.length}</div></div>`;

      // Populate remarks
      const remarksEl = document.getElementById('tenderRemarks');
      if (remarksEl) { remarksEl.value = tender.remarks || tender.terms_conditions || ''; }
      document.getElementById('saveRemarksBtn').style.display = 'none';

      // Show/hide eval buttons based on status
      const awardBtn = document.getElementById('awardBtn');
      const saveScoresBtn = document.getElementById('saveScoresBtn');
      if (awardBtn) awardBtn.style.display = (tender.status==='closed' || tender.status==='evaluating') ? '' : 'none';
      if (saveScoresBtn) saveScoresBtn.style.display = isTerminal ? 'none' : '';
    }

    // ════════════════════════════════
    //  TABS
    // ════════════════════════════════
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      document.getElementById('tab-'+tab).classList.add('active');
      document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
    }

    // ════════════════════════════════
    //  ITEMS TAB
    // ════════════════════════════════
    function renderItems() {
      const canEdit = tender && tender.status !== 'cancelled' && tender.status !== 'awarded';
      if (!tenderItems.length) {
        document.getElementById('itemsTable').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">No items added yet</div>';
        return;
      }
      let h='<table class="sq-table"><thead><tr><th>#</th><th>Item Code</th><th>Item Name</th><th>Qty</th><th>UOM</th><th>Estimated Price</th><th>Total</th>'+(canEdit?'<th></th>':'')+'</tr></thead><tbody>';
      tenderItems.forEach((it,i)=>{
        const total = (parseFloat(it.quantity)||0)*(parseFloat(it.estimated_price)||0);
        h+=`<tr>
          <td>${i+1}</td>
          <td style="font-weight:600">${it.item_code||'-'}</td>
          <td>${it.item_name||'-'}</td>
          <td>${it.quantity||0}</td>
          <td>${it.uom||'EA'}</td>
          <td class="sq-amount">${fmtNum(it.estimated_price||0)}</td>
          <td class="sq-amount">${fmtNum(total)}</td>`;
        if (canEdit) {
          h+=`<td>
            <button class="btn-sm" onclick="openItemModal(false,${i})" style="font-size:11px;padding:2px 8px;">Edit</button>
            <button class="del-btn" onclick="removeItem(${i})">x</button>
          </td>`;
        }
        h+=`</tr>`;
      });
      const grandTotal = tenderItems.reduce((s,it)=>s+(parseFloat(it.quantity)||0)*(parseFloat(it.estimated_price)||0),0);
      h+=`<tr><td colspan="6" style="text-align:right;font-weight:700">Total</td><td class="sq-amount" style="font-weight:800">${fmtNum(grandTotal)}</td><td></td></tr>`;
      h+='</tbody></table>';
      document.getElementById('itemsTable').innerHTML=h;
    }

    function openItemModal(isNew, idx) {
      editItemIdx = isNew ? -1 : idx;
      const it = isNew ? {} : tenderItems[idx];
      document.getElementById('itemModalTitle').textContent = isNew ? 'Add Item' : 'Edit Item';
      document.getElementById('itemModalBody').innerHTML = `
        <div class="sq-info-grid">
          <div class="sq-fg"><label>Item</label><select id="imCode" class="searchable" onchange="onTenderItemSelect(this)" style="width:100%;">${buildItemOptions(it.item_code||'')}</select></div>
          <div class="sq-fg"><label>Item Name</label><input type="text" id="imName" value="${it.item_name||''}" placeholder="Auto-fill from item or type manually"></div>
          <div class="sq-fg"><label>Quantity</label><input type="number" id="imQty" value="${it.quantity||1}" min="0"></div>
          <div class="sq-fg"><label>UOM</label><input type="text" id="imUom" value="${it.uom||'EA'}"></div>
          <div class="sq-fg"><label>Estimated Unit Price</label><input type="number" id="imPrice" value="${it.estimated_price||0}" min="0"></div>
        </div>`;
      // Make searchable if available
      const sel = document.getElementById('imCode');
      if (sel && typeof makeSearchable === 'function') makeSearchable(sel);
      document.getElementById('itemModalFooter').innerHTML = `
        <button class="btn-sm btn-primary" onclick="saveItem()">${isNew?'Add':'Update'}</button>
        <button class="btn-sm" onclick="closeItemModal()">Cancel</button>`;
      document.getElementById('itemModal').classList.add('show');
    }

    async function saveItem() {
      const item = {
        item_code: document.getElementById('imCode').value,
        item_name: document.getElementById('imName').value,
        quantity: parseFloat(document.getElementById('imQty').value)||0,
        uom: document.getElementById('imUom').value||'EA',
        estimated_price: parseFloat(document.getElementById('imPrice').value)||0,
      };
      if (editItemIdx === -1) {
        tenderItems.push(item);
      } else {
        tenderItems[editItemIdx] = item;
      }
      try {
        await API.put('/tenders/'+tenderId, { items: tenderItems });
        typeof showToast==='function' && showToast('Item saved','success');
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
      closeItemModal();
      renderItems();
    }

    async function removeItem(idx) {
      if (!confirm('Remove this item?')) return;
      tenderItems.splice(idx,1);
      try {
        await API.put('/tenders/'+tenderId, { items: tenderItems });
        typeof showToast==='function' && showToast('Item removed','success');
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
      renderItems();
    }

    function closeItemModal() { document.getElementById('itemModal').classList.remove('show'); }

    // ════════════════════════════════
    //  VENDORS TAB
    // ════════════════════════════════
    function renderVendors() {
      if (!tenderVendors.length) {
        document.getElementById('vendorsTable').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">No vendors invited yet</div>';
        return;
      }
      const vendorStatusStyle = s => ({
        invited:'background:#dbeafe;color:#1d4ed8',
        submitted:'background:#d4edda;color:#155724',
        declined:'background:#f8d7da;color:#721c24',
        awarded:'background:#fef3c7;color:#92400e'
      }[s]||'background:#e2e3e5;color:#383d41');

      let h='<table class="sq-table"><thead><tr><th style="width:30px">#</th><th>Vendor Name</th><th>Contact</th><th style="width:90px;text-align:center">Status</th><th>Submitted Date</th><th style="text-align:right">Total Price</th><th style="text-align:center;width:60px">Score</th><th>Notes / หมายเหตุ</th><th style="width:80px"></th></tr></thead><tbody>';
      tenderVendors.forEach((v,i)=>{
        h+=`<tr>
          <td>${i+1}</td>
          <td style="font-weight:600">${v.vendor_name||'-'}</td>
          <td style="font-size:12px;color:var(--text-secondary)">${v.contact||'-'}</td>
          <td style="text-align:center"><span class="sq-badge" style="${vendorStatusStyle(v.status)}">${v.status||'invited'}</span></td>
          <td style="font-size:12px">${v.submitted_date?new Date(v.submitted_date).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}):'-'}</td>
          <td class="sq-amount" style="text-align:right">${v.total_price?fmtNum(v.total_price):'–'}</td>
          <td style="font-weight:700;text-align:center">${v.evaluation_score!=null?v.evaluation_score:(v.score!=null?v.score:'-')}</td>
          <td style="font-size:12px;color:var(--text-secondary);max-width:200px;">${v.evaluation_notes||'-'}</td>
          <td>
            <div style="display:flex;gap:4px;">
              <button class="btn-sm" onclick="openEditVendorModal(${i})" style="font-size:10px;padding:2px 8px;">Edit</button>
              <button class="del-btn" onclick="removeVendor(${i})" title="Remove">x</button>
            </div>
          </td></tr>`;
      });
      h+='</tbody></table>';
      document.getElementById('vendorsTable').innerHTML=h;
    }

    let editVendorIdx = -1;

    function openVendorModal() {
      editVendorIdx = -1;
      document.getElementById('vendorModalBody').innerHTML = `
        <div class="sq-fg"><label>Vendor Name</label><input type="text" id="vmName"></div>
        <div class="sq-fg"><label>Contact (Email / Phone)</label><input type="text" id="vmContact"></div>
        <div class="sq-fg"><label>Notes / หมายเหตุ</label><textarea id="vmNotes" rows="2" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;box-sizing:border-box;resize:vertical;font-family:var(--font);" placeholder="หมายเหตุเพิ่มเติม..."></textarea></div>`;
      document.getElementById('vendorModalFooter').innerHTML = `
        <button class="btn-sm btn-primary" onclick="saveVendor()">Invite</button>
        <button class="btn-sm" onclick="closeVendorModal()">Cancel</button>`;
      document.getElementById('vendorModal').classList.add('show');
    }

    function openEditVendorModal(idx) {
      editVendorIdx = idx;
      const v = tenderVendors[idx];
      document.getElementById('vendorModalBody').innerHTML = `
        <div class="sq-fg"><label>Vendor Name</label><input type="text" id="vmName" value="${v.vendor_name||''}"></div>
        <div class="sq-fg"><label>Contact (Email / Phone)</label><input type="text" id="vmContact" value="${v.contact||''}"></div>
        <div class="sq-info-grid">
          <div class="sq-fg"><label>Status</label><select id="vmStatus">
            <option value="invited" ${v.status==='invited'?'selected':''}>Invited</option>
            <option value="submitted" ${v.status==='submitted'?'selected':''}>Submitted</option>
            <option value="qualified" ${v.status==='qualified'?'selected':''}>Qualified</option>
            <option value="disqualified" ${v.status==='disqualified'?'selected':''}>Disqualified</option>
          </select></div>
          <div class="sq-fg"><label>Submitted Date</label><input type="date" id="vmSubmittedDate" value="${v.submitted_date?v.submitted_date.substring(0,10):''}"></div>
        </div>
        <div class="sq-fg"><label>Total Price</label><input type="number" id="vmTotalPrice" value="${v.total_price||''}" placeholder="0.00" step="0.01"></div>
        <div class="sq-fg"><label>Notes / หมายเหตุ</label><textarea id="vmNotes" rows="2" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;box-sizing:border-box;resize:vertical;font-family:var(--font);">${v.notes||''}</textarea></div>`;
      document.getElementById('vendorModalFooter').innerHTML = `
        <button class="btn-sm btn-primary" onclick="saveVendor()">Save</button>
        <button class="btn-sm" onclick="closeVendorModal()">Cancel</button>`;
      document.getElementById('vendorModal').classList.add('show');
    }

    async function saveVendor() {
      const data = {
        vendor_name: document.getElementById('vmName').value,
        contact: document.getElementById('vmContact').value || '',
        evaluation_notes: document.getElementById('vmNotes').value || '',
      };
      if (editVendorIdx === -1) {
        data.status = 'invited';
        tenderVendors.push(data);
      } else {
        const statusEl = document.getElementById('vmStatus');
        const dateEl = document.getElementById('vmSubmittedDate');
        const priceEl = document.getElementById('vmTotalPrice');
        if (statusEl) data.status = statusEl.value;
        if (dateEl) data.submitted_date = dateEl.value||null;
        if (priceEl) data.total_price = parseFloat(priceEl.value)||null;
        // Preserve existing scores
        data.evaluation_score = tenderVendors[editVendorIdx].evaluation_score || tenderVendors[editVendorIdx].score;
        tenderVendors[editVendorIdx] = { ...tenderVendors[editVendorIdx], ...data };
      }
      try {
        await API.put('/tenders/'+tenderId, { vendors: tenderVendors });
        typeof showToast==='function' && showToast(editVendorIdx===-1?'Vendor invited':'Vendor updated','success');
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
      closeVendorModal();
      renderVendors();
      renderEvaluation();
    }

    async function removeVendor(idx) {
      if (!confirm('Remove this vendor?')) return;
      tenderVendors.splice(idx,1);
      try {
        await API.put('/tenders/'+tenderId, { vendors: tenderVendors });
        typeof showToast==='function' && showToast('Vendor removed','success');
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
      renderVendors();
      renderEvaluation();
    }

    function closeVendorModal() { document.getElementById('vendorModal').classList.remove('show'); }

    // ════════════════════════════════
    //  EVALUATION TAB
    // ════════════════════════════════
    async function saveScores() {
      try {
        // Collect all scores from inputs
        const rows = document.querySelectorAll('.score-matrix tbody tr');
        const submittedVendors = tenderVendors.filter(v=>v.status==='submitted'||v.total_price||v.status==='invited');
        rows.forEach((row, i) => {
          const inputs = row.querySelectorAll('input[type="number"]');
          const v = submittedVendors[i];
          if (!v) return;
          if (!v.scores) v.scores = {};
          const criteria = parseCriteria();
          inputs.forEach((inp, j) => {
            const key = criteria[j]?.key || ('c'+j);
            v.scores[key] = parseFloat(inp.value)||0;
          });
          v.evaluation_score = Object.values(v.scores).reduce((s,val)=>s+(parseFloat(val)||0),0);
        });
        await API.put('/tenders/'+tenderId, { vendors: tenderVendors });
        showToast('Scores saved', 'success');
        await loadData();
      } catch(e) { showToast(e.message, 'error'); }
    }

    function parseCriteria() {
      let raw = tender.evaluation_criteria;
      // Handle JSON array format [{name,weight}] or string "Price,Quality"
      if (typeof raw === 'string') {
        try { raw = JSON.parse(raw); } catch(e) { return raw.split(',').map(c=>({name:c.trim(),key:c.trim().toLowerCase().replace(/\s+/g,'_')})); }
      }
      if (Array.isArray(raw)) return raw.map(c=>({name:c.name||c,key:(c.name||c).toLowerCase().replace(/[^a-z0-9]+/g,'_'),weight:c.weight}));
      return [{name:'Price',key:'price'},{name:'Quality',key:'quality'},{name:'Delivery',key:'delivery'}];
    }

    function renderEvaluation() {
      const criteria = parseCriteria();
      // Show all vendors (not just submitted) so user can score anyone
      const submittedVendors = tenderVendors.filter(v=>v.status==='submitted'||v.total_price||v.status==='invited');

      if (!submittedVendors.length) {
        document.getElementById('evalMatrix').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">No vendor submissions to evaluate yet</div>';
        return;
      }

      let h='<table class="score-matrix"><thead><tr><th>Vendor</th><th>Total Price</th>';
      criteria.forEach(c=>{ h+=`<th>${c.name||c}${c.weight?' ('+c.weight+'%)':''}<br><span style="font-size:9px;font-weight:400">(1-10)</span></th>`; });
      h+='<th>Total Score</th></tr></thead><tbody>';

      submittedVendors.forEach((v,i)=>{
        const scores = v.scores || {};
        let totalScore = 0;
        h+=`<tr><td style="font-weight:600">${v.vendor_name}</td><td class="sq-amount">${fmtNum(v.total_price||0)}</td>`;
        criteria.forEach(c=>{
          const key = c.key || (c.name||c).toLowerCase().replace(/[^a-z0-9]+/g,'_');
          const val = scores[key]||'';
          totalScore += parseFloat(val)||0;
          h+=`<td><input type="number" min="1" max="10" value="${val}" style="width:60px;text-align:center;padding:4px;"></td>`;
        });
        h+=`<td style="font-weight:800;font-size:16px">${totalScore||'-'}</td></tr>`;
      });
      h+='</tbody></table>';
      document.getElementById('evalMatrix').innerHTML=h;
    }

    async function updateScore(vendorIdx, criteriaKey, value) {
      if (!tenderVendors[vendorIdx].scores) tenderVendors[vendorIdx].scores = {};
      tenderVendors[vendorIdx].scores[criteriaKey] = parseFloat(value)||0;
      // Recalc total score
      const scores = tenderVendors[vendorIdx].scores;
      tenderVendors[vendorIdx].score = Object.values(scores).reduce((s,v)=>s+(parseFloat(v)||0),0);
      try {
        await API.put('/tenders/'+tenderId, { vendors: tenderVendors });
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
      renderEvaluation();
      renderVendors();
    }

    async function awardTender() {
      // Find vendor with highest score
      const scored = tenderVendors.filter(v=>v.evaluation_score||v.score).sort((a,b)=>(b.evaluation_score||b.score||0)-(a.evaluation_score||a.score||0));
      if (!scored.length) {
        typeof showToast==='function' && showToast('No scored vendors to award','warning');
        return;
      }
      const winner = scored[0];
      if (!confirm(`Award tender to "${winner.vendor_name}" (Score: ${winner.evaluation_score||winner.score})?`)) return;
      try {
        await API.post('/tenders/'+tenderId+'/award', { vendor_id: winner.id });
        typeof showToast==='function' && showToast('Tender awarded to '+winner.vendor_name,'success');
        loadData();
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    // ════════════════════════════════
    //  SAVE REMARKS
    // ════════════════════════════════
    async function saveRemarks() {
      const remarks = document.getElementById('tenderRemarks').value;
      try {
        await API.put('/tenders/'+tenderId, { remarks });
        tender.remarks = remarks;
        typeof showToast==='function' && showToast('Remarks saved','success');
        document.getElementById('saveRemarksBtn').style.display = 'none';
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    // ════════════════════════════════
    //  EDIT HEADER INFO
    // ════════════════════════════════
    function openEditHeaderModal() {
      const t = tender;
      document.getElementById('vendorModalBody').innerHTML = `
        <div class="sq-fg"><label>Title</label><input type="text" id="ehTitle" value="${t.title||''}"></div>
        <div class="sq-info-grid">
          <div class="sq-fg"><label>Tender Type</label><select id="ehType">
            <option value="direct_purchase" ${t.tender_type==='direct_purchase'?'selected':''}>Direct Purchase</option>
            <option value="price_comparison" ${t.tender_type==='price_comparison'?'selected':''}>Price Comparison</option>
            <option value="bidding" ${t.tender_type==='bidding'?'selected':''}>Bidding</option>
          </select></div>
          <div class="sq-fg"><label>Budget</label><input type="number" id="ehBudget" value="${t.budget_amount||''}" step="0.01"></div>
        </div>
        <div class="sq-info-grid">
          <div class="sq-fg"><label>Open Date</label><input type="date" id="ehOpenDate" value="${t.opening_date?t.opening_date.substring(0,10):''}"></div>
          <div class="sq-fg"><label>Close Date</label><input type="date" id="ehCloseDate" value="${t.close_date?t.close_date.substring(0,10):''}"></div>
        </div>
        <div class="sq-fg"><label>Evaluation Criteria (comma-separated)</label><input type="text" id="ehCriteria" value="${t.evaluation_criteria||''}" placeholder="Price, Quality, Delivery"></div>`;
      document.getElementById('vendorModalFooter').innerHTML = `
        <button class="btn-sm btn-primary" onclick="saveHeaderInfo()">Save</button>
        <button class="btn-sm" onclick="closeVendorModal()">Cancel</button>`;
      document.getElementById('vendorModal').classList.add('show');
    }

    async function saveHeaderInfo() {
      const data = {
        title: document.getElementById('ehTitle').value,
        tender_type: document.getElementById('ehType').value,
        budget_amount: parseFloat(document.getElementById('ehBudget').value)||0,
        opening_date: document.getElementById('ehOpenDate').value||null,
        close_date: document.getElementById('ehCloseDate').value||null,
        evaluation_criteria: document.getElementById('ehCriteria').value||null,
      };
      try {
        await API.put('/tenders/'+tenderId, data);
        typeof showToast==='function' && showToast('Tender info updated','success');
        closeVendorModal();
        loadData();
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    async function changeStatus(status) {
      if (!confirm(`Change status to "${status}"?`)) return;
      try {
        const endpointMap = { published: 'publish', closed: 'close' };
        const endpoint = endpointMap[status];
        if (endpoint) {
          await API.post('/tenders/'+tenderId+'/'+endpoint);
        } else {
          await API.put('/tenders/'+tenderId, { status });
        }
        typeof showToast==='function' && showToast('Status updated','success');
        loadData();
      } catch(e) { typeof showToast==='function' && showToast(e.message,'error'); }
    }

    // Init
    if (API.requireAuth()) {
      loadData();
    }
  </script>
</body>
</html>
