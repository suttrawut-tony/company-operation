<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="prpo_page_title">Company Operation — PR/PO</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    /* PR/PO specific */
    .view-switch {
      display: flex; gap: 4px; background: var(--bg-light);
      border-radius: var(--radius); padding: 3px;
    }
    .view-switch button {
      padding: 6px 14px; border: none; background: none;
      border-radius: 6px; font-size: 12px; font-weight: 500;
      cursor: pointer; color: var(--text-secondary); font-family: var(--font);
      transition: all 0.15s;
    }
    .view-switch button.active { background: var(--bg-white); color: var(--text-primary); box-shadow: var(--shadow-xs); }

    .pr-po-tabs {
      display: flex; gap: 0; margin-bottom: 20px;
    }
    .pr-po-tab {
      padding: 10px 24px; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .pr-po-tab:hover { color: var(--text-primary); }
    .pr-po-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .pr-po-tab .count {
      background: var(--bg-hover); color: var(--text-secondary);
      font-size: 10px; padding: 1px 7px; border-radius: var(--radius-full);
      margin-left: 6px; font-weight: 600;
    }
    .pr-po-tab.active .count { background: var(--primary-light); color: var(--primary); }

    /* Kanban */
    .kanban { min-height: 520px; }
    .kanban-column-header .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .kanban-card-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px;
    }
    .kanban-card-id { font-size: 11px; font-weight: 600; color: var(--primary); }
    .kanban-card-amount { font-size: 14px; font-weight: 700; margin: 6px 0; }
    .kanban-card-detail { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
    .kanban-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 8px; border-top: 1px solid var(--border-light);
    }
    .kanban-card-footer .requester {
      display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary);
    }
    .kanban-card-footer .date { font-size: 10px; color: var(--text-muted); }
    .priority-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .sap-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--info); font-weight: 600;
      background: var(--info-bg); padding: 2px 8px; border-radius: var(--radius-full);
    }
    .sap-doc-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: #0369a1; font-weight: 700;
      background: #e0f2fe; padding: 4px 10px; border-radius: var(--radius-full);
      margin-top: 4px;
    }
    .sap-doc-badge svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* List View */
    .list-table .doc-id {
      color: var(--primary); font-weight: 600; cursor: pointer;
    }
    .list-table .doc-id:hover { text-decoration: underline; }
    .list-table .amount { font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }

    /* Stats mini */
    .mini-stats {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 20px;
    }
    .mini-stat {
      background: var(--bg-white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; text-align: center;
    }
    .mini-stat .val { font-size: 22px; font-weight: 800; }
    .mini-stat .lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* Modal Form */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .item-table { width: 100%; margin-top: 12px; }
    .item-table th { font-size: 11px; text-transform: uppercase; }
    .item-table td { padding: 8px; }
    .item-table input, .item-table select {
      width: 100%; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font);
    }

    /* Drag & Drop */
    .kanban-card[draggable="true"] { transition: opacity 0.15s; cursor: grab; }
    .kanban-card[draggable="true"]:active { cursor: grabbing; }
    .kanban-body { min-height: 200px; flex: 1; padding-bottom: 40px; }
    .kanban-body.kanban-drop-target {
      background: var(--primary-light, rgba(59,130,246,0.06));
      outline: 2px dashed var(--primary, #3b82f6);
      outline-offset: -2px;
      border-radius: var(--radius);
    }
    .kanban-body.kanban-drop-target * { pointer-events: none; }
    .kanban-column { display: flex; flex-direction: column; }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>

  <!-- Tab Bar -->
  <div id="tabbar"></div>
  <main class="page fade-in">
    <!-- Header -->
    <div class="page-header">
      <div>
        <h1><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg> <span data-i18n="prpo_title">Purchase Request / Purchase Order</span></h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" onclick="exportPRPO()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> <span data-i18n="btn_export_excel">Export Excel</span></button>
        <div class="view-switch">
          <button class="active" onclick="switchPRView('kanban')">&#9638; <span data-i18n="prpo_view_kanban">Kanban</span></button>
          <button onclick="switchPRView('list')">&#9776; <span data-i18n="prpo_view_list">List</span></button>
        </div>
        <div id="btn-new-doc" style="position:relative;">
          <button class="btn btn-primary" id="btn-new-main" onclick="newDocClick()" data-i18n="btn_new_pr">+ New PR</button>
          <div id="new-doc-dropdown" style="display:none;position:absolute;right:0;top:100%;margin-top:4px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);min-width:160px;z-index:100;">
            <a href="doc-detail.html?type=pr&mode=new" style="display:block;padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-primary);text-decoration:none;border-bottom:1px solid var(--border-light);" data-i18n="btn_new_pr">+ New PR</a>
            <a href="doc-detail.html?type=po&mode=new" style="display:block;padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-primary);text-decoration:none;" data-i18n="btn_new_po">+ New PO</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Sub-tabs (dynamic) -->
    <div class="pr-po-tabs" id="pr-tabs"></div>

    <!-- Filters -->
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;">
      <select class="form-select" id="pr-filter-project" onchange="refresh()" style="width:180px;">
        <option value="" data-i18n="prpo_filter_all_projects">All Projects</option>
      </select>
    </div>

    <!-- Mini Stats (dynamic) -->
    <div class="mini-stats" id="pr-stats"></div>

    <!-- ═══ KANBAN VIEW ═══ -->
    <div id="view-kanban"><div class="kanban" id="kanban-board">Loading...</div></div>

    <!-- ═══ LIST VIEW ═══ -->
    <div id="view-list" class="hidden">
      <div class="card">
        <div class="card-header"><h2 id="list-title" data-i18n="prpo_label_all_purchase_requests">All Purchase Requests</h2></div>
        <div class="table-container">
          <table class="list-table">
            <thead><tr>
              <th data-i18n="prpo_th_doc_no">Doc No.</th><th data-i18n="prpo_th_erp_doc_no">ERP Doc No.</th><th data-i18n="prpo_th_date">Date</th><th data-i18n="prpo_th_project">Project</th><th data-i18n="prpo_th_vendor">Vendor</th><th data-i18n="prpo_th_requester">Requester</th>
              <th style="text-align:right;" data-i18n="prpo_th_amount">Amount</th><th data-i18n="prpo_th_status">Status</th><th data-i18n="prpo_th_actions">Actions</th>
            </tr></thead>
            <tbody id="list-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
  </div><!-- end main-wrapper -->

  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/highlight.js"></script>
  <script src="assets/js/excel-export.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    let allPRs = [];
    let allPOs = [];
    let allProjects = [];
    let docType = 'pr'; // pr, po, all
    const userRole = (API.getUser() || {}).role || '';

    function exportPRPO() {
      const items = docType === 'po' ? allPOs : docType === 'pr' ? allPRs : [...allPRs, ...allPOs];
      const data = items.map(d => ({
        'Doc No': d.doc_number || '',
        'Type': d._type || docType.toUpperCase(),
        'Date': fmtDate(d.doc_date || d.created_at),
        'Project': d._project_code || d.project_code || '',
        'Vendor': d.vendor_name || '',
        'Requester': d._requester_name || d.requester_name || '',
        'Amount': parseFloat(d.total_amount || 0),
        'Status': (d.status || '').replace(/_/g, ' '),
        'ERP Doc No': d.sap_doc_number || '',
      }));
      exportExcel(data, docType === 'all' ? 'PR_PO' : docType.toUpperCase());
    }

    async function deletePR(id, doc) {
      if (!confirm('Delete ' + doc + '?')) return;
      try { await API.del('/pr/' + id); await loadPRPO(); showToast('Deleted ' + doc); }
      catch(e) { showToast('Error: ' + e.message, 'error'); }
    }
    async function deletePO(id, doc) {
      if (!confirm('Delete ' + doc + '?')) return;
      try { await API.del('/po/' + id); await loadPRPO(); showToast('Deleted ' + doc); }
      catch(e) { showToast('Error: ' + e.message, 'error'); }
    }

    const COLUMNS = [
      { status: 'draft', label: 'Draft', color: 'var(--text-muted)', dropStatus: 'draft' },
      { status: 'pending', label: 'Pending Approval', color: 'var(--warning)', match: s => s.includes('pending'), dropStatus: 'pending_manager' },
      { status: 'approved', label: 'Approved', color: 'var(--success)', dropStatus: 'approved' },
      { status: 'sent_to_erp', label: 'Sent to ERP', color: 'var(--primary)', dropStatus: 'sent_to_erp' },
      { status: 'received', label: 'Received', color: 'var(--info)', dropStatus: 'received' },
    ];

    async function loadPRPO() {
      try {
        [allPRs, allPOs, allProjects] = await Promise.all([API.getPRs(), API.getPOs(), API.getProjects()]);

        // Populate project filter
        const projSelect = document.getElementById('pr-filter-project');
        projSelect.innerHTML = '<option value="" data-i18n="prpo_filter_all_projects">All Projects</option>' +
          allProjects.map(p => `<option value="${p.id}">${p.code} — ${p.name}</option>`).join('');

        // Map project codes
        allPRs.forEach(d => {
          const proj = allProjects.find(p => p.id === d.project_id);
          d._project_code = proj ? proj.code : '';
        });
        allPOs.forEach(d => {
          const proj = allProjects.find(p => p.id === d.project_id);
          d._project_code = proj ? proj.code : '';
        });

        renderTabs();
        renderStats();
        renderKanban();
        renderList();
      } catch(e) {
        document.getElementById('kanban-board').innerHTML = emptyMsg('Error: ' + e.message);
      }
    }

    function getDocs() {
      const projectFilter = document.getElementById('pr-filter-project')?.value || '';
      let docs;
      if (docType === 'pr') docs = allPRs;
      else if (docType === 'po') docs = allPOs;
      else docs = [...allPRs, ...allPOs];
      if (projectFilter) docs = docs.filter(d => d.project_id === projectFilter);
      return docs;
    }

    function renderTabs() {
      document.getElementById('pr-tabs').innerHTML = `
        <div class="pr-po-tab ${docType==='pr'?'active':''}" onclick="docType='pr';refresh()"><span data-i18n="tab_purchase_request">Purchase Request</span> <span class="count">${allPRs.length}</span></div>
        <div class="pr-po-tab ${docType==='po'?'active':''}" onclick="docType='po';refresh()"><span data-i18n="tab_purchase_order">Purchase Order</span> <span class="count">${allPOs.length}</span></div>
        <div class="pr-po-tab ${docType==='all'?'active':''}" onclick="docType='all';refresh()"><span data-i18n="tab_all_documents">All Documents</span> <span class="count">${allPRs.length+allPOs.length}</span></div>
      `;
    }

    function renderStats() {
      const docs = getDocs();
      const counts = {};
      COLUMNS.forEach(c => {
        counts[c.status] = docs.filter(d => c.match ? c.match(d.status) : d.status === c.status).length;
      });
      document.getElementById('pr-stats').innerHTML = COLUMNS.map(c =>
        `<div class="mini-stat"><div class="val" style="color:${c.color};">${counts[c.status]}</div><div class="lbl">${c.label}</div></div>`
      ).join('');
    }

    function renderKanban() {
      const docs = getDocs();
      document.getElementById('kanban-board').innerHTML = COLUMNS.map(col => {
        const items = docs.filter(d => col.match ? col.match(d.status) : d.status === col.status);
        return `
        <div class="kanban-column">
          <div class="kanban-column-header">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:8px;height:8px;border-radius:50%;background:${col.color};"></div>${col.label}
            </div>
            <span class="count">${items.length}</span>
          </div>
          <div class="kanban-body">
            ${items.length ? items.map(d => renderCard(d)).join('') : '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:20px;">No items</div>'}
          </div>
        </div>`;
      }).join('');
    }

    function renderCard(d) {
      const isPending = d.status.includes('pending');
      const border = isPending ? 'border-left:3px solid var(--warning);' : '';
      const statusLabel = d.status.replace(/_/g,' ').replace('pending ','');
      return `
      <div class="kanban-card" data-pr-id="${d.id}" data-pr-status="${d.status}"
           onclick="window.location='doc-detail.html?type=${docType==='all'?(d.doc_number.startsWith('PO')?'po':'pr'):docType}&doc=${d.doc_number}'"
           style="cursor:pointer;${border}">
        <div class="kanban-card-header">
          <span class="kanban-card-id">${d.doc_number}${d._project_code ? ' <span style="color:var(--text-secondary);font-weight:500;">['+d._project_code+']</span>' : ''}</span>
          ${statusBadge(d.status)}
        </div>
        ${d._project_code ? '<div style="margin-bottom:6px;"><span style="background:var(--bg-light);padding:2px 8px;border-radius:var(--radius-full);font-size:10px;font-weight:500;">'+d._project_code+'</span></div>' : ''}
        <div class="kanban-card-amount">${fmtMoney(d.total_amount)}</div>
        <div class="kanban-card-detail">
          ${d.vendor_name || '-'}
          ${d.sap_doc_num ? '<div class="sap-doc-badge"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>ERP #' + d.sap_doc_num + '</div>' : ''}
        </div>
        <div class="kanban-card-footer">
          <div class="requester">${avatarSm(d.requester_name||d.creator_name||'?')} ${(d.requester_name||d.creator_name||'-').split(' ').slice(0,2).join(' ')}</div>
          <div class="date">${fmtDateShort(d.doc_date)}</div>
        </div>
        ${renderDocActions(d)}
      </div>`;
    }

    function getDocType(d) {
      return docType === 'all' ? (d.doc_number.startsWith('PO') ? 'po' : 'pr') : docType;
    }
    function renderDocActions(d) {
      const dt = getDocType(d);
      const canEditRoles = ['executive','manager','finance','pm'];
      const canAct = canEditRoles.includes(userRole);
      if (!canAct) return '';
      let btns = '';
      if (d.status === 'draft') {
        btns += '<a href="doc-detail.html?type='+dt+'&id='+d.id+'&mode=edit" onclick="event.stopPropagation();" style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-weight:600;text-decoration:none;margin-right:4px;">Edit</a>';
      }
      if (dt === 'pr' && (d.status === 'draft' || d.status.includes('pending'))) {
        btns += '<button style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--danger-bg);color:var(--danger);font-weight:600;border:none;cursor:pointer;" onclick="event.stopPropagation();deletePR(\''+d.id+'\',\''+d.doc_number+'\')">Del</button>';
      }
      if (dt === 'po' && d.status === 'draft') {
        btns += '<a href="doc-detail.html?type=po&id='+d.id+'&mode=edit" onclick="event.stopPropagation();" style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-weight:600;text-decoration:none;margin-right:4px;">Edit</a>';
        btns += '<button style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--danger-bg);color:var(--danger);font-weight:600;border:none;cursor:pointer;" onclick="event.stopPropagation();deletePO(\''+d.id+'\',\''+d.doc_number+'\')">Del</button>';
      }
      if (!btns) return '';
      return '<div style="display:flex;gap:4px;padding:8px 12px 6px;border-top:1px solid var(--border-light);">' + btns + '</div>';
    }

    function renderList() {
      const docs = getDocs();
      document.getElementById('list-body').innerHTML = docs.map(d => {
        const dt = getDocType(d);
        const canEditRoles = ['executive','manager','finance','pm'];
        const canAct = canEditRoles.includes(userRole);
        let actionHtml = '';
        if (canAct) {
          if (d.status === 'draft') actionHtml += '<a href="doc-detail.html?type='+dt+'&id='+d.id+'&mode=edit" onclick="event.stopPropagation();" style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-weight:600;text-decoration:none;margin-right:3px;">Edit</a>';
          if (dt === 'pr' && (d.status === 'draft' || d.status.includes('pending')))
            actionHtml += '<button style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--danger-bg);color:var(--danger);font-weight:600;border:none;cursor:pointer;" onclick="event.stopPropagation();deletePR(\''+d.id+'\',\''+d.doc_number+'\')">Del</button>';
          if (dt === 'po' && d.status === 'draft')
            actionHtml += '<button style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--danger-bg);color:var(--danger);font-weight:600;border:none;cursor:pointer;" onclick="event.stopPropagation();deletePO(\''+d.id+'\',\''+d.doc_number+'\')">Del</button>';
        }
        return `<tr style="cursor:pointer;" onclick="window.location='doc-detail.html?type=${dt}&doc=${d.doc_number}'">
          <td><span class="doc-id" style="color:var(--primary);font-weight:600;">${d.doc_number}</span>${d._project_code ? ' <span style="color:var(--text-secondary);font-size:11px;font-weight:500;">['+d._project_code+']</span>' : ''}</td>
          <td>${d.sap_doc_num ? '<span class="sap-doc-badge" style="font-size:10px;padding:2px 8px;">ERP #' + d.sap_doc_num + '</span>' : '<span style="color:var(--text-muted);font-size:11px;">—</span>'}</td>
          <td>${fmtDateShort(d.doc_date)}</td>
          <td>${d._project_code ? '<span style="background:var(--bg-light);padding:2px 8px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:500;">'+d._project_code+'</span>' : '<span style="font-size:var(--text-xs);color:var(--text-muted);">-</span>'}</td>
          <td>${d.vendor_name || '-'}</td>
          <td>${d.requester_name || d.creator_name || '-'}</td>
          <td class="amount" style="text-align:right;font-weight:600;">${fmtMoney(d.total_amount)}</td>
          <td>${statusBadge(d.status)}</td>
          <td style="white-space:nowrap;">${actionHtml}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--text-muted);padding:24px;">No documents</td></tr>';
    }

    function refresh() {
      renderTabs(); renderStats(); renderKanban(); renderList();
      const mainBtn = document.getElementById('btn-new-main');
      if (mainBtn) {
        if (docType === 'po') mainBtn.textContent = '+ New PO';
        else if (docType === 'all') mainBtn.textContent = '+ New...';
        else mainBtn.textContent = '+ New PR';
      }
    }

    function newDocClick() {
      if (docType === 'all') {
        // Show dropdown
        const dd = document.getElementById('new-doc-dropdown');
        dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
      } else {
        window.location = 'doc-detail.html?type=' + docType + '&mode=new';
      }
    }
    // Close dropdown on outside click
    document.addEventListener('click', e => {
      const dd = document.getElementById('new-doc-dropdown');
      if (dd && !e.target.closest('#btn-new-doc')) dd.style.display = 'none';
    });

    function switchPRView(view) {
      document.getElementById('view-kanban').classList.toggle('hidden', view !== 'kanban');
      document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
      document.querySelectorAll('.view-switch button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    /* ── Drag & Drop ── */
    let draggedCardId = null;
    let draggedCardStatus = null;

    function onCardDragStart(e) {
      draggedCardId = e.currentTarget.dataset.prId;
      draggedCardStatus = e.currentTarget.dataset.prStatus;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedCardId);
      requestAnimationFrame(() => e.currentTarget.style.opacity = '0.4');
    }

    function onCardDragEnd(e) {
      e.currentTarget.style.opacity = '1';
      document.querySelectorAll('.kanban-body').forEach(b => b.classList.remove('kanban-drop-target'));
      draggedCardId = null;
      draggedCardStatus = null;
    }

    function onKanbanDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('kanban-drop-target');
    }

    function onKanbanDragLeave(e) {
      const body = e.currentTarget;
      const related = e.relatedTarget;
      if (!body.contains(related)) {
        body.classList.remove('kanban-drop-target');
      }
    }

    async function onKanbanDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('kanban-drop-target');
      const newStatus = e.currentTarget.dataset.dropStatus;
      if (!draggedCardId || !newStatus) return;

      // Find which column the card currently belongs to
      const currentCol = COLUMNS.find(c => c.match ? c.match(draggedCardStatus) : c.status === draggedCardStatus);
      if (currentCol && currentCol.dropStatus === newStatus) return; // same column, no-op

      const pr = allPRs.find(p => p.id === draggedCardId);
      const po = allPOs.find(p => p.id === draggedCardId);
      const item = pr || po;
      if (!item) return;
      const oldStatus = item.status;
      const endpoint = pr ? '/pr/' : '/po/';

      // Optimistic update — move card instantly
      item.status = newStatus;
      refresh();

      // Save to server in background
      try {
        await API.put(endpoint + draggedCardId, { status: newStatus });
      } catch (err) {
        // Rollback on failure
        item.status = oldStatus;
        refresh();
        showToast('Failed to update status: ' + (err.message || err), 'error');
      }
    }

    // FIXED: Auth guard
    if (!API.requireAuth()) throw new Error('Not authenticated');
    loadPRPO();
    API.onRealtime(msg => {
      if (msg.type.startsWith('pr_')) loadPRPO();
    });
  </script>
</body>
</html>
