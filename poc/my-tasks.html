<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — My Tasks</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .mt-hero {
      background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
      color: white; padding: 24px 32px 16px; margin: -20px -20px 0;
    }
    .mt-hero-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .mt-hero-top .mt-home { color:rgba(255,255,255,0.7); text-decoration:none; display:flex; align-items:center; gap:6px; font-size:13px; }
    .mt-hero-top .mt-home:hover { color:#fff; }
    .mt-hero-nav { display:flex; align-items:center; gap:6px; }
    .mt-hero-nav button { background:rgba(255,255,255,0.15); border:none; color:white; cursor:pointer; border-radius:var(--radius); padding:6px 12px; font-size:12px; font-weight:500; }
    .mt-hero-nav button:hover { background:rgba(255,255,255,0.25); }
    .mt-hero-nav .nav-arr { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0; }
    .mt-hero h1 { font-size:22px; font-weight:700; margin:0 0 4px; }
    .mt-hero .mt-sub { font-size:13px; opacity:0.8; }

    /* View Tabs */
    .mt-tabs { display:flex; gap:0; margin:20px 0 16px; }
    .mt-tab { padding:8px 18px; border:1px solid var(--border); background:var(--bg-white); cursor:pointer; font-size:12px; font-weight:600; color:var(--text-secondary); display:flex; align-items:center; gap:6px; }
    .mt-tab:first-child { border-radius:var(--radius) 0 0 var(--radius); }
    .mt-tab:last-child { border-radius:0 var(--radius) var(--radius) 0; }
    .mt-tab:not(:first-child) { border-left:none; }
    .mt-tab.active { background:var(--primary); color:white; border-color:var(--primary); }
    .mt-tab svg { width:14px; height:14px; }

    /* Section Card */
    .mt-card { background:var(--bg-white); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:16px; overflow:hidden; }
    .mt-card-header { padding:14px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
    .mt-card-header h3 { font-size:14px; font-weight:700; margin:0; display:flex; align-items:center; gap:8px; }
    .mt-card-header .badge { font-size:11px; padding:2px 8px; border-radius:var(--radius-full); background:var(--bg-hover); color:var(--text-secondary); font-weight:600; }
    .mt-card-header.overdue { background:#fff5f5; }
    .mt-card-header.overdue h3 { color:var(--danger); }
    .mt-card-body { padding:0; }
    .mt-empty { padding:32px; text-align:center; color:var(--text-muted); font-size:13px; }

    /* Task Row */
    .mt-row { display:flex; align-items:center; padding:10px 20px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:background 0.1s; }
    .mt-row:last-child { border-bottom:none; }
    .mt-row:hover { background:var(--bg-hover); }
    .mt-row .mt-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-right:12px; }
    .mt-row .mt-info { flex:1; min-width:0; }
    .mt-row .mt-title { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .mt-row .mt-meta { font-size:11px; color:var(--text-muted); margin-top:2px; display:flex; align-items:center; gap:6px; }
    .mt-row .mt-meta .prj-badge { font-size:10px; padding:1px 6px; border-radius:var(--radius-full); background:var(--primary-light); color:var(--primary); font-weight:600; }
    .mt-row .mt-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .mt-pri { font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; }
    .mt-due { font-size:10px; padding:1px 6px; border-radius:10px; font-weight:600; }
    .mt-row.done .mt-title { text-decoration:line-through; color:var(--text-muted); }

    /* Week Grid */
    .mt-week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0; }
    .mt-week-cell { padding:12px 8px; text-align:center; border-right:1px solid var(--border-light); cursor:pointer; transition:background 0.1s; }
    .mt-week-cell:last-child { border-right:none; }
    .mt-week-cell:hover { background:var(--bg-hover); }
    .mt-week-cell.today { background:var(--primary-light); }
    .mt-week-cell .wday { font-size:10px; color:var(--text-muted); font-weight:600; }
    .mt-week-cell .wnum { font-size:18px; font-weight:700; margin:4px 0; }
    .mt-week-cell .wcount { font-size:11px; color:var(--text-secondary); }
    .mt-week-cell.today .wnum { color:var(--primary); }

    /* Month Calendar */
    .mt-cal { display:grid; grid-template-columns:repeat(7,1fr); gap:0; }
    .mt-cal .cdow { background:var(--bg-light); padding:6px; text-align:center; font-size:10px; font-weight:600; color:var(--text-muted); border-bottom:1px solid var(--border-light); border-right:1px solid var(--border-light); }
    .mt-cal .cdow:last-child { border-right:none; }
    .mt-cal .cday { min-height:80px; padding:4px; border-bottom:1px solid var(--border-light); border-right:1px solid var(--border-light); cursor:pointer; font-size:11px; }
    .mt-cal .cday:nth-child(7n) { border-right:none; }
    .mt-cal .cday:hover { background:var(--bg-hover); }
    .mt-cal .cday.other { opacity:0.3; }
    .mt-cal .cday.today { background:var(--primary-light); }
    .mt-cal .cday .cnum { font-size:12px; font-weight:600; margin-bottom:2px; }
    .mt-cal .cday .cdot { width:6px; height:6px; border-radius:50%; display:inline-block; margin:1px; }

    /* Project Card */
    .mt-prj-card { margin-bottom:12px; }
    .mt-prj-header { padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-light); }
    .mt-prj-header h4 { font-size:13px; font-weight:700; margin:0; display:flex; align-items:center; gap:8px; }
    .mt-prj-header .cnt { font-size:11px; color:var(--text-muted); }

    /* Task Detail Modal */
    .mt-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:600; align-items:center; justify-content:center; }
    .mt-modal-overlay.show { display:flex; }
    .mt-modal { background:var(--bg-white); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); width:420px; max-width:95vw; }
    .mt-modal-header { padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
    .mt-modal-header h3 { font-size:15px; font-weight:700; margin:0; }
    .mt-modal-body { padding:16px 20px; }
    .mt-modal-body .mrow { display:flex; gap:8px; margin-bottom:8px; font-size:13px; }
    .mt-modal-body .mrow .ml { color:var(--text-muted); min-width:80px; font-size:12px; }
    .mt-modal-body .mrow .mv { font-weight:500; }
    .mt-modal-footer { padding:12px 20px; border-top:1px solid var(--border-light); display:flex; gap:8px; justify-content:flex-end; }
    .close-btn { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-muted); }
    .btn-sm { font-size:12px; padding:6px 14px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; font-weight:600; background:var(--bg-white); color:var(--text-primary); }
    .btn-sm:hover { background:var(--bg-hover); }
    .btn-primary { background:var(--primary); color:white; border-color:var(--primary); }

    @media (max-width:768px) { .mt-hero { padding:16px; margin:-12px -12px 0; } .mt-week-grid { font-size:10px; } }
  </style>
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <!-- Hero Header -->
    <div class="mt-hero">
      <div class="mt-hero-top">
        <a href="dashboard.html" class="mt-home"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Dashboard</a>
        <div class="mt-hero-nav" id="heroNav">
          <button onclick="goToday()" data-i18n="mytasks_today">วันนี้</button>
          <button class="nav-arr" onclick="navPrev()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
          <button class="nav-arr" onclick="navNext()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h1 data-i18n="mytasks_title">My Tasks</h1>
        <button class="btn btn-secondary" onclick="exportMyTasks()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> <span data-i18n="export_excel">Export Excel</span></button>
      </div>
      <div class="mt-sub" id="heroSub"></div>
    </div>

    <!-- View Tabs -->
    <div class="mt-tabs" id="viewTabs">
      <button class="mt-tab active" data-v="day" onclick="setView('day')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/></svg> <span data-i18n="mytasks_view_day">วัน</span></button>
      <button class="mt-tab" data-v="week" onclick="setView('week')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M10 10v10"/><path d="M17 10v10"/></svg> <span data-i18n="mytasks_view_week">สัปดาห์</span></button>
      <button class="mt-tab" data-v="month" onclick="setView('month')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> <span data-i18n="mytasks_view_month">เดือน</span></button>
      <button class="mt-tab" data-v="project" onclick="setView('project')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> <span data-i18n="mytasks_view_project">ตามโปรเจค</span></button>
    </div>

    <!-- Content -->
    <div id="content"></div>
  </main>
  </div>

  <!-- Task Detail Modal -->
  <div class="mt-modal-overlay" id="taskModal" onclick="if(event.target===this)closeModal()">
    <div class="mt-modal">
      <div class="mt-modal-header">
        <h3 id="modalTitle"></h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="mt-modal-body" id="modalBody"></div>
      <div class="mt-modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/highlight.js"></script>
  <script src="assets/js/excel-export.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    let allTasks = [];
    let currentView = 'day';
    let viewDate = new Date();
    let userName = '';

    const TH_D = ['อา','จ','อ','พ','พฤ','ศ','ส'];
    const TH_M = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const TH_ML = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const PRI_C = { high:{bg:'#fef2f2',c:'#e11d48',l:'สูง'}, medium:{bg:'#fff8e1',c:'#f57f17',l:'กลาง'}, low:{bg:'#e8f5e9',c:'#2e7d32',l:'ต่ำ'} };
    const STAT_C = { todo:{bg:'#e2e3e5',c:'#383d41',l:'รอทำ'}, in_progress:{bg:'#dbeafe',c:'#1d4ed8',l:'กำลังทำ'}, review:{bg:'#fff3cd',c:'#856404',l:'รีวิว'}, done:{bg:'#d1fae5',c:'#065f46',l:'เสร็จ'} };
    const PRJ_COLORS = ['#4285f4','#0f9d58','#f4b400','#db4437','#ab47bc','#00acc1','#ff7043','#7cb342'];

    function fd(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function tl(s) { if(!s)return''; if(typeof s==='string'&&s.length===10&&s[4]==='-')return s; const d=new Date(s); return isNaN(d)?'':fd(d); }
    function ft(s) { if(!s)return''; const d=new Date(s); return isNaN(d)?'':d.getDate()+' '+TH_M[d.getMonth()]; }
    function ftl(s) { if(!s)return''; const d=new Date(s); return isNaN(d)?'':d.getDate()+' '+TH_M[d.getMonth()]+' '+(d.getFullYear()+543-2500); }
    function dim(y,m) { return new Date(y,m+1,0).getDate(); }
    function sow(d) { const r=new Date(d); r.setDate(r.getDate()-(r.getDay()||7)+1); return r; } // Monday start
    function addD(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
    function sd(a,b) { return fd(a)===fd(b); }

    function dueInfo(t) {
      if (!t.due_date || t.status==='done') return null;
      const diff = Math.ceil((new Date(tl(t.due_date))-new Date(fd(new Date())))/86400000);
      if (diff<0) return {text:'เลย '+Math.abs(diff)+' วัน', bg:'#fef2f2', c:'#e11d48'};
      if (diff===0) return {text:'วันนี้', bg:'#fff8e1', c:'#f57f17'};
      if (diff<=3) return {text:'อีก '+diff+' วัน', bg:'#fff8e1', c:'#856404'};
      return null;
    }

    function taskRow(t, prjIdx) {
      const pri = PRI_C[t.priority]||PRI_C.low;
      const due = dueInfo(t);
      const dotColor = PRJ_COLORS[(prjIdx||0)%PRJ_COLORS.length];
      const doneCls = t.status==='done'?' done':'';
      return `<div class="mt-row${doneCls}" onclick="showTask('${t.id}')">
        <div class="mt-dot" style="background:${dotColor}"></div>
        <div class="mt-info">
          <div class="mt-title">${t.title||'-'}</div>
          <div class="mt-meta">${t.project_code?'<span class="prj-badge">'+t.project_code+'</span>':''} ${t.first_name_th||t.first_name||''}</div>
        </div>
        <div class="mt-right">
          <span class="mt-pri" style="background:${pri.bg};color:${pri.c}">${pri.l}</span>
          ${due?'<span class="mt-due" style="background:'+due.bg+';color:'+due.c+'">'+due.text+'</span>':''}
        </div>
      </div>`;
    }

    // ═══ Data Loading ═══
    async function loadTasks() {
      try {
        allTasks = await API.get('/dashboard/my-tasks-all');
        if (!Array.isArray(allTasks)) allTasks = [];
      } catch(e) { allTasks = []; }
      render();
    }

    // ═══ Views ═══
    function setView(v) {
      currentView = v;
      document.querySelectorAll('.mt-tab').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
      document.getElementById('heroNav').style.display = v==='project'?'none':'flex';
      render();
    }

    function goToday() { viewDate = new Date(); render(); }
    function navPrev() {
      if (currentView==='day') viewDate = addD(viewDate,-1);
      else if (currentView==='week') viewDate = addD(viewDate,-7);
      else if (currentView==='month') viewDate.setMonth(viewDate.getMonth()-1);
      render();
    }
    function navNext() {
      if (currentView==='day') viewDate = addD(viewDate,1);
      else if (currentView==='week') viewDate = addD(viewDate,7);
      else if (currentView==='month') viewDate.setMonth(viewDate.getMonth()+1);
      render();
    }

    function updateSub() {
      const el = document.getElementById('heroSub');
      if (currentView==='day') el.textContent = 'สวัสดี '+userName+' — '+TH_D[viewDate.getDay()]+' '+ft(viewDate);
      else if (currentView==='week') {
        const ws=sow(viewDate), we=addD(ws,6);
        el.textContent = 'สวัสดี '+userName+' — '+ft(ws)+' – '+ft(we);
      } else if (currentView==='month') el.textContent = 'สวัสดี '+userName+' — '+TH_ML[viewDate.getMonth()]+' '+(viewDate.getFullYear()+543);
      else el.textContent = 'สวัสดี '+userName+' — ทุกโปรเจค';
    }

    function render() {
      updateSub();
      const el = document.getElementById('content');
      if (currentView==='day') renderDay(el);
      else if (currentView==='week') renderWeek(el);
      else if (currentView==='month') renderMonth(el);
      else renderProject(el);
    }

    // ═══ Day View ═══
    function renderDay(el) {
      const ds = fd(viewDate);
      const today = allTasks.filter(t => tl(t.due_date)===ds || (!t.due_date && tl(t.start_date)===ds));
      const overdue = allTasks.filter(t => t.due_date && tl(t.due_date)<fd(new Date()) && t.status!=='done');
      const isToday = sd(viewDate, new Date());

      let h = '';
      // Today card
      h += `<div class="mt-card"><div class="mt-card-header"><h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> ${ftl(viewDate)}${isToday?' (วันนี้)':''}</h3><span class="badge">${today.length} งาน</span></div>`;
      h += '<div class="mt-card-body">';
      if (today.length) today.forEach((t,i)=>{ h+=taskRow(t,i); });
      else h += '<div class="mt-empty">ไม่มีงานครบกำหนดวันนี้</div>';
      h += '</div></div>';

      // Overdue card
      if (overdue.length && isToday) {
        h += `<div class="mt-card"><div class="mt-card-header overdue"><h3><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:4px"></span> เลยกำหนด</h3><span class="badge" style="background:#fef2f2;color:#e11d48">${overdue.length}</span></div>`;
        h += '<div class="mt-card-body">';
        overdue.forEach((t,i)=>{ h+=taskRow(t,i); });
        h += '</div></div>';
      }
      el.innerHTML = h;
    }

    // ═══ Week View ═══
    function renderWeek(el) {
      const ws = sow(viewDate);
      const days = []; for(let i=0;i<7;i++) days.push(addD(ws,i));
      const today = new Date();
      const overdue = allTasks.filter(t=>t.due_date&&tl(t.due_date)<fd(today)&&t.status!=='done');

      let h = '';
      // Today card (same as day)
      const todayDs = fd(today);
      const todayTasks = allTasks.filter(t=>tl(t.due_date)===todayDs);
      h += `<div class="mt-card"><div class="mt-card-header"><h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> วันนี้ ${ft(today)}</h3><span class="badge">${todayTasks.length}</span></div>`;
      h += '<div class="mt-card-body">';
      if (todayTasks.length) todayTasks.forEach((t,i)=>{h+=taskRow(t,i);});
      else h += '<div class="mt-empty">ไม่มีงานครบกำหนดวันนี้</div>';
      h += '</div></div>';

      // Overdue
      if (overdue.length) {
        h += `<div class="mt-card"><div class="mt-card-header overdue"><h3><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger)"></span> เลยกำหนด</h3><span class="badge" style="background:#fef2f2;color:#e11d48">${overdue.length}</span></div>`;
        h += '<div class="mt-card-body">';
        overdue.forEach((t,i)=>{h+=taskRow(t,i);});
        h += '</div></div>';
      }

      // Week grid
      h += `<div class="mt-card"><div class="mt-card-header"><h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect width="6" height="14" x="2" y="6" rx="2"/><rect width="6" height="10" x="9" y="2" rx="2"/><rect width="6" height="14" x="16" y="8" rx="2"/></svg> ตารางสัปดาห์</h3></div>`;
      h += '<div class="mt-card-body"><div class="mt-week-grid">';
      days.forEach(d => {
        const ds = fd(d);
        const cnt = allTasks.filter(t=>tl(t.due_date)===ds).length;
        const isTd = sd(d,today);
        h += `<div class="mt-week-cell${isTd?' today':''}" onclick="viewDate=new Date('${ds}T12:00');setView('day')">
          <div class="wday">${TH_D[d.getDay()]}</div>
          <div class="wnum">${d.getDate()}</div>
          <div class="wcount">${cnt?cnt+' งาน':'—'}</div>
        </div>`;
      });
      h += '</div></div></div>';
      el.innerHTML = h;
    }

    // ═══ Month View ═══
    function renderMonth(el) {
      const y=viewDate.getFullYear(), m=viewDate.getMonth();
      const firstDay=(new Date(y,m,1).getDay()||7)-1; // Monday-based
      const d_im=dim(y,m);
      const today=new Date();

      let h = `<div class="mt-card"><div class="mt-card-header"><h3>${TH_ML[m]} ${y+543}</h3></div><div class="mt-card-body"><div class="mt-cal">`;
      ['จ','อ','พ','พฤ','ศ','ส','อา'].forEach(d=>{h+=`<div class="cdow">${d}</div>`;});
      const totalCells=Math.ceil((firstDay+d_im)/7)*7;
      for(let i=0;i<totalCells;i++){
        const dayNum=i-firstDay+1;
        const dt=new Date(y,m,dayNum);
        const inM=dayNum>=1&&dayNum<=d_im;
        const ds=fd(dt);
        const isTd=sd(dt,today);
        const dayTasks=allTasks.filter(t=>tl(t.due_date)===ds);
        const hasOverdue=dayTasks.some(t=>t.status!=='done'&&tl(t.due_date)<fd(today));
        h+=`<div class="cday${inM?'':' other'}${isTd?' today':''}" onclick="viewDate=new Date('${ds}T12:00');setView('day')">`;
        h+=`<div class="cnum">${dt.getDate()}</div>`;
        dayTasks.slice(0,3).forEach(t=>{
          const c=PRI_C[t.priority]||PRI_C.low;
          h+=`<span class="cdot" style="background:${c.c}" title="${t.title||''}"></span>`;
        });
        if(dayTasks.length>3) h+=`<span style="font-size:9px;color:var(--text-muted)">+${dayTasks.length-3}</span>`;
        h+='</div>';
      }
      h+='</div></div></div>';
      el.innerHTML=h;
    }

    // ═══ Project View ═══
    function renderProject(el) {
      const byPrj = {};
      allTasks.forEach(t=>{
        const k=t.project_id||'none';
        if(!byPrj[k]) byPrj[k]={code:t.project_code||'', name:t.project_name||'ไม่มีโปรเจค', tasks:[]};
        byPrj[k].tasks.push(t);
      });
      const sorted=Object.values(byPrj).sort((a,b)=>b.tasks.length-a.tasks.length);
      let h='';
      sorted.forEach((p,pi)=>{
        const c=PRJ_COLORS[pi%PRJ_COLORS.length];
        h+=`<div class="mt-card mt-prj-card" style="border-left:4px solid ${c}">`;
        h+=`<div class="mt-prj-header"><h4><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c}"></span> ${p.code?p.code+' — ':''}${p.name}</h4><span class="cnt">${p.tasks.length} งาน</span></div>`;
        h+='<div class="mt-card-body">';
        p.tasks.forEach(t=>{h+=taskRow(t,pi);});
        h+='</div></div>';
      });
      if(!sorted.length) h='<div class="mt-empty">ไม่มี tasks</div>';
      el.innerHTML=h;
    }

    // ═══ Task Detail Modal ═══
    function showTask(id) {
      const t=allTasks.find(x=>x.id===id);
      if(!t) return;
      const pri=PRI_C[t.priority]||PRI_C.low;
      const stat=STAT_C[t.status]||STAT_C.todo;
      document.getElementById('modalTitle').textContent=t.title||'Task';
      let b='';
      b+=`<div class="mrow"><span class="ml">โปรเจค</span><span class="mv">${t.project_code?t.project_code+' '+t.project_name:'-'}</span></div>`;
      b+=`<div class="mrow"><span class="ml">สถานะ</span><span class="mv"><span style="padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:600;background:${stat.bg};color:${stat.c}">${stat.l}</span></span></div>`;
      b+=`<div class="mrow"><span class="ml">ความสำคัญ</span><span class="mv"><span style="padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:600;background:${pri.bg};color:${pri.c}">${pri.l}</span></span></div>`;
      if(t.start_date) b+=`<div class="mrow"><span class="ml">เริ่ม</span><span class="mv">${ftl(t.start_date)}</span></div>`;
      if(t.due_date) b+=`<div class="mrow"><span class="ml">กำหนด</span><span class="mv">${ftl(t.due_date)}</span></div>`;
      if(t.description) b+=`<div class="mrow"><span class="ml">รายละเอียด</span><span class="mv">${t.description}</span></div>`;
      document.getElementById('modalBody').innerHTML=b;

      // Footer: status change buttons + link to taskboard
      let f='';
      const statuses=[{k:'todo',l:'รอทำ'},{k:'in_progress',l:'กำลังทำ'},{k:'review',l:'รีวิว'},{k:'done',l:'เสร็จ'}];
      f+='<div style="display:flex;gap:4px;flex:1">';
      statuses.forEach(s=>{
        const active=t.status===s.k;
        const sc=STAT_C[s.k];
        f+=`<button class="btn-sm" style="${active?'background:'+sc.c+';color:white;border-color:'+sc.c:'opacity:0.6'}" onclick="changeStatus('${t.id}','${t.project_id}','${s.k}')">${s.l}</button>`;
      });
      f+='</div>';
      if(t.project_id) f+=`<a href="taskboard.html?project=${t.project_id}&task=${t.id}" class="btn-sm btn-primary" style="text-decoration:none">Taskboard</a>`;
      document.getElementById('modalFooter').innerHTML=f;
      document.getElementById('taskModal').classList.add('show');
    }

    function closeModal() { document.getElementById('taskModal').classList.remove('show'); }

    async function changeStatus(taskId, projectId, newStatus) {
      if(!projectId||projectId==='null') return;
      try {
        await API.put('/projects/'+projectId+'/tasks/'+taskId, {status:newStatus});
        const t=allTasks.find(x=>x.id===taskId);
        if(t) t.status=newStatus;
        closeModal();
        render();
      } catch(e) { showToast(e.message, 'error'); }
    }

    // ═══ Export Excel ═══
    function exportMyTasks() {
      if (!allTasks.length) { showToast('ไม่มีข้อมูลให้ Export', 'warning'); return; }
      const PRI_LABELS = { high: 'สูง', medium: 'กลาง', low: 'ต่ำ' };
      const STAT_LABELS = { todo: 'รอทำ', in_progress: 'กำลังทำ', review: 'รีวิว', done: 'เสร็จ' };
      const headers = ['รหัสโปรเจค', 'ชื่อโปรเจค', 'ชื่องาน', 'รายละเอียด', 'สถานะ', 'ความสำคัญ', 'วันเริ่ม', 'วันกำหนด', 'ผู้รับผิดชอบ'];
      const rows = allTasks.map(t => [
        t.project_code || '',
        t.project_name || '',
        t.title || '',
        t.description || '',
        STAT_LABELS[t.status] || t.status || '',
        PRI_LABELS[t.priority] || t.priority || '',
        t.start_date ? ftl(t.start_date) : '',
        t.due_date ? ftl(t.due_date) : '',
        t.first_name_th || t.first_name || ''
      ]);
      exportToExcel(headers, rows, 'my-tasks', 'My Tasks');
    }

    // ═══ Init ═══
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

    if (API.requireAuth()) {
      const user = API.getUser();
      userName = (user && (user.first_name_th || user.first_name)) || 'User';
      loadTasks();
    }
  </script>
</body>
</html>
