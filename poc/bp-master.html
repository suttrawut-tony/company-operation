<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Business Partner</title>
  <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <div class="page-header">
      <div><h1 data-i18n="bp_page_title">Business Partner</h1><div id="bp-mode-note" style="font-size:12px;color:var(--text-secondary);margin-top:2px;"></div></div>
      <div style="display:flex;gap:8px;" id="bp-header-actions">
        <button class="btn btn-secondary" onclick="exportBPs()" style="display:flex;align-items:center;gap:6px;" data-i18n="bp_btn_export"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Export Excel</button>
      </div>
    </div>
    <div style="margin-bottom:16px;display:flex;gap:12px;">
      <input type="text" class="form-input" id="bp-search" placeholder="Search code, name, contact..." data-i18n-placeholder="bp_placeholder_search" oninput="renderBPs()" style="width:300px;">
      <select class="form-select" id="bp-type-filter" onchange="renderBPs()" style="width:150px;">
        <option value="" data-i18n="bp_filter_all_types">All Types</option>
        <option value="vendor">Vendor</option>
        <option value="customer">Customer</option>
      </select>
    </div>
    <div id="bp-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;"></div>
    <!-- Modal -->
    <div class="modal-overlay" id="bp-modal" onclick="if(event.target===this)closeBPModal()" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:var(--bg-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;">
        <div style="padding:20px 24px 0;display:flex;justify-content:space-between;"><h3 id="bp-modal-title" data-i18n="bp_modal_new">New Partner</h3><button onclick="closeBPModal()" style="border:none;background:none;font-size:20px;cursor:pointer;">&times;</button></div>
        <div style="padding:20px 24px;">
          <input type="hidden" id="bm-id">
          <div style="display:grid;grid-template-columns:1fr 2fr;gap:12px;">
            <div class="form-group"><label class="form-label" data-i18n="bp_label_code">Code</label><input type="text" class="form-input" id="bm-code" placeholder="VD0001"></div>
            <div class="form-group"><label class="form-label" data-i18n="bp_label_name">Name</label><input type="text" class="form-input" id="bm-name"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label" data-i18n="bp_label_name_th">Name (TH)</label><input type="text" class="form-input" id="bm-name-th"></div>
            <div class="form-group"><label class="form-label" data-i18n="bp_label_type">Type</label><select class="form-input" id="bm-type"><option value="vendor">Vendor</option><option value="customer">Customer</option></select></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label" data-i18n="bp_label_contact_person">Contact Person</label><input type="text" class="form-input" id="bm-contact"></div>
            <div class="form-group"><label class="form-label" data-i18n="bp_label_phone">Phone</label><input type="text" class="form-input" id="bm-phone"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label" data-i18n="bp_label_email">Email</label><input type="email" class="form-input" id="bm-email"></div>
            <div class="form-group"><label class="form-label" data-i18n="bp_label_tax_id">Tax ID</label><input type="text" class="form-input" id="bm-taxid"></div>
          </div>
          <div class="form-group"><label class="form-label" data-i18n="bp_label_address">Address</label><input type="text" class="form-input" id="bm-address"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label" data-i18n="bp_label_payment_terms">Payment Terms (days)</label><input type="number" class="form-input" id="bm-terms" value="30"></div>
            <div class="form-group"><label class="form-label" data-i18n="bp_label_bank">Bank</label><input type="text" class="form-input" id="bm-bank"></div>
            <div class="form-group"><label class="form-label" data-i18n="bp_label_bank_account">Bank Account</label><input type="text" class="form-input" id="bm-bankacc"></div>
          </div>
        </div>
        <div style="padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="closeBPModal()" data-i18n="btn_cancel">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="saveBP()" data-i18n="btn_save">Save</button>
        </div>
      </div>
    </div>
  </main></div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/highlight.js"></script>
  <script src="assets/js/excel-export.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    let allBPs = [];
    let erpMode = false;        // true → BP managed by ERP (read-only here)
    let erpSystem = 'ERP';

    async function loadCompanyMode() {
      try {
        const data = await API.get('/company/settings');
        const erp = (data.settings && data.settings.erp_integration) || {};
        erpMode = erp.enabled === true;
        erpSystem = erp.system || 'ERP';
      } catch (e) { erpMode = false; }  // fail-safe: behave as local (can still add)
      renderBPActions();
    }

    function renderBPActions() {
      const actions = document.getElementById('bp-header-actions');
      const note = document.getElementById('bp-mode-note');
      if (!actions) return;
      const exportBtn = `<button class="btn btn-secondary" onclick="exportBPs()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Export Excel</button>`;
      if (erpMode) {
        actions.innerHTML = exportBtn +
          `<button class="btn btn-primary" onclick="syncBP()" id="bp-sync-btn" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg> ดึงจาก ERP</button>`;
        if (note) note.innerHTML = '🔗 เชื่อมกับ <b>' + erpSystem + '</b> — ข้อมูลอ่านอย่างเดียว เพิ่ม/แก้จาก ' + erpSystem + ' แล้วกด "ดึงจาก ERP"';
      } else {
        actions.innerHTML =
          `<button class="btn btn-primary" onclick="openBPModal()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> เพิ่ม BP</button>` + exportBtn;
        if (note) note.textContent = '';
      }
    }

    async function syncBP() {
      const btn = document.getElementById('bp-sync-btn');
      if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
      try {
        const r = await API.post('/company/sync-bp', {});
        if (r.ok) { showToast(r.message || ('ซิงค์สำเร็จ ' + r.synced + ' รายการ'), 'success'); await loadBPs(); }
        else { showToast(r.message || 'ดึงจาก ERP ไม่สำเร็จ', 'warning'); }
      } catch (e) {
        showToast('ดึงจาก ERP ไม่สำเร็จ: ' + (e.message || e), 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
      }
    }

    async function loadBPs() {
      try {
        allBPs = await API.get('/master/bp');
        renderBPs();
      } catch (err) {
        if (err && (err.message === 'Session expired' || err.message === 'Password change required')) return;
        showToast('โหลดข้อมูลไม่สำเร็จ: ' + (err.message || err), 'error');
        var grid = document.getElementById('bp-grid');
        if (grid) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">ไม่สามารถโหลดข้อมูลได้ ลองใหม่อีกครั้ง</div>';
      }
    }
    function renderBPs() {
      let list = allBPs;
      const s = (document.getElementById('bp-search')?.value||'').toLowerCase();
      const t = document.getElementById('bp-type-filter')?.value;
      if (s) list = list.filter(b => (b.bp_code+b.bp_name+b.bp_name_th+b.contact_person).toLowerCase().includes(s));
      if (t) list = list.filter(b => b.bp_type === t);
      document.getElementById('bp-grid').innerHTML = list.map(b => {
        const isVendor = b.bp_type === 'vendor';
        return `
        <div style="background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:${erpMode?'default':'pointer'};transition:all 0.15s;border-left:3px solid ${isVendor?'var(--primary)':'var(--success)'};" ${erpMode?'':`onclick="openEditBP('${b.id}')"`}>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--primary);">${b.bp_code}</div>
              <div style="font-size:15px;font-weight:700;">${b.bp_name}</div>
              <div style="font-size:12px;color:var(--text-secondary);">${b.bp_name_th||''}</div>
            </div>
            <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${isVendor?'var(--primary-light);color:var(--primary)':'var(--success-bg);color:var(--success)'};font-weight:600;">${b.bp_type}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;margin-top:10px;">
            <div><span style="color:var(--text-muted);">Contact:</span> ${b.contact_person||'-'}</div>
            <div><span style="color:var(--text-muted);">Phone:</span> ${b.phone||'-'}</div>
            <div><span style="color:var(--text-muted);">Email:</span> ${b.email||'-'}</div>
            <div><span style="color:var(--text-muted);">Terms:</span> ${b.payment_terms||30} days</div>
            ${b.bank_name?'<div><span style="color:var(--text-muted);">Bank:</span> '+b.bank_name+' '+b.bank_account+'</div>':''}
            ${b.tax_id?'<div><span style="color:var(--text-muted);">Tax ID:</span> '+b.tax_id+'</div>':''}
          </div>
        </div>`;
      }).join('') || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">No partners found</div>';
    }
    function openBPModal() { if(erpMode){showToast('โหมด ERP: เพิ่ม Business Partner จาก '+erpSystem+' แล้วกด "ดึงจาก ERP"','warning');return;} document.getElementById('bm-id').value=''; ['bm-code','bm-name','bm-name-th','bm-contact','bm-phone','bm-email','bm-taxid','bm-address','bm-bank','bm-bankacc'].forEach(id=>document.getElementById(id).value=''); document.getElementById('bm-code').readOnly=false; document.getElementById('bm-type').value='vendor'; document.getElementById('bm-terms').value='30'; document.getElementById('bp-modal-title').textContent='New Partner'; document.getElementById('bp-modal').style.display='flex'; }
    function openEditBP(id) { const b=allBPs.find(x=>String(x.id)===String(id)); if(!b)return; document.getElementById('bm-id').value=id; document.getElementById('bm-code').value=b.bp_code; document.getElementById('bm-code').readOnly=true; document.getElementById('bm-name').value=b.bp_name; document.getElementById('bm-name-th').value=b.bp_name_th||''; document.getElementById('bm-type').value=b.bp_type; document.getElementById('bm-contact').value=b.contact_person||''; document.getElementById('bm-phone').value=b.phone||''; document.getElementById('bm-email').value=b.email||''; document.getElementById('bm-taxid').value=b.tax_id||''; document.getElementById('bm-address').value=b.address||''; document.getElementById('bm-terms').value=b.payment_terms||30; document.getElementById('bm-bank').value=b.bank_name||''; document.getElementById('bm-bankacc').value=b.bank_account||''; document.getElementById('bp-modal-title').textContent='Edit Partner'; document.getElementById('bp-modal').style.display='flex'; }
    function closeBPModal() { document.getElementById('bp-modal').style.display='none'; }
    async function saveBP() {
      const id=document.getElementById('bm-id').value;
      const body={bp_code:document.getElementById('bm-code').value,bp_name:document.getElementById('bm-name').value,bp_name_th:document.getElementById('bm-name-th').value,bp_type:document.getElementById('bm-type').value,contact_person:document.getElementById('bm-contact').value,phone:document.getElementById('bm-phone').value,email:document.getElementById('bm-email').value,tax_id:document.getElementById('bm-taxid').value,address:document.getElementById('bm-address').value,payment_terms:parseInt(document.getElementById('bm-terms').value)||30,bank_name:document.getElementById('bm-bank').value,bank_account:document.getElementById('bm-bankacc').value};
      try { if(id) await API.put('/master/bp/'+id,body); else await API.post('/master/bp',body); closeBPModal(); await loadBPs(); } catch(e){showToast('Error: '+e.message, 'error');}
    }
    function exportBPs() {
      const headers = ['BP Code','BP Name','Name (TH)','Type','Contact Person','Phone','Email','Tax ID','Address','Payment Terms (days)','Bank','Bank Account'];
      const rows = allBPs.map(b => [
        b.bp_code || '', b.bp_name || '', b.bp_name_th || '', b.bp_type || '',
        b.contact_person || '', b.phone || '', b.email || '', b.tax_id || '',
        b.address || '', b.payment_terms || 30, b.bank_name || '', b.bank_account || ''
      ]);
      exportToExcel(headers, rows, 'BP_Master', 'Business Partners');
    }
    if (!API.requireAuth()) throw new Error('Not authenticated');
    (async () => { await loadCompanyMode(); await loadBPs(); })();
  </script>
</body></html>
