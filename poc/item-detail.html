<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Item Detail</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detail-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-value {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .detail-value.muted {
      color: var(--text-muted);
      font-style: italic;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .status-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 10px;
      font-weight: 600;
    }
    .status-badge.active {
      background: #dcfce7;
      color: #16a34a;
    }
    .status-badge.inactive {
      background: var(--bg-hover);
      color: var(--text-muted);
    }
    @media (max-width: 600px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <div style="margin-bottom:16px;">
      <a class="back-link" href="item-master.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="itemdetail_back">Back to Item Master</span>
      </a>
    </div>
    <div class="page-header">
      <div><h1 id="page-title" data-i18n="itemdetail_title">Item Detail</h1></div>
    </div>

    <!-- Item Header Info -->
    <div class="card" style="margin-bottom:20px;">
      <div style="padding:20px 24px;">
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span data-i18n="itemdetail_info">Item Information</span>
          <span id="item-status-badge"></span>
        </div>
        <div id="item-info" class="detail-grid">
          <div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--text-muted);">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Stock by Warehouse -->
    <div class="card">
      <div style="padding:20px 24px;">
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span data-i18n="itemdetail_stock_by_wh">Stock by Warehouse</span>
        </div>
        <div class="table-container">
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr style="background:var(--bg-light);">
                <th style="text-align:left;padding:10px;" data-i18n="itemdetail_th_wh_code">Warehouse Code</th>
                <th style="text-align:left;padding:10px;" data-i18n="itemdetail_th_wh_name">Warehouse Name</th>
                <th style="text-align:right;padding:10px;" data-i18n="itemdetail_th_qty">Qty on Hand</th>
              </tr>
            </thead>
            <tbody id="stock-table">
              <tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-muted);">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="stock-total" style="margin-top:12px;text-align:right;font-size:13px;font-weight:700;color:var(--text-primary);display:none;">
          Total: <span id="stock-total-value">0</span>
        </div>
      </div>
    </div>

  </main></div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('id');

    if (!itemId) {
      document.getElementById('item-info').innerHTML = '<div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--danger);">No item ID provided.</div>';
      document.getElementById('stock-table').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-muted);">-</td></tr>';
    }

    function field(label, value) {
      const val = (value !== null && value !== undefined && value !== '') ? value : null;
      return `<div class="detail-field">
        <span class="detail-label">${label}</span>
        <span class="detail-value${val === null ? ' muted' : ''}">${val !== null ? val : '-'}</span>
      </div>`;
    }

    async function loadItem() {
      if (!itemId) return;
      try {
        const item = await API.get('/master/items/' + itemId);
        document.getElementById('page-title').textContent = item.item_code + ' — ' + item.item_name;
        document.title = 'Company Operation — ' + item.item_code;

        // Status badge
        const badgeEl = document.getElementById('item-status-badge');
        if (item.is_active !== undefined) {
          badgeEl.innerHTML = item.is_active
            ? '<span class="status-badge active">Active</span>'
            : '<span class="status-badge inactive">Inactive</span>';
        }

        // Item info grid
        const totalQty = parseFloat(item.quantity_on_hand || 0);
        document.getElementById('item-info').innerHTML =
          field('Item Code', item.item_code) +
          field('Item Name', item.item_name) +
          field('Name (TH)', item.item_name_th) +
          field('Description', item.description) +
          field('Category', item.category) +
          field('UOM', item.uom) +
          field('Unit Price', item.unit_price != null ? fmtMoney(parseFloat(item.unit_price)) : null) +
          field('Tax Code', item.tax_code) +
          field('GL Account', item.gl_account) +
          field('Expiry Date', item.expiry_date ? item.expiry_date.substring(0, 10) : null) +
          field('Total Qty on Hand', totalQty.toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 2 })) +
          (item.has_warranty
            ? field('Warranty', (item.warranty_months || 0) + ' months — ' + (item.warranty_terms || 'N/A'))
            : field('Warranty', 'No warranty'));

        // Render stock by warehouse (mock split)
        renderWarehouseStock(totalQty);
      } catch (err) {
        if (err && (err.message === 'Session expired' || err.message === 'Password change required')) return;
        document.getElementById('item-info').innerHTML = '<div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--danger);">Failed to load item: ' + (err.message || err) + '</div>';
        document.getElementById('stock-table').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-muted);">-</td></tr>';
      }
    }

    function renderWarehouseStock(totalQty) {
      // Mock warehouse distribution — in a real implementation this would come from
      // a warehouse_stock API endpoint. For now we split the total across warehouses.
      const warehouses = [
        { code: 'HQ01', name: 'Head Office (Main Warehouse)' },
        { code: 'PJ00', name: 'Project Site — General' },
        { code: 'PJ01', name: 'Project Site — 01' }
      ];

      let rows = '';
      if (totalQty <= 0) {
        rows = warehouses.map(w =>
          `<tr style="border-bottom:1px solid var(--border-light);">
            <td style="padding:10px;font-weight:600;color:var(--primary);">${w.code}</td>
            <td style="padding:10px;">${w.name}</td>
            <td style="padding:10px;text-align:right;color:var(--text-muted);">0</td>
          </tr>`
        ).join('');
      } else {
        // Distribute: 60% HQ01, 25% PJ00, 15% PJ01
        const dist = [0.6, 0.25, 0.15];
        let allocated = 0;
        rows = warehouses.map((w, i) => {
          let qty;
          if (i === warehouses.length - 1) {
            qty = Math.round((totalQty - allocated) * 100) / 100;
          } else {
            qty = Math.round(totalQty * dist[i] * 100) / 100;
            allocated += qty;
          }
          return `<tr style="border-bottom:1px solid var(--border-light);">
            <td style="padding:10px;font-weight:600;color:var(--primary);">${w.code}</td>
            <td style="padding:10px;">${w.name}</td>
            <td style="padding:10px;text-align:right;font-weight:600;">${qty.toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}</td>
          </tr>`;
        }).join('');
      }

      document.getElementById('stock-table').innerHTML = rows;
      const totalEl = document.getElementById('stock-total');
      totalEl.style.display = 'block';
      document.getElementById('stock-total-value').textContent = totalQty.toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    if (!API.requireAuth()) throw new Error('Not authenticated');
    loadItem();
  </script>
</body></html>
