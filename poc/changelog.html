<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Change Log</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .version-card {
      background: var(--bg-white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden;
    }
    .version-header {
      padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.15s;
    }
    .version-header:hover { background: var(--bg-hover); }
    .version-tag {
      font-size: 20px; font-weight: 800; color: var(--primary);
    }
    .version-date { font-size: 12px; color: var(--text-muted); }
    .version-stats { display: flex; gap: 12px; font-size: 11px; }
    .version-stats .stat { padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .stat-added { background: var(--success-bg); color: var(--success); }
    .stat-changed { background: var(--warning-bg); color: var(--warning); }
    .stat-fixed { background: var(--info-bg); color: var(--info); }
    .stat-removed { background: var(--danger-bg); color: var(--danger); }

    .version-body { padding: 0 24px 20px; display: none; }
    .version-body.show { display: block; }

    .change-group { margin-bottom: 16px; }
    .change-group h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border-light); }
    .change-item {
      display: flex; gap: 8px; padding: 6px 0; font-size: 13px; line-height: 1.5;
      border-bottom: 1px solid var(--border-light);
    }
    .change-item:last-child { border-bottom: none; }
    .change-badge {
      font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; flex-shrink: 0; height: fit-content; margin-top: 2px;
    }
    .badge-new { background: var(--success-bg); color: var(--success); }
    .badge-update { background: var(--warning-bg); color: var(--warning); }
    .badge-fix { background: var(--info-bg); color: var(--info); }
    .badge-remove { background: var(--danger-bg); color: var(--danger); }
    .badge-security { background: #7c3aed20; color: #7c3aed; }

    .compare-section {
      background: var(--bg-light); border-radius: var(--radius); padding: 16px; margin-top: 16px;
    }
    .compare-section h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .file-diff { font-size: 11px; font-family: var(--font-mono); padding: 4px 0; border-bottom: 1px solid var(--border-light); display: flex; gap: 8px; }
    .file-diff .added { color: var(--success); }
    .file-diff .removed { color: var(--danger); }
    .file-diff .path { color: var(--text-secondary); flex: 1; }

    .current-changes {
      background: var(--warning-bg); border: 1px solid var(--warning); border-radius: var(--radius-lg);
      padding: 16px 24px; margin-bottom: 20px;
    }
    .current-changes h3 { font-size: 14px; font-weight: 700; color: var(--warning); margin-bottom: 8px; }
  </style>
</head>

    function render() {
      // Current version
      const latest = VERSIONS[0];
      document.getElementById('current-version').textContent = latest.tag;

      // Check unsaved changes (simulated — in real app would call git API)
      checkUnsavedChanges();

      // Render versions
      document.getElementById('version-list').innerHTML = VERSIONS.map((v, i) => {
        const addedCount = v.changes.filter(c => c.type === 'new').length;
        const updatedCount = v.changes.filter(c => c.type === 'update').length;
        const fixedCount = v.changes.filter(c => c.type === 'fix').length;
        const removedCount = v.changes.filter(c => c.type === 'remove').length;

        // Group changes by module
        const byModule = {};
        v.changes.forEach(c => {
          if (!byModule[c.module]) byModule[c.module] = [];
          byModule[c.module].push(c);
        });

        return `
        <div class="version-card">
          <div class="version-header" onclick="toggleVersion(${i})">
            <div>
              <div class="version-tag">${v.tag}</div>
              <div style="font-size:13px;font-weight:500;margin-top:2px;">${v.summary}</div>
              <div class="version-date">${v.date}</div>
            </div>
            <div class="version-stats">
              ${addedCount ? '<span class="stat stat-added">+'+addedCount+' new</span>' : ''}
              ${updatedCount ? '<span class="stat stat-changed">'+updatedCount+' updated</span>' : ''}
              ${fixedCount ? '<span class="stat stat-fixed">'+fixedCount+' fixed</span>' : ''}
              ${removedCount ? '<span class="stat stat-removed">'+removedCount+' removed</span>' : ''}
            </div>
          </div>
          <div class="version-body" id="vbody-${i}">
            ${Object.entries(byModule).map(([mod, changes]) => `
              <div class="change-group">
                <h4>${mod}</h4>
                ${changes.map(c => `
                  <div class="change-item">
                    <span class="change-badge badge-${c.type === 'new' ? 'new' : c.type === 'update' ? 'update' : c.type === 'fix' ? 'fix' : c.type === 'security' ? 'security' : 'remove'}">${c.type}</span>
                    <span>${c.desc}</span>
                  </div>
                `).join('')}
              </div>
            `).join('')}

            ${v.files ? `
            <div class="compare-section">
              <h4>Files Changed (${v.files.length} files)</h4>
              ${v.files.map(f => `
                <div class="file-diff">
                  <span class="path">${f.path}</span>
                  <span class="added">+${f.added}</span>
                  <span class="removed">-${f.removed}</span>
                </div>
              `).join('')}
            </div>` : ''}
          </div>
        </div>`;
      }).join('');

      // Auto-expand latest
      if (VERSIONS.length) toggleVersion(0);
    }

    function toggleVersion(idx) {
      const el = document.getElementById('vbody-' + idx);
      if (!el) return;
      el.classList.toggle('show');
    }

    async function checkUnsavedChanges() {
      // This would ideally call a git status API
      // For now, show a placeholder that updates when changes are detected
      const section = document.getElementById('unsaved-section');
      try {
        // Try to detect changes by checking if any API data is newer than last version
        const lastVersionDate = new Date(VERSIONS[0]?.date || '2026-01-01');
        const now = new Date();
        const daysSince = Math.floor((now - lastVersionDate) / 86400000);

        if (daysSince > 0) {
          section.innerHTML = `
            <div class="current-changes">
              <h3>Working Changes (since ${VERSIONS[0]?.tag || 'last save'})</h3>
              <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">${daysSince} days since last version save</div>
              <div style="font-size:13px;">Changes will be logged when you save the next version.</div>
            </div>`;
        } else {
          section.innerHTML = '';
        }
      } catch(e) {
        section.innerHTML = '';
      }
    }

    render();
    // Mark changelog as seen
    if (typeof markChangelogSeen === 'function') markChangelogSeen();
  </script>
</body>
