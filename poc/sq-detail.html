<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Sales Quotation</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    @media print { body > *:not(.print-area) { display:none!important; } .print-area { display:block!important; } }
  </style>
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">

  <!-- Top bar -->
  <div class="doc-toolbar">
    <div class="doc-toolbar-left">
      <a href="quotation.html" class="doc-back">&larr; Back</a>
      <span style="color:var(--border);">|</span>
      <span style="font-size:12px;color:var(--text-muted);" id="doc-nav-info">-</span>
      <button class="doc-nav-btn" onclick="navDoc(-1)">&laquo;</button>
      <button class="doc-nav-btn" onclick="navDoc(1)">&raquo;</button>
    </div>
    <div class="doc-toolbar-right" id="topActions"></div>
  </div>

  <div class="page" style="max-width:1200px;">

    <!-- Document Header -->
    <div class="doc-card">
      <div class="doc-card-top">
        <div>
          <div class="doc-type-label">SALES QUOTATION</div>
          <div class="doc-number" id="docNumber">-</div>
        </div>
        <div id="statusBadge"></div>
      </div>
      <div class="doc-fields" id="formFields"></div>
    </div>

    <!-- Line Items -->
    <div class="doc-lines">
      <div class="doc-lines-header">
        <h3>Line Items</h3>
        <button class="btn btn-sm btn-primary" id="btn-add-line" onclick="addLine()" style="display:none;">+ Add Row</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead id="lines-head"></thead>
          <tbody id="lines-body"></tbody>
        </table>
      </div>
      <div class="doc-totals">
        <div class="doc-totals-box" id="totalsBox"></div>
      </div>
    </div>

    <!-- Bottom Tabs -->
    <div class="doc-tabs">
      <div class="doc-tabs-bar">
        <div class="doc-tab active" onclick="switchTab('info',this)">Document Info</div>
        <div class="doc-tab" onclick="switchTab('print',this)">Print Preview</div>
      </div>
      <div class="doc-tab-panel active" id="tab-info"></div>
      <div class="doc-tab-panel" id="tab-print"></div>
    </div>

  </div>
  </div>

  <div class="print-area" id="printArea" style="display:none"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/highlight.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/item-picker.js"></script>
  <script>
    var doc = null, lines = [], allDocs = [], currentIdx = 0;
    var isEditing = false, isNew = false, allProjects = [];
    var params = new URLSearchParams(location.search);
    var docId = params.get('id'), mode = params.get('mode');

    function money(n) { return (parseFloat(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }

    // === Shared error UI: toast + render error state (skip auth side-effects) ===
    function showLoadError(err) {
      if (err && (err.message === 'Session expired' || err.message === 'Password change required')) return false;
      showToast('โหลดข้อมูลไม่สำเร็จ: ' + ((err && err.message) || err), 'error');
      var ff = document.getElementById('formFields');
      if (ff) ff.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">ไม่สามารถโหลดข้อมูลได้ ลองใหม่อีกครั้ง</div>';
      var lb = document.getElementById('lines-body');
      if (lb) lb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:24px;">ไม่สามารถโหลดข้อมูลได้</td></tr>';
      return true;
    }

    // === Init: await ALL master data before render ===
    async function init() {
      try {
        await Promise.all([loadMasterItems(), loadMasterCustomers(), loadProjects()]);
        allDocs = await API.get('/quotations').catch(function() { return []; });
        if (!Array.isArray(allDocs)) allDocs = [];

        if (mode === 'new') {
          isNew = true; isEditing = true;
          doc = { status:'draft', vat_pct:7, discount_pct:0, validity_days:30 };
          lines = [];
          currentIdx = allDocs.length;
        } else if (docId) {
          doc = await API.get('/quotations/' + docId);
          lines = (doc.items || []).map(function(it) { return Object.assign({}, it); });
          currentIdx = allDocs.findIndex(function(d) { return d.id === docId; });
          if (currentIdx < 0) currentIdx = 0;
        } else if (allDocs.length) {
          await loadDocByIdx(0);
        }
        render();
        // Handle copy
        var copyId = params.get('copy');
        if (copyId && isNew) {
          try {
            var src = await API.get('/quotations/' + copyId);
            doc.customer_name = src.customer_name; doc.customer_phone = src.customer_phone;
            doc.customer_address = src.customer_address; doc.site_name = src.site_name;
            doc.system_capacity = src.system_capacity; doc.roof_type = src.roof_type;
            doc.roof_area = src.roof_area; doc.project_id = src.project_id;
            doc.terms = src.terms; doc.notes = src.notes;
            doc.discount_pct = src.discount_pct; doc.validity_days = src.validity_days;
            lines = (src.items || []).map(function(it) { return Object.assign({}, it, {id:undefined}); });
            render();
          } catch(e) {}
        }
      } catch (err) {
        showLoadError(err);
      }
    }

    async function loadProjects() {
      try { allProjects = await API.getProjects(); if (!Array.isArray(allProjects)) allProjects = []; }
      catch(e) { allProjects = []; }
    }

    async function loadDocByIdx(idx) {
      if (idx < 0 || idx >= allDocs.length) return;
      try {
        currentIdx = idx;
        doc = await API.get('/quotations/' + allDocs[idx].id);
        lines = (doc.items || []).map(function(it) { return Object.assign({}, it); });
        isNew = false; isEditing = false;
      } catch (err) {
        showLoadError(err);
      }
    }

    function navDoc(dir) {
      var newIdx = currentIdx + dir;
      if (newIdx < 0 || newIdx >= allDocs.length) return;
      loadDocByIdx(newIdx).then(function() {
        var url = new URL(window.location);
        url.searchParams.set('id', allDocs[newIdx].id);
        url.searchParams.delete('mode');
        history.replaceState(null, '', url);
        render();
      });
    }

    // === Render ===
    function render() {
      if (!doc) return;
      document.getElementById('doc-nav-info').textContent = (currentIdx + 1) + ' / ' + (isNew ? allDocs.length + 1 : allDocs.length);
      var st = doc.status || 'draft';
      var stColors = { draft:'background:#e2e3e5;color:#383d41', sent:'background:#dbeafe;color:#1d4ed8', accepted:'background:#d4edda;color:#155724', rejected:'background:#f8d7da;color:#721c24' };
      document.getElementById('statusBadge').innerHTML = '<span style="' + (stColors[st]||stColors.draft) + ';padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;">' + st.toUpperCase() + '</span>';
      document.getElementById('docNumber').textContent = doc.sq_number || (isNew ? 'NEW' : '-');
      renderFormFields();
      renderLines();
      renderTotals();
      renderTopActions();
      renderBottomTabs();
    }

    function renderFormFields() {
      var h = '';
      if (isEditing) {
        var projOpts = '<option value="">-</option>' + allProjects.map(function(p) {
          return '<option value="' + p.id + '"' + (doc.project_id === p.id ? ' selected' : '') + '>' + (p.code||'') + ' - ' + (p.name||'') + '</option>';
        }).join('');
        var roofOpts = ['','metal_sheet','tile','concrete'].map(function(v) {
          var lb = {'':'--','metal_sheet':'Metal Sheet','tile':'Tile','concrete':'Concrete'};
          return '<option value="' + v + '"' + (doc.roof_type === v ? ' selected' : '') + '>' + lb[v] + '</option>';
        }).join('');

        h += field('SQ Number', '<div class="read-val">' + (doc.sq_number||'Auto') + '</div>');
        h += fieldInput('Document Date', 'date', 'fDate', doc.created_at ? doc.created_at.substring(0,10) : new Date().toISOString().substring(0,10));
        h += fieldInput('Validity (days)', 'number', 'fValidity', doc.validity_days || 30);
        h += fieldInput('Discount %', 'number', 'fDiscPct', doc.discount_pct || 0, 'onchange="renderTotals()"');
        h += '<div class="doc-field"><label>Customer</label><select id="fCustName" class="searchable" onchange="onCustomerSelect(this)">' + buildCustomerOptions(doc.customer_name) + '</select></div>';
        h += fieldInput('Phone', 'text', 'fCustPhone', doc.customer_phone || '');
        h += '<div class="doc-field span-2"><label>Address</label><input id="fCustAddr" value="' + esc(doc.customer_address) + '"></div>';
        h += fieldInput('Site Name', 'text', 'fSiteName', doc.site_name || '');
        h += fieldInput('Capacity (kWp)', 'number', 'fCapacity', doc.system_capacity || '');
        h += '<div class="doc-field"><label>Roof Type</label><select id="fRoofType">' + roofOpts + '</select></div>';
        h += fieldInput('Roof Area (sqm)', 'number', 'fRoofArea', doc.roof_area || '');
        h += '<div class="doc-field"><label>Project</label><select id="fProject">' + projOpts + '</select></div>';
        h += '<div class="doc-field span-2"><label>Terms</label><input id="fTerms" value="' + esc(doc.terms) + '"></div>';
        h += '<div class="doc-field span-4"><label>Notes</label><input id="fNotes" value="' + esc(doc.notes) + '"></div>';
      } else {
        h += readField('SQ Number', doc.sq_number || '-');
        h += readField('Date', doc.created_at ? new Date(doc.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}) : '-');
        h += readField('Validity', (doc.validity_days||30) + ' days');
        h += readField('Grand Total', fmtMoney(doc.grand_total||0));
        h += readField('Customer', doc.customer_name || '-');
        h += readField('Phone', doc.customer_phone || '-');
        h += readField('Address', doc.customer_address || '-', 2);
        h += readField('Site', doc.site_name || '-');
        h += readField('Capacity', (doc.system_capacity||'-') + ' kWp');
        h += readField('Roof', doc.roof_type || '-');
        h += readField('Roof Area', (doc.roof_area||'-') + ' sqm');
        h += readField('Project', doc.project_code ? doc.project_code + ' - ' + (doc.project_name||'') : '-');
        h += readField('Terms', doc.terms || '-', 2);
        h += readField('Notes', doc.notes || '-', 4);
      }
      document.getElementById('formFields').innerHTML = h;

      // Init searchable dropdowns after DOM update
      if (isEditing) {
        requestAnimationFrame(function() {
          var custSel = document.getElementById('fCustName');
          if (custSel && custSel.dataset.searchable !== 'done') makeSearchable(custSel);
        });
      }
    }

    function esc(s) { return (s||'').replace(/"/g,'&quot;'); }
    function field(label, html) { return '<div class="doc-field"><label>' + label + '</label>' + html + '</div>'; }
    function fieldInput(label, type, id, val, extra) { return '<div class="doc-field"><label>' + label + '</label><input type="' + type + '" id="' + id + '" value="' + (val===null||val===undefined?'':val) + '" ' + (extra||'') + '></div>'; }
    function readField(label, val, span) { return '<div class="doc-field' + (span ? ' span-'+span : '') + '"><label>' + label + '</label><div class="read-val">' + (val||'-') + '</div></div>'; }

    function renderLines() {
      var ec = isEditing ? '<th style="width:36px"></th>' : '';
      document.getElementById('lines-head').innerHTML = '<tr><th style="width:40px">#</th><th style="width:28%">Item Code</th><th style="width:22%">Description</th><th class="num" style="width:8%">Qty</th><th style="width:8%">UoM</th><th class="num" style="width:12%">Unit Price</th><th class="num" style="width:12%">Total</th>' + ec + '</tr>';

      if (!lines.length && !isEditing) {
        document.getElementById('lines-body').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:24px;">No line items</td></tr>';
      } else {
        document.getElementById('lines-body').innerHTML = lines.map(function(l, i) {
          var total = (parseFloat(l.qty)||0) * (parseFloat(l.unit_price)||0);
          if (isEditing) {
            return '<tr>' +
              '<td class="row-num">' + (i+1) + '</td>' +
              '<td><select class="searchable item-code-select" onchange="onLineItemSelect(this,' + i + ')">' + buildItemOptions(l.item_code) + '</select></td>' +
              '<td><input value="' + esc(l.item_name) + '" data-field="item_name"></td>' +
              '<td class="num"><input type="number" value="' + (l.qty||1) + '" min="0" style="width:60px" onchange="updateLineField(' + i + ',\'qty\',this.value)"></td>' +
              '<td><input value="' + (l.unit||l.uom||'EA') + '" data-field="uom" style="width:60px"></td>' +
              '<td class="num"><input type="number" value="' + (l.unit_price||0) + '" step="0.01" data-field="price" onchange="updateLineField(' + i + ',\'price\',this.value)"></td>' +
              '<td class="num" style="font-weight:700" data-cell="total">' + money(total) + '</td>' +
              '<td class="row-action"><button onclick="removeLine(' + i + ')">&times;</button></td>' +
              '</tr>';
          } else {
            return '<tr>' +
              '<td class="row-num">' + (i+1) + '</td>' +
              '<td style="font-family:var(--font-mono);font-weight:600;color:var(--primary)">' + (l.item_code||'-') + '</td>' +
              '<td>' + (l.item_name||'-') + '</td>' +
              '<td class="num">' + (l.qty||0) + '</td>' +
              '<td>' + (l.unit||l.uom||'EA') + '</td>' +
              '<td class="num">' + money(l.unit_price) + '</td>' +
              '<td class="num" style="font-weight:700">' + money(total) + '</td>' +
              '</tr>';
          }
        }).join('');
      }

      document.getElementById('btn-add-line').style.display = isEditing ? '' : 'none';

      // Init searchable on item selects
      if (isEditing) {
        requestAnimationFrame(function() {
          document.querySelectorAll('#lines-body select.searchable:not([data-searchable="done"])')
            .forEach(function(s) { makeSearchable(s); });
        });
      }
    }

    function renderTotals() {
      var subtotal = lines.reduce(function(s, l) { return s + (parseFloat(l.qty)||0) * (parseFloat(l.unit_price)||0); }, 0);
      var discPct = isEditing ? (parseFloat(document.getElementById('fDiscPct')?.value)||0) : (parseFloat(doc.discount_pct)||0);
      var discAmt = Math.round(subtotal * discPct / 100 * 100) / 100;
      var afterDisc = subtotal - discAmt;
      var vatAmt = Math.round(afterDisc * 0.07 * 100) / 100;
      var grand = afterDisc + vatAmt;
      document.getElementById('totalsBox').innerHTML =
        '<div class="doc-totals-row"><span>Subtotal</span><span>' + money(subtotal) + '</span></div>' +
        (discAmt ? '<div class="doc-totals-row"><span>Discount ' + discPct + '%</span><span>-' + money(discAmt) + '</span></div>' : '') +
        '<div class="doc-totals-row"><span>VAT 7%</span><span>' + money(vatAmt) + '</span></div>' +
        '<div class="doc-totals-row grand"><span>Grand Total</span><span>' + money(grand) + '</span></div>';
    }

    function renderTopActions() {
      var st = doc.status || 'draft';
      var h = '';
      if (isEditing) {
        h += '<button class="btn btn-primary btn-sm" onclick="saveDoc()">Save</button>';
        if (!isNew) h += '<button class="btn btn-secondary btn-sm" onclick="cancelEdit()">Cancel</button>';
      } else {
        h += '<button class="btn btn-secondary btn-sm" onclick="startEdit()">Edit</button>';
        if (st === 'draft') h += '<button class="btn btn-primary btn-sm" onclick="changeStatus(\'sent\')">Send to Customer</button>';
        if (st === 'sent') {
          h += '<button class="btn btn-success btn-sm" onclick="changeStatus(\'accepted\')">Accepted</button>';
          h += '<button class="btn btn-danger btn-sm" onclick="changeStatus(\'rejected\')">Rejected</button>';
        }
        h += '<button class="btn btn-secondary btn-sm" onclick="printSQ()">Print</button>';
        if (hasWarrantyLines()) h += '<button class="btn btn-sm" style="background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;" onclick="printWarranty()">🛡️ บัตร Warranty</button>';
        if (st === 'accepted' || st === 'rejected') h += '<button class="btn btn-secondary btn-sm" onclick="copyToNew()">Copy to New</button>';
      }
      document.getElementById('topActions').innerHTML = h;
    }

    function renderBottomTabs() {
      document.getElementById('tab-info').innerHTML = '<div style="line-height:2;color:var(--text-secondary);">' +
        '<strong>Created:</strong> ' + (doc.created_at ? new Date(doc.created_at).toLocaleString('th-TH') : '-') + '<br>' +
        '<strong>Updated:</strong> ' + (doc.updated_at ? new Date(doc.updated_at).toLocaleString('th-TH') : '-') + '<br>' +
        '<strong>Created by:</strong> ' + (doc.created_by_name || '-') + '<br>' +
        '<strong>Status:</strong> ' + (doc.status || '-') + '</div>';
      document.getElementById('tab-print').innerHTML = '<div style="text-align:center;padding:20px;"><button class="btn btn-primary" onclick="printSQ()">Print Quotation</button></div>';
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.doc-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.doc-tab-panel').forEach(function(t) { t.classList.remove('active'); });
      el.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // === Line Item Actions (update DOM directly, no re-render) ===
    function addLine() {
      lines.push({ item_code:'', item_name:'', qty:1, unit:'EA', unit_price:0, total:0 });
      renderLines();
      renderTotals();
      requestAnimationFrame(function() {
        var rows = document.querySelectorAll('#lines-body tr');
        var last = rows[rows.length - 1];
        if (last) {
          var inp = last.querySelector('.ss-wrapper input');
          if (inp) inp.focus();
        }
      });
    }

    function removeLine(i) { lines.splice(i, 1); renderLines(); renderTotals(); }

    function updateLineField(i, field, val) {
      var v = parseFloat(val) || 0;
      if (field === 'qty') lines[i].qty = v;
      if (field === 'price') lines[i].unit_price = v;
      lines[i].total = (parseFloat(lines[i].qty)||0) * (parseFloat(lines[i].unit_price)||0);
      // Update total cell directly
      var rows = document.querySelectorAll('#lines-body tr');
      if (rows[i]) {
        var tc = rows[i].querySelector('[data-cell="total"]');
        if (tc) tc.textContent = money(lines[i].total);
      }
      renderTotals();
    }

    function onLineItemSelect(sel, i) {
      var opt = sel.options[sel.selectedIndex];
      if (!opt || !opt.value) return;
      lines[i].item_code = opt.value;
      lines[i].item_name = opt.dataset.name || '';
      lines[i].unit = opt.dataset.uom || 'EA';
      lines[i].unit_price = parseFloat(opt.dataset.price) || 0;
      lines[i].total = (parseFloat(lines[i].qty) || 1) * lines[i].unit_price;
      // Update DOM directly
      var row = sel.closest('tr');
      if (row) {
        var nameInp = row.querySelector('[data-field="item_name"]');
        var uomInp = row.querySelector('[data-field="uom"]');
        var priceInp = row.querySelector('[data-field="price"]');
        if (nameInp) nameInp.value = lines[i].item_name;
        if (uomInp) uomInp.value = lines[i].unit;
        if (priceInp) priceInp.value = lines[i].unit_price;
        var tc = row.querySelector('[data-cell="total"]');
        if (tc) tc.textContent = money(lines[i].total);
      }
      // Warranty alert — tell the seller this product carries a warranty and a
      // warranty document can be attached to this sale.
      if (opt.dataset.warranty === '1') {
        var wm = parseInt(opt.dataset.wmonths) || 0;
        if (typeof showToast === 'function')
          showToast('🛡️ "' + lines[i].item_name + '" มีการรับประกัน ' + wm + ' เดือน — กดปุ่ม "บัตร Warranty" เพื่อออกเอกสารพ่วงกับใบขายนี้', 'info');
      }
      renderTotals();
    }

    // === Warranty ===
    // Which line items carry a warranty (looked up from the item master cache).
    function warrantyLines() {
      var byCode = {};
      (window._masterItems || []).forEach(function(m) { if (m.item_code) byCode[m.item_code] = m; });
      return lines.map(function(l) { return { line: l, m: byCode[l.item_code] }; })
                  .filter(function(x) { return x.m && x.m.has_warranty; });
    }
    function hasWarrantyLines() { return warrantyLines().length > 0; }

    function printWarranty() {
      var wl = warrantyLines();
      if (!wl.length) { if (typeof showToast === 'function') showToast('ไม่มีสินค้าที่มีการรับประกันในเอกสารนี้', 'warning'); return; }
      var startStr = doc.created_at ? doc.created_at.substring(0,10) : new Date().toISOString().substring(0,10);
      var start = new Date(startStr + 'T00:00:00');
      var thDate = function(d) { return d.toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' }); };
      var addMonths = function(d, m) { var x = new Date(d); x.setMonth(x.getMonth() + (m||0)); return x; };
      var esc2 = function(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); };
      var rows = wl.map(function(x, idx) {
        var endD = addMonths(start, x.m.warranty_months);
        return '<tr>'
          + '<td style="text-align:center">' + (idx+1) + '</td>'
          + '<td>' + esc2(x.line.item_code) + '</td>'
          + '<td>' + esc2(x.line.item_name) + '</td>'
          + '<td style="text-align:center">' + (parseFloat(x.line.qty)||1) + ' ' + esc2(x.line.unit||'') + '</td>'
          + '<td style="text-align:center">' + (x.m.warranty_months||0) + ' เดือน</td>'
          + '<td style="text-align:center">' + thDate(start) + '</td>'
          + '<td style="text-align:center">' + thDate(endD) + '</td>'
          + '</tr>'
          + (x.m.warranty_terms ? '<tr><td></td><td colspan="6" style="font-size:11px;color:#555;border-top:none;padding-top:0">เงื่อนไข: ' + esc2(x.m.warranty_terms) + '</td></tr>' : '');
      }).join('');
      var html = '<!DOCTYPE html><html lang="th"><head><meta charset="utf-8"><title>บัตรรับประกัน — ' + esc2(doc.sq_number||'') + '</title>'
        + '<style>@page{size:A4;margin:18mm}*{font-family:"Sarabun","TH Sarabun New",sans-serif}'
        + 'body{color:#1f2937}h1{font-size:22px;margin:0 0 2px}.sub{color:#374151;font-size:12px}'
        + '.box{border:1px solid #e5e7eb;border-radius:10px;padding:14px 18px;margin:14px 0}'
        + '.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;font-size:13px}'
        + '.lbl{color:#374151;font-size:11px}table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}'
        + 'th,td{border:1px solid #e5e7eb;padding:7px 8px}th{background:#f3f4f6;text-align:left;font-size:11px}'
        + '.head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #2563eb;padding-bottom:10px}'
        + '.badge{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;border-radius:8px;padding:4px 12px;font-weight:700;font-size:13px}'
        + '.terms{font-size:11px;color:#374151;margin-top:10px;line-height:1.5}.sign{margin-top:40px;display:flex;justify-content:space-between}'
        + '.sign div{text-align:center;width:40%}.sign .line{border-top:1px solid #4b5563;margin-top:40px;padding-top:6px;font-size:12px}</style></head><body>'
        + '<div class="head"><div><h1>🛡️ บัตรรับประกันสินค้า</h1><div class="sub">Warranty Certificate</div></div>'
        + '<div class="badge">อ้างอิงใบขาย: ' + esc2(doc.sq_number||'-') + '</div></div>'
        + '<div class="box"><div class="grid">'
        + '<div><div class="lbl">ลูกค้า</div>' + esc2(doc.customer_name||'-') + '</div>'
        + '<div><div class="lbl">โทรศัพท์</div>' + esc2(doc.customer_phone||'-') + '</div>'
        + '<div><div class="lbl">วันที่ขาย / เริ่มรับประกัน</div>' + thDate(start) + '</div>'
        + '<div><div class="lbl">สถานที่ / โครงการ</div>' + esc2(doc.site_name||doc.customer_address||'-') + '</div>'
        + '</div></div>'
        + '<table><thead><tr><th style="text-align:center">#</th><th>รหัสสินค้า</th><th>รายการ</th><th style="text-align:center">จำนวน</th><th style="text-align:center">ระยะประกัน</th><th style="text-align:center">เริ่ม</th><th style="text-align:center">สิ้นสุด</th></tr></thead><tbody>'
        + rows + '</tbody></table>'
        + '<div class="terms">* บัตรรับประกันนี้ออกพ่วงกับใบขายเลขที่ ' + esc2(doc.sq_number||'-') + ' โปรดเก็บไว้เป็นหลักฐานในการขอรับบริการรับประกัน · การรับประกันครอบคลุมเฉพาะความเสียหายจากการผลิตตามเงื่อนไขของสินค้าแต่ละรายการ ไม่รวมความเสียหายจากการใช้งานผิดวิธี</div>'
        + '<div class="sign"><div><div class="line">ผู้ขาย / บริษัท</div></div><div><div class="line">ลูกค้า</div></div></div>'
        + '<script>window.onload=function(){window.print();}<\/script></body></html>';
      var w = window.open('', '_blank');
      if (!w) { if (typeof showToast === 'function') showToast('เบราว์เซอร์บล็อก popup — อนุญาต popup เพื่อพิมพ์บัตร Warranty', 'warning'); return; }
      w.document.write(html); w.document.close();
    }

    // === Edit / Save ===
    function startEdit() { isEditing = true; render(); }
    function cancelEdit() { isEditing = false; render(); }

    function collectFormData() {
      var subtotal = lines.reduce(function(s, l) { return s + (parseFloat(l.qty)||0) * (parseFloat(l.unit_price)||0); }, 0);
      var discPct = parseFloat(document.getElementById('fDiscPct')?.value) || 0;
      var discAmt = Math.round(subtotal * discPct / 100 * 100) / 100;
      var afterDisc = subtotal - discAmt;
      var vatAmt = Math.round(afterDisc * 0.07 * 100) / 100;
      var grand = afterDisc + vatAmt;

      // Read lines from DOM using specific selectors
      var domLines = [];
      document.querySelectorAll('#lines-body tr').forEach(function(row) {
        var itemSel = row.querySelector('select.item-code-select');
        var nameInp = row.querySelector('[data-field="item_name"]');
        if (!itemSel && !nameInp) return;
        var qty = parseFloat(row.querySelector('input[type="number"]')?.value) || 1;
        var price = parseFloat(row.querySelector('[data-field="price"]')?.value) || 0;
        domLines.push({
          item_code: itemSel?.value || '',
          item_name: nameInp?.value || '',
          qty: qty,
          unit: row.querySelector('[data-field="uom"]')?.value || 'EA',
          unit_price: price,
          total: qty * price
        });
      });

      var custSel = document.getElementById('fCustName');
      var custOpt = custSel?.selectedOptions?.[0];

      return {
        customer_name: custOpt?.dataset?.name || custSel?.value || null,
        customer_phone: document.getElementById('fCustPhone')?.value || null,
        customer_address: document.getElementById('fCustAddr')?.value || null,
        site_name: document.getElementById('fSiteName')?.value || null,
        system_capacity: document.getElementById('fCapacity')?.value || null,
        roof_type: document.getElementById('fRoofType')?.value || null,
        roof_area: document.getElementById('fRoofArea')?.value || null,
        project_id: document.getElementById('fProject')?.value || null,
        terms: document.getElementById('fTerms')?.value || null,
        notes: document.getElementById('fNotes')?.value || null,
        validity_days: parseInt(document.getElementById('fValidity')?.value) || 30,
        subtotal: subtotal, discount_pct: discPct, discount_amt: discAmt,
        vat_pct: 7, vat_amt: vatAmt, grand_total: grand,
        items: domLines.length ? domLines : lines,
      };
    }

    async function saveDoc() {
      var data = collectFormData();
      try {
        if (isNew) {
          var result = await API.post('/quotations', data);
          showToast('Created: ' + (result.sq_number||''), 'success');
          window.location = 'sq-detail.html?id=' + result.id;
        } else {
          await API.put('/quotations/' + doc.id, data);
          showToast('Saved', 'success');
          doc = await API.get('/quotations/' + doc.id);
          lines = (doc.items || []).map(function(it) { return Object.assign({}, it); });
          isEditing = false;
          render();
        }
      } catch(e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function changeStatus(newStatus) {
      var msg = { sent:'Send this quotation?', accepted:'Mark as accepted?', rejected:'Mark as rejected?' };
      if (!confirm(msg[newStatus] || 'Change status?')) return;
      try {
        await API.put('/quotations/' + doc.id, { status: newStatus });
        showToast('Status updated', 'success');
        doc.status = newStatus; render();
      } catch(e) { showToast('Error: ' + e.message, 'error'); }
    }

    function copyToNew() { window.location = 'sq-detail.html?mode=new&copy=' + doc.id; }

    function printSQ() {
      var sq = doc, items = lines;
      var subtotal = items.reduce(function(s,it) { return s + (parseFloat(it.qty)||0)*(parseFloat(it.unit_price)||0); }, 0);
      var discAmt = parseFloat(sq.discount_amt)||0, vatAmt = parseFloat(sq.vat_amt)||0, grand = parseFloat(sq.grand_total)||0;
      var h = '<div style="max-width:800px;margin:0 auto;padding:40px;font-family:sans-serif;font-size:14px">' +
        '<div style="text-align:center;margin-bottom:30px"><h1 style="font-size:20px;margin:0">Sales Quotation</h1><p style="font-size:13px;color:#666;margin:4px 0">' + (sq.sq_number||'') + '</p></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;font-size:13px"><div><strong>Customer:</strong> ' + (sq.customer_name||'-') + '<br><strong>Phone:</strong> ' + (sq.customer_phone||'-') + '<br><strong>Address:</strong> ' + (sq.customer_address||'-') + '</div><div style="text-align:right"><strong>Site:</strong> ' + (sq.site_name||'-') + '<br><strong>Capacity:</strong> ' + (sq.system_capacity||'-') + ' kWp<br><strong>Valid:</strong> ' + (sq.validity_days||30) + ' days</div></div>' +
        '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px"><thead><tr style="background:#f5f5f5"><th style="padding:8px;text-align:left;border-bottom:2px solid #333">#</th><th style="padding:8px;text-align:left;border-bottom:2px solid #333">Code</th><th style="padding:8px;text-align:left;border-bottom:2px solid #333">Description</th><th style="padding:8px;text-align:right;border-bottom:2px solid #333">Qty</th><th style="padding:8px;border-bottom:2px solid #333">Unit</th><th style="padding:8px;text-align:right;border-bottom:2px solid #333">Price</th><th style="padding:8px;text-align:right;border-bottom:2px solid #333">Total</th></tr></thead><tbody>' +
        items.map(function(it,i) { var t=(parseFloat(it.qty)||0)*(parseFloat(it.unit_price)||0); return '<tr><td style="padding:6px 8px;border-bottom:1px solid #eee">'+(i+1)+'</td><td style="padding:6px 8px;border-bottom:1px solid #eee">'+(it.item_code||'')+'</td><td style="padding:6px 8px;border-bottom:1px solid #eee">'+(it.item_name||'')+'</td><td style="padding:6px 8px;text-align:right;border-bottom:1px solid #eee">'+(it.qty||0)+'</td><td style="padding:6px 8px;border-bottom:1px solid #eee">'+(it.unit||'')+'</td><td style="padding:6px 8px;text-align:right;border-bottom:1px solid #eee">'+Number(it.unit_price||0).toLocaleString()+'</td><td style="padding:6px 8px;text-align:right;border-bottom:1px solid #eee">'+Number(t).toLocaleString()+'</td></tr>'; }).join('') +
        '</tbody></table>' +
        '<div style="width:300px;margin-left:auto;font-size:13px"><div style="display:flex;justify-content:space-between;padding:4px 0"><span>Subtotal</span><span>'+Number(subtotal).toLocaleString()+'</span></div>' +
        (discAmt?'<div style="display:flex;justify-content:space-between;padding:4px 0"><span>Discount</span><span>-'+Number(discAmt).toLocaleString()+'</span></div>':'') +
        '<div style="display:flex;justify-content:space-between;padding:4px 0"><span>VAT 7%</span><span>'+Number(vatAmt).toLocaleString()+'</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:8px 0;border-top:2px solid #333;font-size:16px;font-weight:800"><span>Grand Total</span><span>B'+Number(grand).toLocaleString()+'</span></div></div>' +
        (sq.terms?'<div style="margin-top:20px;font-size:12px;color:#666"><strong>Terms:</strong> '+sq.terms+'</div>':'') +
        '</div>';
      var pa = document.getElementById('printArea');
      pa.innerHTML = h; pa.style.display = 'block';
      window.print();
      setTimeout(function() { pa.style.display = 'none'; }, 500);
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && isEditing && !isNew) cancelEdit(); });

    if (!API.requireAuth()) throw new Error('Not authenticated');
    init().catch(function(err) { showLoadError(err); });
  </script>
</body>
</html>
