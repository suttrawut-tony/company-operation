<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Item Master</title>
  <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <div class="page-header">
      <div><h1>Item Master</h1><div id="item-mode-note" style="font-size:12px;color:var(--text-secondary);margin-top:2px;"></div></div>
      <div style="display:flex;gap:8px;" id="item-header-actions">
        <button class="btn btn-secondary" onclick="exportItems()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Export Excel</button>
      </div>
    </div>
    <div style="margin-bottom:16px;display:flex;gap:12px;">
      <input type="text" class="form-input" id="item-search" placeholder="Search code, name..." oninput="renderItems()" style="width:300px;">
      <select class="form-select" id="item-cat-filter" onchange="renderItems()" style="width:150px;">
        <option value="">All Category</option>
        <option value="equipment">Equipment</option>
        <option value="material">Material</option>
        <option value="service">Service</option>
      </select>
    </div>
    <div class="card">
      <div class="table-container">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="background:var(--bg-light);"><th style="text-align:left;padding:10px;">Code</th><th style="text-align:left;padding:10px;">Name</th><th style="text-align:left;padding:10px;">Name (TH)</th><th style="text-align:left;padding:10px;">Description</th><th style="padding:10px;">Category</th><th style="padding:10px;">UOM</th><th style="text-align:right;padding:10px;">Qty</th><th style="text-align:right;padding:10px;">Unit Price</th><th style="padding:10px;">GL</th><th style="padding:10px;">Tax</th><th style="padding:10px;">Actions</th></tr></thead>
          <tbody id="item-table"></tbody>
        </table>
      </div>
    </div>
    <!-- Modal -->
    <div class="modal-overlay" id="item-modal" onclick="if(event.target===this)closeItemModal()" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:var(--bg-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:520px;max-width:95vw;">
        <div style="padding:20px 24px 0;display:flex;justify-content:space-between;"><h3 id="item-modal-title">New Item</h3><button onclick="closeItemModal()" style="border:none;background:none;font-size:20px;cursor:pointer;">&times;</button></div>
        <div style="padding:20px 24px;">
          <input type="hidden" id="im-id">
          <div style="display:grid;grid-template-columns:1fr 2fr;gap:12px;">
            <div class="form-group"><label class="form-label">Code</label><input type="text" class="form-input" id="im-code" placeholder="ITM-XXX"></div>
            <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="im-name"></div>
          </div>
          <div class="form-group"><label class="form-label">Name (TH)</label><input type="text" class="form-input" id="im-name-th"></div>
          <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="im-description" rows="2" placeholder="Long description (optional)" style="resize:vertical;"></textarea></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label">Category</label><select class="form-input" id="im-cat"><option value="equipment">Equipment</option><option value="material">Material</option><option value="service">Service</option></select></div>
            <div class="form-group"><label class="form-label">UOM</label><input type="text" class="form-input" id="im-uom" value="EA"></div>
            <div class="form-group"><label class="form-label">Unit Price</label><input type="number" class="form-input" id="im-price" min="0"></div>
            <div class="form-group"><label class="form-label">GL Account</label><input type="text" class="form-input" id="im-gl" value="114101"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label">Expiry Date</label><input type="date" class="form-input" id="im-expiry-date"></div>
            <div class="form-group"><label class="form-label">Quantity on Hand</label><input type="number" class="form-input" id="im-qty-on-hand" min="0" step="0.01" value="0"></div>
          </div>
          <div style="margin-top:6px;border-top:1px dashed var(--border-light);padding-top:12px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;font-size:13px;">
              <input type="checkbox" id="im-warranty" onchange="document.getElementById('im-warranty-box').style.display=this.checked?'grid':'none';"> 🛡️ สินค้านี้มีการรับประกัน (Warranty)
            </label>
            <div id="im-warranty-box" style="display:none;grid-template-columns:1fr 2fr;gap:12px;margin-top:10px;">
              <div class="form-group"><label class="form-label">ระยะเวลา (เดือน)</label><input type="number" class="form-input" id="im-warranty-months" min="0" value="12"></div>
              <div class="form-group"><label class="form-label">เงื่อนไขการรับประกัน</label><input type="text" class="form-input" id="im-warranty-terms" placeholder="เช่น รับประกันความเสียหายจากการผลิต ไม่รวมการใช้งานผิดวิธี"></div>
            </div>
          </div>
        </div>
        <div style="padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="closeItemModal()">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="saveItem()">Save</button>
        </div>
      </div>
    </div>
  </main></div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/highlight.js"></script>
  <script src="assets/js/excel-export.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    let allItems = [];
    let erpMode = false;        // true → items managed by ERP (read-only here)
    let erpSystem = 'ERP';

    async function loadCompanyMode() {
      try {
        const data = await API.get('/company/settings');
        const erp = (data.settings && data.settings.erp_integration) || {};
        erpMode = erp.enabled === true;
        erpSystem = erp.system || 'ERP';
      } catch (e) { erpMode = false; }  // fail-safe: behave as local (can still add)
      renderItemActions();
    }

    function renderItemActions() {
      const actions = document.getElementById('item-header-actions');
      const note = document.getElementById('item-mode-note');
      if (!actions) return;
      const exportBtn = `<button class="btn btn-secondary" onclick="exportItems()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Export Excel</button>`;
      if (erpMode) {
        actions.innerHTML = exportBtn +
          `<button class="btn btn-primary" onclick="syncItems()" id="item-sync-btn" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg> ดึงจาก ERP</button>`;
        if (note) note.innerHTML = '🔗 เชื่อมกับ <b>' + erpSystem + '</b> — ข้อมูลอ่านอย่างเดียว เพิ่ม/แก้จาก ' + erpSystem + ' แล้วกด "ดึงจาก ERP"';
      } else {
        actions.innerHTML =
          `<button class="btn btn-primary" onclick="openItemModal()" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> เพิ่ม Item</button>` + exportBtn;
        if (note) note.textContent = '';
      }
    }

    async function syncItems() {
      const btn = document.getElementById('item-sync-btn');
      if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
      try {
        const r = await API.post('/company/sync-items', {});
        if (r.ok) { showToast(r.message || ('ซิงค์สำเร็จ ' + r.synced + ' รายการ'), 'success'); await loadItems(); }
        else { showToast(r.message || 'ดึงจาก ERP ไม่สำเร็จ', 'warning'); }
      } catch (e) {
        showToast('ดึงจาก ERP ไม่สำเร็จ: ' + (e.message || e), 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
      }
    }

    async function loadItems() {
      try {
        allItems = await API.get('/master/items');
        renderItems();
      } catch (err) {
        if (err && (err.message === 'Session expired' || err.message === 'Password change required')) return;
        showToast('โหลดข้อมูลไม่สำเร็จ: ' + (err.message || err), 'error');
        var tbody = document.getElementById('item-table');
        if (tbody) tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text-muted);">ไม่สามารถโหลดข้อมูลได้ ลองใหม่อีกครั้ง</td></tr>';
      }
    }
    function renderItems() {
      let list = allItems;
      const s = (document.getElementById('item-search')?.value||'').toLowerCase();
      const c = document.getElementById('item-cat-filter')?.value;
      if (s) list = list.filter(i => (i.item_code+i.item_name+i.item_name_th).toLowerCase().includes(s));
      if (c) list = list.filter(i => i.category === c);
      document.getElementById('item-table').innerHTML = list.map(i => `
        <tr style="border-bottom:1px solid var(--border-light);cursor:${erpMode?'default':'pointer'};" ${erpMode?'':`onclick="openEditItem('${i.id}')"`}>
          <td style="padding:10px;font-weight:600;color:var(--primary);">${i.item_code}</td>
          <td style="padding:10px;">${i.item_name}${i.has_warranty?` <span title="รับประกัน ${i.warranty_months||0} เดือน" style="font-size:10px;padding:1px 7px;border-radius:8px;background:#eff6ff;color:#2563eb;font-weight:600;white-space:nowrap;">🛡️ ${i.warranty_months||0} ด.</span>`:''}</td>
          <td style="padding:10px;color:var(--text-secondary);">${i.item_name_th||''}</td>
          <td style="padding:10px;color:var(--text-secondary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(i.description||'').replace(/"/g,'&quot;')}">${i.description||''}</td>
          <td style="padding:10px;text-align:center;"><span style="font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg-hover);">${i.category}</span></td>
          <td style="padding:10px;text-align:center;">${i.uom}</td>
          <td style="padding:10px;text-align:right;">${parseFloat(i.quantity_on_hand||0).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:2})}</td>
          <td style="padding:10px;text-align:right;font-weight:600;">${fmtMoney(parseFloat(i.unit_price||0))}</td>
          <td style="padding:10px;text-align:center;font-size:11px;">${i.gl_account||''}</td>
          <td style="padding:10px;text-align:center;font-size:11px;">${i.tax_code||''}</td>
          <td style="padding:10px;text-align:center;">${i.is_active?'<span style="color:var(--success);">Active</span>':'<span style="color:var(--text-muted);">Inactive</span>'}</td>
        </tr>`).join('') || '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text-muted);">No items</td></tr>';
    }
    function openItemModal() { if(erpMode){showToast('โหมด ERP: เพิ่ม Item จาก '+erpSystem+' แล้วกด "ดึงจาก ERP"','warning');return;} document.getElementById('im-id').value=''; document.getElementById('im-code').value=''; document.getElementById('im-code').readOnly=false; document.getElementById('im-name').value=''; document.getElementById('im-name-th').value=''; document.getElementById('im-cat').value='equipment'; document.getElementById('im-uom').value='EA'; document.getElementById('im-price').value=''; document.getElementById('im-gl').value='114101'; document.getElementById('im-description').value=''; document.getElementById('im-expiry-date').value=''; document.getElementById('im-qty-on-hand').value='0'; setWarranty(false,12,''); document.getElementById('item-modal-title').textContent='New Item'; document.getElementById('item-modal').style.display='flex'; }
    function setWarranty(on, months, terms) { document.getElementById('im-warranty').checked=!!on; document.getElementById('im-warranty-box').style.display=on?'grid':'none'; document.getElementById('im-warranty-months').value=(months==null?12:months); document.getElementById('im-warranty-terms').value=terms||''; }
    function openEditItem(id) { const i=allItems.find(x=>x.id===id); if(!i)return; document.getElementById('im-id').value=id; document.getElementById('im-code').value=i.item_code; document.getElementById('im-code').readOnly=true; document.getElementById('im-name').value=i.item_name; document.getElementById('im-name-th').value=i.item_name_th||''; document.getElementById('im-cat').value=i.category||'equipment'; document.getElementById('im-uom').value=i.uom||'EA'; document.getElementById('im-price').value=i.unit_price||''; document.getElementById('im-gl').value=i.gl_account||''; document.getElementById('im-description').value=i.description||''; document.getElementById('im-expiry-date').value=i.expiry_date?i.expiry_date.substring(0,10):''; document.getElementById('im-qty-on-hand').value=i.quantity_on_hand||0; setWarranty(i.has_warranty, i.warranty_months, i.warranty_terms); document.getElementById('item-modal-title').textContent='Edit Item'; document.getElementById('item-modal').style.display='flex'; }
    function closeItemModal() { document.getElementById('item-modal').style.display='none'; }
    async function saveItem() {
      const id=document.getElementById('im-id').value;
      const body={item_code:document.getElementById('im-code').value,item_name:document.getElementById('im-name').value,item_name_th:document.getElementById('im-name-th').value,description:document.getElementById('im-description').value,category:document.getElementById('im-cat').value,uom:document.getElementById('im-uom').value,unit_price:parseFloat(document.getElementById('im-price').value)||0,gl_account:document.getElementById('im-gl').value,expiry_date:document.getElementById('im-expiry-date').value||null,quantity_on_hand:parseFloat(document.getElementById('im-qty-on-hand').value)||0,has_warranty:document.getElementById('im-warranty').checked,warranty_months:parseInt(document.getElementById('im-warranty-months').value)||0,warranty_terms:document.getElementById('im-warranty-terms').value};
      try { if(id) await API.put('/master/items/'+id,body); else await API.post('/master/items',body); closeItemModal(); await loadItems(); } catch(e){showToast('Error: '+e.message, 'error');}
    }
    function exportItems() {
      const headers = ['Code','Name','Name (TH)','Description','Category','UOM','Qty on Hand','Unit Price','Expiry Date','GL Account','Tax Code','Status'];
      const rows = allItems.map(i => [
        i.item_code,
        i.item_name,
        i.item_name_th || '',
        i.description || '',
        i.category || '',
        i.uom || '',
        parseFloat(i.quantity_on_hand || 0),
        parseFloat(i.unit_price || 0),
        i.expiry_date ? i.expiry_date.substring(0,10) : '',
        i.gl_account || '',
        i.tax_code || '',
        i.is_active ? 'Active' : 'Inactive'
      ]);
      exportToExcel(headers, rows, 'Item_Master', 'Item Master');
    }
    if (!API.requireAuth()) throw new Error('Not authenticated');
    (async () => { await loadCompanyMode(); await loadItems(); })();
  </script>
</body></html>
