<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pricing_page_title">Company Operation — Pricing</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    body { background: var(--bg-light); }
    .pricing-hero { text-align: center; padding: 48px 20px 24px; }
    .pricing-hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .pricing-hero p { color: var(--text-secondary); font-size: 16px; }
    .cycle-toggle { display: flex; justify-content: center; gap: 0; margin: 24px 0; background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius-full); width: fit-content; margin-left: auto; margin-right: auto; }
    .cycle-btn { padding: 8px 24px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; border-radius: var(--radius-full); color: var(--text-secondary); }
    .cycle-btn.active { background: var(--primary); color: white; }
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 0 20px 48px; }
    .plan-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px 24px; text-align: center; position: relative; }
    .plan-card.featured { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary); }
    .plan-card.featured::before { content: attr(data-featured-label); position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; font-size: 11px; font-weight: 700; padding: 2px 16px; border-radius: var(--radius-full); }
    .plan-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .plan-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
    .plan-price { font-size: 36px; font-weight: 800; color: var(--primary); }
    .plan-price span { font-size: 14px; font-weight: 400; color: var(--text-muted); }
    .plan-savings { font-size: 11px; color: var(--success); font-weight: 600; height: 20px; }
    .plan-features { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
    .plan-features li { padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border-light); }
    .plan-features li::before { content: '✓'; color: var(--success); font-weight: 700; margin-right: 8px; }
    @media (max-width: 768px) { .pricing-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div style="max-width:1100px;margin:0 auto;">
    <div class="pricing-hero">
      <h1 data-i18n="pricing_heading">Company Operation</h1>
      <p data-i18n="pricing_subtitle">ระบบจัดการงานปฏิบัติการครบวงจร เลือกแพลนที่เหมาะกับทีมของคุณ</p>
    </div>
    <div class="cycle-toggle">
      <button class="cycle-btn active" onclick="setCycle('monthly',this)" data-i18n="pricing_cycle_monthly">รายเดือน</button>
      <button class="cycle-btn" onclick="setCycle('yearly',this)" data-i18n="pricing_cycle_yearly">รายปี (ประหยัด 17%)</button>
    </div>
    <div class="pricing-grid" id="pricing-grid"></div>
    <div style="text-align:center;padding:20px;">
      <a href="login.html" style="color:var(--primary);font-size:13px;" data-i18n="pricing_already_have_account">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</a>
    </div>
  </div>

  <script>
    let plans = [];
    let cycle = 'monthly';

    // FIXED: Use API wrapper with error handling (pricing page is public, no auth needed)
    async function loadPlans() {
      try {
        const resp = await fetch('/api/subscription/plans');
        if (!resp.ok) throw new Error('Failed to load plans');
        plans = await resp.json();
        renderPlans();
      } catch(e) {
        console.error(e);
        document.querySelector('.pricing-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)" data-i18n="pricing_load_error">ไม่สามารถโหลดแพลนได้</div>';
      }
    }

    function setCycle(c, btn) {
      cycle = c;
      document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPlans();
    }

    function renderPlans() {
      const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k, fb) => fb;
      document.getElementById('pricing-grid').innerHTML = plans.map((p, i) => {
        const price = cycle === 'yearly' ? p.price_yearly : p.price_monthly;
        const monthly = cycle === 'yearly' ? Math.round(p.price_yearly / 12) : p.price_monthly;
        const savings = cycle === 'yearly' ? Math.round((1 - p.price_yearly / (p.price_monthly * 12)) * 100) : 0;
        const featured = i === 1;
        return `<div class="plan-card${featured ? ' featured' : ''}" ${featured ? 'data-featured-label="' + t('pricing_featured_label', 'แนะนำ') + '"' : ''}>
          <div class="plan-name">${p.display_name}</div>
          <div class="plan-desc">${p.description || ''}</div>
          <div class="plan-price">฿${Number(monthly).toLocaleString()}<span data-i18n="pricing_per_month">/เดือน</span></div>
          <div class="plan-savings">${savings > 0 ? t('pricing_savings_prefix', 'ประหยัด ')+savings+'% (฿'+Number(price).toLocaleString()+t('pricing_per_year', '/ปี')+')' : ''}</div>
          <ul class="plan-features">
            <li>${p.max_users ? p.max_users + ' ' + t('pricing_users', 'ผู้ใช้') : t('pricing_unlimited_users', 'ไม่จำกัดผู้ใช้')}</li>
            <li>${p.max_projects ? p.max_projects + ' ' + t('pricing_projects', 'โปรเจกต์') : t('pricing_unlimited_projects', 'ไม่จำกัดโปรเจกต์')}</li>
            <li>${p.max_storage_gb} GB <span data-i18n="pricing_storage">${t('pricing_storage', 'พื้นที่')}</span></li>
            ${p.features?.sap_integration ? '<li data-i18n="pricing_feature_erp">' + t('pricing_feature_erp', 'เชื่อมต่อ ERP') + '</li>' : ''}
            ${p.features?.api_access ? '<li data-i18n="pricing_feature_api">' + t('pricing_feature_api', 'API Access') + '</li>' : ''}
            ${p.features?.custom_reports ? '<li data-i18n="pricing_feature_reports">' + t('pricing_feature_reports', 'Custom Reports') + '</li>' : ''}
          </ul>
          <a href="register.html?plan=${p.id}&cycle=${cycle}" class="btn btn-${featured ? 'primary' : 'secondary'}" style="width:100%;display:block;text-align:center;text-decoration:none;" data-i18n="btn_start_trial">
            ${t('btn_start_trial', 'ทดลองใช้ฟรี 14 วัน')}
          </a>
        </div>`;
      }).join('');
    }

    loadPlans();
  </script>
</body>
</html>
