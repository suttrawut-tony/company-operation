<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Operation — Setup</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    /* ─── Settings Layout ─── */
    .settings-layout {
      display: flex;
      gap: 0;
      min-height: calc(100vh - var(--topbar-height) - 48px);
    }
    .settings-nav {
      width: 220px;
      flex-shrink: 0;
      position: sticky;
      top: calc(var(--topbar-height) + 24px);
      align-self: flex-start;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xs);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .settings-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: var(--radius);
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
      white-space: nowrap;
    }
    .settings-nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .settings-nav-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .settings-nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .settings-content {
      flex: 1;
      min-width: 0;
      padding-left: 24px;
    }

    /* ─── Section Cards ─── */
    .setup-section {
      display: none;
    }
    .setup-section.active {
      display: block;
      animation: fadeIn 0.2s ease-out;
    }
    .section-header {
      margin-bottom: 20px;
    }
    .section-header h2 {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-header h2 svg {
      width: 20px;
      height: 20px;
    }
    .section-header p {
      font-size: var(--text-base);
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ─── Form Grid ─── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .full-width {
      grid-column: 1 / -1;
    }
    .form-hint {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── Logo Upload ─── */
    .logo-upload-area {
      width: 120px;
      height: 120px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: var(--text-xs);
      transition: all 0.15s;
      background: var(--bg-light);
    }
    .logo-upload-area:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-50);
    }
    .logo-upload-area svg {
      width: 28px;
      height: 28px;
    }

    /* ─── Card Footer Actions ─── */
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
      margin-top: 20px;
    }

    /* ─── Code Cell (monospace) ─── */
    .code-cell {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--text-primary);
      background: var(--bg-light);
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      letter-spacing: -0.3px;
    }

    /* ─── Connection Status ─── */
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 600;
    }
    .status-indicator.connected {
      background: var(--success-light);
      color: var(--success);
    }
    .status-indicator.disconnected {
      background: var(--danger-light);
      color: var(--danger);
    }
    .status-indicator::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ─── Checkbox Group ─── */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-base);
      cursor: pointer;
      padding: 6px 0;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    /* ─── Editable Select (in-table) ─── */
    .inline-select {
      border: 1px solid var(--border-light);
      background: var(--bg-white);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-family: var(--font);
      color: var(--text-primary);
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .inline-select:focus {
      border-color: var(--border-focus);
    }

    /* ─── Editable Input (in-table) ─── */
    .inline-input {
      border: 1px solid var(--border-light);
      background: var(--bg-white);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-family: var(--font);
      color: var(--text-primary);
      width: 80px;
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
    }
    .inline-input:focus {
      border-color: var(--border-focus);
    }

    /* ─── Default Badge ─── */
    .badge-default {
      background: var(--success-light);
      color: var(--success);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ─── Synced Indicator ─── */
    .synced-yes {
      color: var(--success);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--text-sm);
      font-weight: 600;
    }
    .synced-no {
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--text-sm);
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .settings-layout {
        flex-direction: column;
      }
      .settings-nav {
        width: 100%;
        position: static;
        flex-direction: row;
        overflow-x: auto;
        gap: 4px;
        padding: 6px;
      }
      .settings-content {
        padding-left: 0;
        padding-top: 16px;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<aside id="sidebar"></aside>
<div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>${ICONS_PLACEHOLDER_SETTINGS} Settings</h1>
      </div>
    </div>

    <div class="settings-layout">
      <!-- Left Nav -->
      <div class="settings-nav" id="settingsNav"></div>

      <!-- Right Content -->
      <div class="settings-content" id="settingsContent"></div>
    </div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/helpers.js"></script>
<script src="assets/js/icons.js"></script>
<script src="assets/js/highlight.js"></script>
<script src="assets/js/nav.js"></script>
<script>
// ─── Settings Sections Definition ───
const SECTIONS = [
  { id: 'subscription',   label: 'Subscription & Billing',icon: '<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>' },
  { id: 'modules',        label: 'Module Management',    icon: '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>' },
  { id: 'company',        label: 'Company Profile',      icon: '<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>' },
  { id: 'approval',       label: 'Approval Matrix',      icon: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
  { id: 'numbering',      label: 'Document Numbering',   icon: '<path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>' },
  { id: 'coa',            label: 'Chart of Accounts',    icon: '<path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>' },
  { id: 'sap',            label: 'SAP B1 Connection',    icon: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>' },
  { id: 'tax',            label: 'Tax Codes',            icon: '<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 10h8"/><path d="M8 14h4"/>' },
  { id: 'warehouse',      label: 'Warehouses',           icon: '<path d="m2 7 10-4 10 4-10 4Z"/><path d="m2 17 10 4 10-4"/><path d="m2 12 10 4 10-4"/>' },
  { id: 'payment',        label: 'Payment Terms',        icon: '<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>' },
  { id: 'ot-rate',        label: 'OT Rate Policy',       icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' },
  { id: 'notifications',  label: 'Notifications',        icon: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>' },
  { id: 'vehicles',       label: 'Vehicle Master',       icon: '<path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/>' },
  { id: 'manpower',       label: 'Manpower / Technician',icon: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
];

let activeSection = 'company';

function sIcon(path, size = 16) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}

// ─── Render Settings Nav ───
function renderSettingsNav() {
  const nav = document.getElementById('settingsNav');
  nav.innerHTML = SECTIONS.map(s =>
    `<button class="settings-nav-item${s.id === activeSection ? ' active' : ''}" onclick="switchSection('${s.id}')">
      ${sIcon(s.icon)}
      <span>${s.label}</span>
    </button>`
  ).join('');
}

// ─── Switch Section ───
function switchSection(id) {
  activeSection = id;
  document.querySelectorAll('.settings-nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.settings-nav-item[onclick*="${id}"]`)?.classList.add('active');
  document.querySelectorAll('.setup-section').forEach(el => el.classList.remove('active'));
  document.getElementById(`section-${id}`)?.classList.add('active');
  if (id === 'subscription') loadSubscriptionUI();
  if (id === 'modules') loadModuleTable();
  if (id === 'vehicles') loadVehicleTable();
  if (id === 'manpower') loadManpowerTable();
}

// ─── Build All Sections ───
function renderSettingsContent() {
  const container = document.getElementById('settingsContent');
  container.innerHTML = `
    ${renderSubscriptionSection()}
    ${renderModuleManagement()}
    ${renderCompanyProfile()}
    ${renderApprovalMatrix()}
    ${renderDocNumbering()}
    ${renderCOA()}
    ${renderSAPConnection()}
    ${renderTaxCodes()}
    ${renderWarehouses()}
    ${renderPaymentTerms()}
    ${renderOTRatePolicy()}
    ${renderNotifications()}
    ${renderVehicleMaster()}
    ${renderManpowerMaster()}
  `;
}

// ═══════════════════════════════════════
// Subscription & Billing
// ═══════════════════════════════════════
function renderSubscriptionSection() {
  return `
  <div class="setup-section${activeSection === 'subscription' ? ' active' : ''}" id="section-subscription">
    <div class="section-header">
      <h2>${sIcon(SECTIONS[0].icon, 20)} Subscription & Billing</h2>
      <p>จัดการแพลน การชำระเงิน และดูการใช้งาน</p>
    </div>
    <div id="sub-content"><div style="padding:20px;text-align:center;color:var(--text-muted);">Loading...</div></div>
  </div>`;
}

async function loadSubscriptionUI() {
  const el = document.getElementById('sub-content');
  if (!el) return;
  try {
    const data = await API.get('/subscription');
    const sub = data.subscription;
    if (!sub) { el.innerHTML = '<div style="padding:20px;color:var(--text-muted);">No subscription</div>'; return; }

    const usage = data.usage || {};
    const usageBar = (label, u) => {
      if (!u) return '';
      const pct = u.limit ? Math.min(100, Math.round(u.current / u.limit * 100)) : 0;
      const color = pct >= 90 ? 'var(--danger)' : pct >= 70 ? 'var(--warning)' : 'var(--success)';
      return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>${label}</span><span style="font-weight:600;">${u.current}${u.limit ? '/'+u.limit : ''}</span></div><div style="height:8px;background:var(--bg-hover);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${color};border-radius:4px;"></div></div></div>`;
    };

    const statusBadge = (s) => {
      const c = {active:'success',trial:'primary',past_due:'warning',cancelled:'danger',suspended:'danger',expired:'danger'}[s]||'gray';
      return '<span class="badge badge-'+c+'" style="font-size:11px;">'+s+'</span>';
    };

    let trialInfo = '';
    if (sub.status === 'trial' && sub.trial_ends_at) {
      const days = Math.max(0, Math.ceil((new Date(sub.trial_ends_at) - new Date()) / 86400000));
      trialInfo = '<div style="background:var(--primary-light);padding:12px;border-radius:var(--radius);margin-bottom:16px;font-size:13px;color:var(--primary);font-weight:600;">ทดลองใช้ฟรี — เหลืออีก '+days+' วัน</div>';
    }

    el.innerHTML = `
      ${trialInfo}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div class="card"><div class="card-body">
          <div style="font-size:12px;color:var(--text-muted);">แพลนปัจจุบัน</div>
          <div style="font-size:20px;font-weight:800;margin:4px 0;">${sub.plan_display || sub.plan_name}</div>
          ${statusBadge(sub.status)}
          <div style="font-size:12px;color:var(--text-secondary);margin-top:8px;">
            ${sub.billing_cycle === 'yearly' ? 'รายปี' : 'รายเดือน'} — ฿${Number(sub.amount||0).toLocaleString()}
            ${sub.next_billing_date ? '<br>ต่ออายุ: '+sub.next_billing_date : ''}
          </div>
          <div style="margin-top:12px;display:flex;gap:6px;">
            <button class="btn btn-primary btn-sm" onclick="window.open('pricing.html','_blank')">อัปเกรด</button>
            ${sub.status==='active'||sub.status==='trial' ? '<button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger);" onclick="cancelSub()">ยกเลิก</button>' : ''}
            ${sub.cancelled_at ? '<button class="btn btn-sm btn-success" onclick="reactivateSub()">เปิดใช้อีกครั้ง</button>' : ''}
          </div>
        </div></div>
        <div class="card"><div class="card-body">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">การใช้งาน</div>
          ${usageBar('ผู้ใช้', usage.users)}
          ${usageBar('โปรเจกต์', usage.projects)}
          ${usageBar('พื้นที่', usage.storage_mb ? {current: Math.round(usage.storage_mb.current/1024*10)/10, limit: Math.round(usage.storage_mb.limit/1024)} : null)}
        </div></div>
      </div>
      <div class="card"><div class="card-header"><h2>ประวัติบิล</h2></div><div class="card-body" style="padding:0;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead><tr style="background:var(--bg-light);"><th style="padding:8px;text-align:left;">Invoice</th><th>รอบบิล</th><th style="text-align:right;">ยอด</th><th>สถานะ</th></tr></thead>
          <tbody>${(data.invoices||[]).map(inv => `<tr style="border-bottom:1px solid var(--border-light);">
            <td style="padding:6px 8px;font-weight:600;">${inv.invoice_number||'-'}</td>
            <td style="padding:6px;">${inv.billing_period_start||''} — ${inv.billing_period_end||''}</td>
            <td style="padding:6px;text-align:right;">฿${Number(inv.total||0).toLocaleString()}</td>
            <td style="padding:6px;">${statusBadge(inv.status)}</td>
          </tr>`).join('') || '<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--text-muted);">ยังไม่มีบิล</td></tr>'}</tbody>
        </table>
      </div></div>`;
  } catch(e) { el.innerHTML = '<div style="color:var(--danger);padding:20px;">Error: '+e.message+'</div>'; }
}

async function cancelSub() {
  const reason = prompt('เหตุผลที่ยกเลิก (ไม่บังคับ):');
  if (reason === null) return;
  try {
    await API.post('/subscription/cancel', { reason });
    loadSubscriptionUI();
    if (typeof showToast === 'function') showToast('ยกเลิกแล้ว', 'warning');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function reactivateSub() {
  try {
    await API.post('/subscription/reactivate');
    loadSubscriptionUI();
    if (typeof showToast === 'function') showToast('เปิดใช้งานอีกครั้งแล้ว', 'success');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

// ═══════════════════════════════════════
// 0. Module Management
// ═══════════════════════════════════════
function renderModuleManagement() {
  return `
  <div class="setup-section${activeSection === 'modules' ? ' active' : ''}" id="section-modules">
    <div class="section-header">
      <h2>${sIcon(SECTIONS[1].icon, 20)} Module Management</h2>
      <p>เปิด-ปิด Module ควบคุม Sidebar และสิทธิ์การเข้าถึง</p>
    </div>
    <div style="margin-bottom:12px;display:flex;gap:8px;">
      <button class="btn btn-primary btn-sm" onclick="openAddModuleModal()">+ เพิ่ม Module</button>
      <button class="btn btn-secondary btn-sm" onclick="loadModuleTable()">Refresh</button>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0;">
        <div class="table-container" id="module-table-container">
          <div style="padding:20px;text-align:center;color:var(--text-muted);">Loading modules...</div>
        </div>
      </div>
    </div>
  </div>`;
}

let allModulesAdmin = [];

async function loadModuleTable() {
  try {
    const data = await API.get('/modules');
    allModulesAdmin = data.modules || [];
    renderModuleTable(allModulesAdmin);
  } catch(e) { document.getElementById('module-table-container').innerHTML = '<div style="padding:20px;color:var(--danger);">Error: '+e.message+'</div>'; }
}

function renderModuleTable(modules) {
  const groupColors = { main:'var(--primary)', project:'var(--success)', document:'var(--warning)', resource:'var(--info)', system:'var(--text-muted)' };
  const roles = ['executive','admin','pm','finance','accounting','procurement','staff'];
  let html = '<table><thead><tr><th>#</th><th>Module</th><th>Group</th><th>Enabled</th><th>Roles</th><th></th></tr></thead><tbody>';
  modules.forEach((m, i) => {
    const gColor = groupColors[m.module_group] || 'var(--text-muted)';
    const toggleDisabled = m.is_core ? 'disabled title="Module หลัก ปิดไม่ได้"' : '';
    const toggleChecked = m.is_enabled ? 'checked' : '';
    const roleDisplay = m.allowed_roles ? m.allowed_roles.map(r => '<span class="badge badge-gray" style="font-size:9px;">'+r+'</span>').join(' ') : '<span style="font-size:10px;color:var(--text-muted);">ทุก role</span>';
    html += `<tr style="opacity:${m.is_enabled?1:0.5};">
      <td style="text-align:center;">${m.sort_order}</td>
      <td><strong>${m.module_name}</strong><br><span style="font-size:10px;color:var(--text-muted);">${m.href}</span></td>
      <td><span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:${gColor}20;color:${gColor};">${m.module_group}</span></td>
      <td style="text-align:center;">
        <label style="position:relative;display:inline-block;width:36px;height:20px;">
          <input type="checkbox" ${toggleChecked} ${toggleDisabled} onchange="toggleModule('${m.module_id}',this.checked)" style="opacity:0;width:0;height:0;">

async function toggleModule(moduleId, enabled) {
  try {
    await API.put('/modules/'+moduleId+'/toggle', { is_enabled: enabled });
    sessionStorage.removeItem('sda_modules');
    if (typeof showToast === 'function') showToast(enabled ? 'เปิด Module แล้ว' : 'ปิด Module แล้ว', 'success');
    loadModuleTable();
    // Re-render sidebar immediately
    if (typeof loadModulesFromAPI === 'function') { await loadModulesFromAPI(); renderSidebar(); }
  } catch(e) { showToast('Error: '+e.message, 'error'); loadModuleTable(); }
}

function editModule(moduleId) {
  const m = allModulesAdmin.find(x => x.module_id === moduleId);
  if (!m) return;
  const roles = ['executive','admin','pm','finance','accounting','procurement','staff'];
  const currentRoles = m.allowed_roles || [];
  const roleChecks = roles.map(r => '<label style="display:flex;align-items:center;gap:4px;font-size:12px;"><input type="checkbox" data-erole="'+r+'" '+(currentRoles.length===0||currentRoles.includes(r)?'checked':'')+'>'+r+'</label>').join('');
  const modal = document.createElement('div');
  modal.className = 'modal-overlay show'; modal.id = 'edit-module-modal';
  modal.onclick = (e) => { if (e.target===modal) modal.remove(); };
  modal.innerHTML = `<div class="modal-box" style="width:400px;">
    <div class="modal-header"><h3>แก้ไข Module — ${m.module_name}</h3><button class="modal-close" onclick="document.getElementById('edit-module-modal').remove()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">ชื่อ Module</label><input class="form-input" id="em-name" value="${m.module_name}"></div>
      <div class="form-group"><label class="form-label">ลำดับ</label><input class="form-input" type="number" id="em-sort" value="${m.sort_order}"></div>
      <div class="form-group"><label class="form-label">Roles ที่เห็น</label><div style="display:flex;flex-wrap:wrap;gap:8px;">${roleChecks}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">ถ้าเลือกทุก role = ทุกคนเห็น</div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('edit-module-modal').remove()">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveModuleEdit('${moduleId}')">Save</button></div>
  </div>`;
  document.body.appendChild(modal);
}

async function saveModuleEdit(moduleId) {
  const name = document.getElementById('em-name').value.trim();
  const sort = parseInt(document.getElementById('em-sort').value) || 0;
  const checks = document.querySelectorAll('[data-erole]');
  const selectedRoles = []; checks.forEach(c => { if (c.checked) selectedRoles.push(c.dataset.erole); });
  const allRoles = ['executive','admin','pm','finance','accounting','procurement','staff'];
  const allowed = selectedRoles.length === allRoles.length ? null : selectedRoles;
  try {
    await API.put('/modules/'+moduleId, { module_name: name, sort_order: sort, allowed_roles: allowed });
    document.getElementById('edit-module-modal').remove();
    sessionStorage.removeItem('sda_modules');
    loadModuleTable();
    if (typeof loadModulesFromAPI === 'function') { await loadModulesFromAPI(); renderSidebar(); }
    if (typeof showToast === 'function') showToast('บันทึกแล้ว', 'success');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

function openAddModuleModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay show'; modal.id = 'add-module-modal';
  modal.onclick = (e) => { if (e.target===modal) modal.remove(); };
  modal.innerHTML = `<div class="modal-box" style="width:420px;">
    <div class="modal-header"><h3>เพิ่ม Module ใหม่</h3><button class="modal-close" onclick="document.getElementById('add-module-modal').remove()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Module ID</label><input class="form-input" id="am-id" placeholder="e.g. inventory"></div>
      <div class="form-group"><label class="form-label">ชื่อ Module</label><input class="form-input" id="am-name" placeholder="e.g. Inventory"></div>
      <div class="form-group"><label class="form-label">กลุ่ม</label><select class="form-input" id="am-group"><option value="main">Main</option><option value="project">Project</option><option value="document" selected>Document</option><option value="resource">Resource</option><option value="system">System</option></select></div>
      <div class="form-group"><label class="form-label">ไฟล์ HTML</label><input class="form-input" id="am-href" placeholder="e.g. inventory.html"></div>
      <div class="form-group"><label class="form-label">Icon</label><input class="form-input" id="am-icon" value="reports" placeholder="icon key from ICONS"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('add-module-modal').remove()">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveNewModule()">Create</button></div>
  </div>`;
  document.body.appendChild(modal);
}

async function saveNewModule() {
  const id = document.getElementById('am-id').value.trim();
  const name = document.getElementById('am-name').value.trim();
  const href = document.getElementById('am-href').value.trim();
  if (!id || !name || !href) { showToast('กรอกข้อมูลให้ครบ', 'error'); return; }
  try {
    await API.post('/modules', { module_id: id, module_name: name, module_group: document.getElementById('am-group').value, icon: document.getElementById('am-icon').value, href: href });
    document.getElementById('add-module-modal').remove();
    sessionStorage.removeItem('sda_modules');
    loadModuleTable();
    if (typeof loadModulesFromAPI === 'function') { await loadModulesFromAPI(); renderSidebar(); }
    if (typeof showToast === 'function') showToast('เพิ่ม Module แล้ว', 'success');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

// ─── Toast Notification ───
function showToast(message) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    Object.assign(toast.style, {
      position: 'fixed', bottom: '24px', right: '24px',
      background: 'var(--text-primary)', color: '#fff',
      padding: '12px 20px', borderRadius: 'var(--radius-lg)',
      fontSize: 'var(--text-base)', fontWeight: '500',
      boxShadow: 'var(--shadow-lg)', zIndex: '999',
      display: 'flex', alignItems: 'center', gap: '8px',
      opacity: '0', transform: 'translateY(12px)',
      transition: 'all 0.2s ease',
      fontFamily: 'var(--font)',
    });
    document.body.appendChild(toast);
  }
  toast.innerHTML = `${sIcon('<polyline points="20 6 9 17 4 12"/>', 16)} ${message}`;
  requestAnimationFrame(() => {
    toast.style.opacity = '1';
    toast.style.transform = 'translateY(0)';
  });
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(12px)';
  }, 2500);
}

async function saveVehicleMaster(editId) {
  const data = {
    plate_number: document.getElementById('vm-plate').value.trim(),
    name: document.getElementById('vm-name').value.trim(),
    vehicle_type: document.getElementById('vm-type').value,
    seats: parseInt(document.getElementById('vm-seats').value)||5,
    current_km: parseFloat(document.getElementById('vm-km').value)||0,
    fuel_level: document.getElementById('vm-fuel').value,
    notes: document.getElementById('vm-notes').value,
  };
  if (!data.plate_number || !data.name) { showToast('กรุณากรอกทะเบียนและชื่อรถ', 'error'); return; }
  try {
    if (editId) await API.put('/vehicle/'+editId, data);
    else await API.post('/vehicle', data);
    document.getElementById('veh-modal').remove();
    showToast(editId?'อัปเดตรถสำเร็จ':'เพิ่มรถสำเร็จ','success');
    loadVehicleTable();
  } catch(e) { showToast(e.message||'Error','error'); }
}

async function toggleVehicleStatus(id, current) {
  const cycle = ['available','in_use','maintenance','retired'];
  const next = cycle[(cycle.indexOf(current)+1)%cycle.length];
  try {
    await API.put('/vehicle/'+id, {status:next});
    showToast('เปลี่ยนสถานะเป็น '+next,'success');
    loadVehicleTable();
  } catch(e) { showToast(e.message,'error'); }
}

        <div class="form-group"><label class="form-label">นามสกุล</label><input class="form-input" id="mp-lname" value="${t.last_name||''}"></div>
        <div class="form-group"><label class="form-label">ชื่อเล่น</label><input class="form-input" id="mp-nick" value="${t.nickname||''}"></div>
        <div class="form-group"><label class="form-label">ตำแหน่ง</label><select class="form-input" id="mp-spec"><option value="installation" ${t.specialization==='installation'?'selected':''}>ช่างติดตั้ง</option><option value="electrical" ${t.specialization==='electrical'?'selected':''}>ช่างไฟฟ้า</option><option value="survey" ${t.specialization==='survey'?'selected':''}>Survey</option><option value="assistant" ${t.specialization==='assistant'?'selected':''}>ผู้ช่วย</option><option value="general" ${t.specialization==='general'||!t.specialization?'selected':''}>ทั่วไป</option></select></div>
        <div class="form-group"><label class="form-label">ระดับ</label><select class="form-input" id="mp-level"><option value="junior" ${t.skill_level==='junior'||!t.skill_level?'selected':''}>Junior</option><option value="senior" ${t.skill_level==='senior'?'selected':''}>Senior</option><option value="lead" ${t.skill_level==='lead'?'selected':''}>Lead</option></select></div>
        <div class="form-group"><label class="form-label">ค่าแรง/วัน</label><input class="form-input" type="number" id="mp-rate" value="${t.daily_rate||0}"></div>
        <div class="form-group"><label class="form-label">โทรศัพท์</label><input class="form-input" id="mp-phone" value="${t.phone||''}"></div>
        <div class="form-group"><label class="form-label">รหัสพนักงาน</label><input class="form-input" id="mp-empid" value="${t.employee_id||''}"></div>
      </div>
      <div class="form-group"><label class="form-label">หมายเหตุ</label><textarea class="form-input" id="mp-notes" rows="2">${t.notes||''}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('mp-modal').remove()">ยกเลิก</button>
      <button class="btn btn-primary btn-sm" onclick="saveManpower('${editId||''}')">บันทึก</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

async function saveManpower(editId) {
  const data = {
    first_name: document.getElementById('mp-fname').value.trim(),
    last_name: document.getElementById('mp-lname').value.trim(),
    nickname: document.getElementById('mp-nick').value.trim(),
    specialization: document.getElementById('mp-spec').value,
    skill_level: document.getElementById('mp-level').value,
    daily_rate: parseFloat(document.getElementById('mp-rate').value)||0,
    phone: document.getElementById('mp-phone').value.trim(),
    employee_id: document.getElementById('mp-empid').value.trim(),
    notes: document.getElementById('mp-notes').value,
  };
  if (!data.first_name) { showToast('กรุณากรอกชื่อ', 'error'); return; }
  try {
    if (editId) await API.put('/technicians/'+editId, data);
    else await API.post('/technicians', data);
    document.getElementById('mp-modal').remove();
    showToast(editId?'อัปเดตสำเร็จ':'เพิ่มช่างสำเร็จ','success');
    loadManpowerTable();
  } catch(e) { showToast(e.message||'Error','error'); }
}

async function toggleTechStatus(id, current) {
  const next = current==='active'?'inactive':'active';
  try {
    await API.put('/technicians/'+id, {status:next});
    showToast('เปลี่ยนสถานะเป็น '+next,'success');
    loadManpowerTable();
  } catch(e) { showToast(e.message,'error'); }
}

// ─── Fix Page Header Icon (replace placeholder after nav.js loads) ───
document.addEventListener('DOMContentLoaded', () => {
  if (!API.requireAuth()) throw new Error('Not authenticated');
  const h1 = document.querySelector('.page-header h1');
  if (h1 && typeof ICONS !== 'undefined') {
    h1.innerHTML = ICONS.setup + ' Settings';
  }
  renderSettingsNav();
  renderSettingsContent();
});
</script>
