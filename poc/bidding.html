<!DOCTYPE html>
<html lang="th-TH">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Operation — Bidding</title>
<link rel="stylesheet" href="assets/css/theme.css">
<style>
  /* Bidding module — scoped styles (bm- prefix to avoid clashing with theme) */
  .bm-btn{font-size:12.5px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-white);font-weight:700;color:var(--text-primary);cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
  .bm-btn:hover{background:var(--bg-hover)}
  .bm-btn.p{background:var(--primary);color:#fff;border-color:var(--primary)}.bm-btn.p:hover{background:var(--primary-hover)}

  .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .tile{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow-xs)}
  .tile .v{font-size:23px;font-weight:800;line-height:1}
  .tile .l{font-size:11px;color:var(--text-secondary);margin-top:6px}
  .tile.ok .v{color:var(--success)}.tile.warn .v{color:var(--warning)}.tile.dng .v{color:var(--danger)}.tile.pri .v{color:var(--primary)}

  .bm-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);overflow:hidden;margin-bottom:18px}
  .bm-card-h{padding:13px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
  .bm-card-h h2{font-size:15px;font-weight:800;margin:0}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl th{background:var(--bg-light);text-align:left;padding:10px 16px;font-size:10.5px;font-weight:800;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);letter-spacing:.3px}
  .tbl td{padding:11px 16px;border-bottom:1px solid var(--border-light)}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tbody tr{cursor:pointer}.tbl tbody tr:hover td{background:var(--bg-hover)}
  .mono{font-family:var(--font-mono)}.right{text-align:right}
  .b{font-size:10px;padding:2px 9px;border-radius:var(--radius-full);font-weight:800;display:inline-block;white-space:nowrap}
  .b-ok{background:var(--success-light);color:#059669}.b-warn{background:var(--warning-light);color:#d97706}
  .b-dng{background:var(--danger-light);color:#e11d48}.b-pri{background:var(--primary-light);color:var(--primary)}
  .b-info{background:var(--info-light);color:var(--info)}.b-gray{background:var(--bg-hover);color:var(--text-secondary)}

  .chain{display:flex;align-items:stretch;gap:0;flex-wrap:wrap;padding:6px 2px}
  .cnode{position:relative;display:flex;flex-direction:column;min-width:150px;background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:11px 13px;transition:.15s}
  .cnode.reuse{cursor:pointer}.cnode.reuse:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
  .cnode.has{border-color:var(--success);background:linear-gradient(180deg,var(--success-light),#fff)}
  .cnode.empty{border-style:dashed}
  .cnode.newp{opacity:.6;border-style:dashed;background:var(--bg-light)}
  .cnode .ph{font-size:9px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
  .cnode .ttl{font-size:12.5px;font-weight:800;margin:4px 0 6px}
  .cnode .no{font-size:10.5px;font-family:var(--font-mono);color:var(--text-muted);min-height:14px}
  .cnode .st{margin-top:7px}
  .cnode .lk{font-size:9.5px;font-weight:700;color:var(--primary);margin-top:7px}
  .carrow{display:flex;align-items:center;color:var(--border);font-size:20px;padding:0 4px;align-self:center}

  .projbar{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;border-radius:var(--radius-lg);padding:13px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .projbar .pj-ic{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .projbar .pj-t{font-size:15px;font-weight:800;line-height:1.2}
  .projbar .pj-s{font-size:11.5px;opacity:.92;margin-top:2px}
  .projbar .pj-meta{margin-left:auto;text-align:right;font-size:11px;opacity:.95;white-space:nowrap}
  .projbar .pj-meta b{font-size:15px;display:block;font-weight:800}
  .projbar a.pj-lk{color:#fff;font-size:11px;font-weight:700;text-decoration:underline;opacity:.95}

  .al{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:var(--radius);font-size:12.5px;font-weight:600;margin-bottom:14px}
  .al.warn{background:var(--warning-light);color:#92590c;border:1px solid #fde68a}
  .al.info{background:var(--info-light);color:#1e40af;border:1px solid #bfdbfe}
  .al.dng{background:var(--danger-light);color:#9f1239;border:1px solid #fecaca}
  .back{font-size:12px;color:var(--primary);cursor:pointer;font-weight:700;margin-bottom:12px;display:inline-flex;gap:5px;align-items:center}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text-secondary);margin-top:6px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .ldot{width:10px;height:10px;border-radius:3px;display:inline-block}

  .bm-guard{max-width:560px;margin:60px auto;text-align:center;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px;box-shadow:var(--shadow-sm)}
  .bm-guard .gic{width:60px;height:60px;border-radius:16px;background:var(--warning-light);color:var(--warning);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
  .bm-guard h2{font-size:18px;font-weight:800;margin:0 0 8px}
  .bm-guard p{font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0 0 18px}
  @media(max-width:820px){.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <aside id="sidebar"></aside>
  <div class="main-wrapper">
  <nav id="topnav"></nav>
  <div id="tabbar"></div>
  <main class="page fade-in">
    <div id="bidding-root"><div style="padding:40px;text-align:center;color:var(--text-muted)">กำลังโหลด…</div></div>
  </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
  /* ============================================================
     Bidding Module — "แกนร้อยเอกสาร" (Document-chain orchestrator)
     ใช้ข้อมูลจริงจากโมดูลเดิม (tenders/bid_preparations/contracts/
     guarantees/disputes) — ขั้นที่ซ้ำลิงก์ออกไปหน้าเดิม ไม่สร้างซ้ำ.
     เฟสที่ยังไม่มีของเดิม (Go/No-Go, ยื่น, ผล, ส่งมอบ, วางบิล) เป็น
     placeholder "เฟสถัดไป" — ยังไม่เขียนข้อมูล.
     ============================================================ */
  let DATA={tenders:[],bids:[],contracts:[],guarantees:[],disputes:[]};
  const money=n=>'฿'+Number(n||0).toLocaleString('th-TH');
  const root=()=>document.getElementById('bidding-root');

  // chain steps — kind: 'reuse' (ลิงก์โมดูลเดิม) | 'new' (เฟสถัดไป)
  const STEPS=[
    {k:'gng', ph:'เฟส 1', t:'ใบตัดสินใจเข้าประมูล', kind:'new'},
    {k:'bid', ph:'เฟส 2', t:'ใบเตรียมข้อเสนอ (BOQ)', kind:'reuse', mod:'Bid Preparation', href:'bid-preparation.html'},
    {k:'bond',ph:'เฟส 3', t:'หลักประกันซอง', kind:'reuse', mod:'Guarantees', href:'guarantees.html'},
    {k:'sub', ph:'เฟส 4', t:'ใบยื่นข้อเสนอ', kind:'new'},
    {k:'res', ph:'เฟส 5', t:'ใบผลการพิจารณา', kind:'new'},
    {k:'ct',  ph:'เฟส 6', t:'สัญญา', kind:'reuse', mod:'Contracts', href:'contracts.html'},
    {k:'dlv', ph:'เฟส 7', t:'ใบส่งมอบ/ตรวจรับ', kind:'new'},
    {k:'bil', ph:'เฟส 8', t:'ใบวางบิล/เบิกจ่าย', kind:'new'},
    {k:'rel', ph:'เฟส 9', t:'คืนหลักประกัน', kind:'reuse', mod:'Guarantees', href:'guarantees.html'},
  ];

  function statusBadge(st){
    if(!st) return '<span class="b b-gray">—</span>';
    const s=String(st).toLowerCase();
    let cl='b-gray';
    if(['won','awarded','active','signed','completed','released','resolved','approved'].includes(s))cl='b-ok';
    else if(['submitted','published','evaluating','pending','investigating','open'].includes(s))cl='b-info';
    else if(['draft'].includes(s))cl='b-gray';
    else if(['lost','cancelled','terminated','disqualified','claimed'].includes(s))cl='b-dng';
    else if(['expiring','escalated'].includes(s))cl='b-warn';
    return `<span class="b ${cl}">${st}</span>`;
  }

  // per-tender linked records from real data
  function ctxFor(t){
    const contract=DATA.contracts.find(c=>c.tender_id===t.id)||null;
    const bid=DATA.bids.find(b=>b.tender_id===t.id)||null;
    const dispute=DATA.disputes.find(d=>d.tender_id===t.id||(contract&&d.contract_id===contract.id))||null;
    const matchG=g=> (contract&&g.contract_id===contract.id) || (t.project_id&&g.project_id===t.project_id);
    const gBond=DATA.guarantees.find(g=>g.guarantee_type==='bid_bond'&&matchG(g))||null;
    const gOther=DATA.guarantees.find(g=>g.guarantee_type&&g.guarantee_type!=='bid_bond'&&matchG(g))||null;
    return {contract,bid,dispute,gBond,gOther};
  }
  // returns {no,status} for a reuse step, or null
  function recFor(stepK,ctx){
    if(stepK==='bid')  return ctx.bid?{no:ctx.bid.bid_number,status:ctx.bid.status}:null;
    if(stepK==='bond') return ctx.gBond?{no:ctx.gBond.guarantee_number,status:ctx.gBond.status}:null;
    if(stepK==='ct')   return ctx.contract?{no:ctx.contract.contract_number,status:ctx.contract.status}:null;
    if(stepK==='rel')  return ctx.gOther?{no:ctx.gOther.guarantee_number,status:ctx.gOther.status}:null;
    return null;
  }

  /* ---------------- routing ---------------- */
  let route={view:'list',deal:null};
  function go(v,deal){route={view:v,deal};render();window.scrollTo(0,0);}
  function render(){
    if(route.view==='list') root().innerHTML=viewList();
    else if(route.view==='deal') root().innerHTML=viewDeal(route.deal);
  }
  const tenderById=id=>DATA.tenders.find(t=>t.id===id);

  function viewList(){
    const T=DATA.tenders;
    const withBid=T.filter(t=>ctxFor(t).bid).length;
    const withCt=T.filter(t=>ctxFor(t).contract).length;
    const awarded=T.filter(t=>String(t.status).toLowerCase()==='awarded').length;
    const val=DATA.contracts.reduce((s,c)=>s+Number(c.contract_amount||0),0);
    const rows=T.map(t=>{
      const ctx=ctxFor(t);
      return `<tr onclick="go('deal','${t.id}')">
        <td class="mono">${t.tender_number||'—'}</td>
        <td><b>${t.title||'—'}</b><div style="font-size:11px;color:var(--text-muted)">${t.project_name||t.project_code||''}</div></td>
        <td class="right mono">${money(t.budget_amount)}</td>
        <td>${statusBadge(t.status)}</td>
        <td>${miniChain(t,ctx)}</td></tr>`;
    }).join('')||`<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px">ยังไม่มีประกวดราคา — สร้างที่เมนู Tenders</td></tr>`;
    return `<div class="page-header"><div><h1>Bidding · งานประมูล</h1></div>
      <a class="bm-btn p" href="tenders.html">+ ประมูลใหม่ (ที่ Tenders)</a></div>
      <div class="al info">ℹ Bidding คือ <b>มุมมองห่วงโซ่เอกสาร</b> ที่ร้อยข้อมูลจริงจากโมดูลเดิม (ประกวดราคา → เตรียมข้อเสนอ → หลักประกัน → สัญญา → อุทธรณ์) เข้าด้วยกัน — ไม่สร้างข้อมูลซ้ำ</div>
      <div class="tiles">
        <div class="tile pri"><div class="v">${T.length}</div><div class="l">ประกวดราคาทั้งหมด</div></div>
        <div class="tile ok"><div class="v">${awarded}</div><div class="l">มอบสัญญาแล้ว</div></div>
        <div class="tile"><div class="v">${withBid}</div><div class="l">มีใบเตรียมข้อเสนอ</div></div>
        <div class="tile"><div class="v">${withCt}</div><div class="l">มีสัญญา</div></div>
        <div class="tile ok"><div class="v" style="font-size:17px">${money(val)}</div><div class="l">มูลค่าสัญญารวม</div></div></div>
      <div class="bm-card"><div class="bm-card-h"><h2>รายการประกวดราคา (จากโมดูล Tenders)</h2></div>
        <table class="tbl"><thead><tr><th>เลขที่</th><th>โครงการ</th><th class="right">งบประมาณ</th><th>สถานะ</th><th>ห่วงโซ่เอกสาร</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
  }
  function miniChain(t,ctx){
    return '<div style="display:flex;gap:3px">'+STEPS.map(s=>{
      let c='var(--border)';
      if(s.kind==='reuse'){ c=recFor(s.k,ctx)?'var(--success)':'var(--border)'; }
      else { c='var(--bg-hover)'; }
      return `<span title="${s.t}" style="width:14px;height:6px;border-radius:3px;background:${c}"></span>`;
    }).join('')+'</div>';
  }

  function viewDeal(id){
    const t=tenderById(id);if(!t)return '<div class="back" onclick="go(\'list\')">‹ กลับ</div>ไม่พบรายการ';
    const ctx=ctxFor(t);
    let chain='';
    STEPS.forEach((s,i)=>{
      if(s.kind==='reuse'){
        const rec=recFor(s.k,ctx);
        const has=!!rec;
        chain+=`<div class="cnode reuse ${has?'has':'empty'}" onclick="location.href='${s.href}'">
          <div class="ph">${s.ph}</div><div class="ttl">${s.t}</div>
          <div class="no">${has?rec.no:'—'}</div>
          <div class="st">${has?statusBadge(rec.status):'<span class="b b-gray">ยังไม่มี</span>'}</div>
          <div class="lk">↗ ${has?'เปิดใน':'สร้างใน'} ${s.mod}</div></div>`;
      } else {
        chain+=`<div class="cnode newp" title="เฟสถัดไป — ยังไม่เปิดใช้">
          <div class="ph">${s.ph}</div><div class="ttl">${s.t}</div>
          <div class="no">—</div><div class="st"><span class="b b-gray">เฟสถัดไป</span></div>
          <div class="lk" style="color:var(--text-muted)">รอพัฒนา</div></div>`;
      }
      if(i<STEPS.length-1)chain+='<div class="carrow">›</div>';
    });
    const disputeAlert=ctx.dispute?`<div class="al dng">⚖ มีข้อพิพาท/อุทธรณ์: <b>${ctx.dispute.dispute_number}</b> (${ctx.dispute.status}) — <a href="disputes.html" style="color:inherit;text-decoration:underline">เปิดใน Disputes</a></div>`:'';
    return `<div class="back" onclick="go('list')">‹ กลับรายการ</div>
      <div class="projbar"><div class="pj-ic">▤</div>
        <div><div class="pj-t">${t.title||'—'}</div>
          <div class="pj-s">${t.tender_number||''} · ${t.project_name||t.project_code||''} · <a class="pj-lk" href="tenders.html">ดูใน Tenders →</a></div></div>
        <div class="pj-meta">งบประมาณ<b>${money(t.budget_amount)}</b></div></div>
      ${disputeAlert}
      <div class="bm-card"><div class="bm-card-h"><h2>ห่วงโซ่เอกสาร — Document Flow Chain</h2>
        <span style="font-size:11px;color:var(--text-muted)">คลิกใบสีเขียวเพื่อเปิดเอกสารจริง</span></div>
        <div style="padding:16px 18px"><div class="chain">${chain}</div>
          <div class="legend">
            <span><i class="ldot" style="background:var(--success)"></i> มีเอกสารแล้ว (ลิงก์ไปหน้าจริง)</span>
            <span><i class="ldot" style="background:var(--border)"></i> ยังไม่มี (สร้างที่โมดูลเดิม)</span>
            <span><i class="ldot" style="background:var(--bg-hover)"></i> เฟสถัดไป (ยังไม่เปิดใช้)</span>
          </div></div></div>
      <div class="al info">ℹ ขั้นที่ผูกโมดูลเดิม (BOQ · หลักประกัน · สัญญา · อุทธรณ์) ใช้ข้อมูล + เลขเอกสารชุดเดียวกับหน้าเดิม — กดเพื่อไปจัดการที่หน้านั้นได้เลย</div>`;
  }

  /* ---- guard + load real data ---- */
  function showDisabled(){
    root().innerHTML=`<div class="bm-guard"><div class="gic">⏻</div>
      <h2>โมดูล Bidding ถูกปิดอยู่</h2>
      <p>เปิดได้ที่ <b>Setup → Module Management</b> แล้วสลับสวิตช์ "Bidding (งานประมูล)" เป็นเปิด</p>
      <a class="bm-btn p" href="setup.html">ไปที่ Setup → Module Management</a></div>`;
  }
  function errBox(e){return `<div class="al dng" style="margin-top:20px">โหลดข้อมูลไม่สำเร็จ: ${e&&e.message||e}</div>`;}
  function arr(x){return Array.isArray(x)?x:((x&&x.rows)||[]);}
  async function init(){
    if(typeof API==='undefined'){ root().innerHTML=errBox('ต้องเปิดผ่านเซิร์ฟเวอร์ (ไม่ใช่ file://)'); return; }
    try{
      const mods=await API.get('/modules');
      const list=arr(mods.modules||mods);
      const bm=list.find(m=>m.module_id==='bidding');
      if(!bm || bm.is_enabled===false){ showDisabled(); return; }
    }catch(e){ /* auth/redirect handled by nav.js — continue best-effort */ }
    try{
      const [t,b,c,g,d]=await Promise.all([
        API.get('/tenders'),API.get('/bids'),API.get('/contracts'),API.get('/guarantees'),API.get('/disputes')]);
      DATA={tenders:arr(t),bids:arr(b),contracts:arr(c),guarantees:arr(g),disputes:arr(d)};
      go('list');
    }catch(e){ root().innerHTML=errBox(e); }
  }
  init();
  </script>
</body>
</html>
